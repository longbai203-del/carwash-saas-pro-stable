services:
  - type: web
    name: carwash-backend-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/api/index.js
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health
