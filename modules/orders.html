<!-- ===== ORDERS ===== -->
<div id="moduleOrders" class="module-content hidden">
    <div class="glass-card p-6">
        <h2 class="text-xl font-bold text-blue-600">📋 订单管理</h2>
        <div class="flex gap-3 mb-4 flex-wrap">
            <select id="orderStatusFilter" class="p-2 border rounded-lg text-sm" onchange="loadOrders()">
                <option value="all">全部状态</option>
                <option value="pending">待确认</option>
                <option value="confirmed">已确认</option>
                <option value="in_progress">施工中</option>
                <option value="completed">已完成</option>
                <option value="cancelled">已取消</option>
            </select>
            <input type="date" id="orderDateFilter" class="p-2 border rounded-lg text-sm" onchange="loadOrders()">
            <input type="text" id="orderSearch" placeholder="搜索..." class="p-2 border rounded-lg text-sm flex-1" oninput="loadOrders()">
            <button onclick="loadOrders()" class="btn-primary btn-sm">刷新</button>
        </div>
        <div id="ordersList" class="space-y-3 max-h-[600px] overflow-auto"></div>
    </div>
</div>
