<!-- ===== REPORTS ===== -->
<div id="moduleReports" class="module-content hidden">
    <div class="glass-card p-6">
        <h2 class="text-xl font-bold text-blue-600">📊 财务管理</h2>
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="daily" onclick="switchReportTab('daily')">📅 日报</button>
            <button class="tab-btn" data-tab="commission" onclick="switchReportTab('commission')">💰 提成</button>
            <button class="tab-btn" data-tab="customers" onclick="switchReportTab('customers')">🏆 客户排行</button>
        </div>
        <div id="reportTabDaily" class="report-section">
            <div class="grid grid-cols-4 gap-3 mb-4">
                <div class="stat-card-mini"><div class="num text-blue-600" id="dailyOrders">0</div><div class="lbl">今日订单</div></div>
                <div class="stat-card-mini"><div class="num text-green-600" id="dailyRevenue">0 SAR</div><div class="lbl">今日收入</div></div>
                <div class="stat-card-mini"><div class="num text-purple-600" id="dailyVat">0 SAR</div><div class="lbl">增值税</div></div>
                <div class="stat-card-mini"><div class="num text-orange-600" id="dailyProfit">0 SAR</div><div class="lbl">净利润</div></div>
            </div>
            <div class="flex gap-2 flex-wrap">
                <input type="date" id="reportDatePicker" onchange="loadDailyReport()">
                <button onclick="loadDailyReport()" class="btn-primary btn-sm">查看</button>
                <button onclick="exportDailyReport()" class="bg-green-600 text-white btn-sm">📊 导出日报</button>
            </div>
        </div>
        <div id="reportTabCommission" class="report-section hidden">
            <div class="flex gap-3 mb-3 flex-wrap">
                <select id="commissionStaffFilter" class="p-2 border rounded-lg text-sm"></select>
                <select id="commissionStatusFilter" class="p-2 border rounded-lg text-sm" onchange="loadCommission()">
                    <option value="all">全部状态</option>
                    <option value="pending">待结算</option>
                    <option value="paid">已结算</option>
                </select>
                <button onclick="loadCommission()" class="btn-primary btn-sm">查询</button>
                <button onclick="settleCommission()" class="btn-success btn-sm">✅ 结算</button>
            </div>
            <div id="commissionList" class="space-y-2 max-h-64 overflow-auto"></div>
            <div class="mt-3 text-sm text-gray-500">总计提成: <span id="commissionTotal" class="font-bold text-green-600">0 SAR</span></div>
        </div>
        <div id="reportTabCustomers" class="report-section hidden">
            <div class="flex gap-3 mb-3 flex-wrap">
                <select id="customerRankFilter" class="p-2 border rounded-lg text-sm">
                    <option value="points">积分排行</option>
                    <option value="spent">消费排行</option>
                    <option value="visits">到店次数</option>
                </select>
                <button onclick="loadCustomerRank()" class="btn-primary btn-sm">刷新</button>
            </div>
            <div id="customerRankList" class="space-y-2 max-h-64 overflow-auto"></div>
        </div>
    </div>
</div>
