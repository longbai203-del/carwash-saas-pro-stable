<!-- ===== DASHBOARD ===== -->
<div id="moduleDashboard" class="module-content space-y-6">
    <div class="glass-card p-4">
        <h3 class="font-bold text-gray-800 mb-3">📊 实时数据看板</h3>
        <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
            <div class="kpi-card text-center p-3 bg-blue-50 rounded-xl"><div class="text-2xl font-bold text-blue-600" id="kpiTodayOrders">0</div><div class="text-xs text-gray-500">今日订单</div></div>
            <div class="kpi-card text-center p-3 bg-green-50 rounded-xl"><div class="text-2xl font-bold text-green-600" id="kpiTodayRevenue">0 SAR</div><div class="text-xs text-gray-500">今日收入</div></div>
            <div class="kpi-card text-center p-3 bg-purple-50 rounded-xl"><div class="text-2xl font-bold text-purple-600" id="kpiTotalRevenue">0 SAR</div><div class="text-xs text-gray-500">累计收入</div></div>
            <div class="kpi-card text-center p-3 bg-orange-50 rounded-xl"><div class="text-2xl font-bold text-orange-600" id="kpiLowStock">0</div><div class="text-xs text-gray-500">低库存预警</div></div>
            <div class="kpi-card text-center p-3 bg-pink-50 rounded-xl"><div class="text-2xl font-bold text-pink-600" id="kpiPendingOrders">0</div><div class="text-xs text-gray-500">待处理订单</div></div>
        </div>
        <div class="grid grid-cols-3 gap-3 mt-3">
            <div class="text-center p-2 bg-gray-50 rounded-lg"><div class="text-sm font-bold" id="kpiAvgOrder">0 SAR</div><div class="text-xs text-gray-400">平均订单</div></div>
            <div class="text-center p-2 bg-gray-50 rounded-lg"><div class="text-sm font-bold" id="kpiTopStaff">-</div><div class="text-xs text-gray-400">最佳员工</div></div>
            <div class="text-center p-2 bg-gray-50 rounded-lg"><div class="text-sm font-bold" id="kpiTopService">-</div><div class="text-xs text-gray-400">热门服务</div></div>
        </div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
        <div class="glass-card p-4"><p class="text-gray-500 text-sm">今日收入</p><h3 class="stat-number text-green-600" id="todayRevenue">0 SAR</h3></div>
        <div class="glass-card p-4"><p class="text-gray-500 text-sm">今日订单</p><h3 class="stat-number" id="todayOrdersValue">0</h3></div>
        <div class="glass-card p-4"><p class="text-gray-500 text-sm">客户数</p><h3 class="stat-number" id="customersValue">0</h3></div>
        <div class="glass-card p-4"><p class="text-gray-500 text-sm">总销售额</p><h3 class="stat-number" id="totalSalesValue">0 SAR</h3></div>
        <div class="glass-card p-4"><p class="text-gray-500 text-sm">员工</p><h3 class="stat-number" id="employeesCount">0</h3></div>
    </div>
    <div id="stockAlertBar" class="glass-card p-3 hidden"><p class="text-sm text-red-600"><i class="fas fa-exclamation-triangle"></i> <span id="stockAlertText"></span></p></div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="glass-card p-5"><h3 class="font-bold text-gray-800 mb-4">服务统计</h3><canvas id="serviceStatsChart" height="180"></canvas></div>
        <div class="glass-card p-5"><h3 class="font-bold text-gray-800 mb-4">收入趋势</h3><canvas id="monthlyRevenueChart" height="180"></canvas></div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="glass-card p-5"><h3 class="font-bold text-gray-800 mb-3">今日订单</h3><div id="todayOrdersPreview" class="space-y-2 max-h-64 overflow-auto"></div></div>
        <div class="glass-card p-5"><h3 class="font-bold text-gray-800 mb-3">热门服务</h3><div id="topServicesContent" class="space-y-3"></div></div>
    </div>
</div>
