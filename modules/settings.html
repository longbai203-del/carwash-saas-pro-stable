<!-- ===== SETTINGS ===== -->
<div id="moduleSettings" class="module-content hidden">
    <div class="glass-card p-6">
        <h2 class="text-xl font-bold text-blue-600 mb-4">⚙️ 系统设置</h2>
        <div class="setting-section"><h4>🏪 店铺信息</h4><div class="setting-row"><label>店铺名称</label><input id="shopName" class="p-2 border rounded"></div><div class="setting-row"><label>税号</label><input id="shopTaxId" class="p-2 border rounded"></div></div>
        <div class="setting-section"><h4>💰 税务 & 提成</h4><div class="setting-row"><label>增值税率 (%)</label><input id="vatRateInput" class="p-2 border rounded" type="number" step="0.5"></div><div class="setting-row"><label>提成比例 (%)</label><input id="commissionRate" class="p-2 border rounded" type="number" step="0.5"></div></div>
        <div class="setting-section"><h4>👑 创建老板账号</h4><div class="flex gap-2 flex-wrap"><input id="adminCreateUsername" placeholder="用户名" class="p-2 border rounded flex-1"><input id="adminCreatePassword" type="password" placeholder="密码" class="p-2 border rounded flex-1"><button onclick="createAdminAccount()" class="btn-danger btn-sm">👑 创建老板账号</button></div><p class="text-xs text-amber-500 mt-1">⚠️ 只有老板可以创建老板账号，且无需审核</p></div>
        <div class="setting-section"><h4>💾 自动备份</h4><div class="setting-row"><label>启用自动备份</label><select id="backupEnabled" class="p-2 border rounded-lg"><option value="true">启用</option><option value="false">禁用</option></select></div><div class="setting-row"><label>备份频率</label><select id="backupFrequency" class="p-2 border rounded-lg"><option value="daily">每日</option><option value="weekly">每周</option><option value="monthly">每月</option></select></div><div class="flex gap-2 mt-2 flex-wrap"><button onclick="saveBackupConfig()" class="btn-primary btn-sm">保存备份设置</button><button onclick="manualBackup()" class="btn-success btn-sm">🔄 立即备份</button></div></div>
        <div class="setting-section"><h4>🏪 门店管理</h4><div class="flex gap-2 mb-2 flex-wrap"><input id="newBranchName" placeholder="门店名称" class="p-2 border rounded flex-1"><input id="newBranchAddress" placeholder="地址" class="p-2 border rounded flex-1"><button onclick="addBranch()" class="btn-primary btn-sm">添加门店</button></div><div id="branchList" class="space-y-1 max-h-48 overflow-auto"></div></div>
        <button onclick="saveSettings()" class="btn-primary py-2 rounded-lg w-full mt-4">保存所有设置</button>
    </div>
</div>
