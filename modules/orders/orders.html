<div id="ordersContainer" class="space-y-6">
    <div class="glass-card p-6">
        <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
            <h2 class="text-xl font-bold text-blue-600">📋 订单管理</h2>
            <div class="flex gap-2 flex-wrap">
                <button onclick="OrdersModule.refresh()" class="btn-primary btn-sm">
                    <i class="fas fa-sync"></i> 刷新
                </button>
                <button onclick="OrdersModule.exportOrders()" class="bg-green-600 text-white btn-sm">
                    <i class="fas fa-file-excel"></i> 导出
                </button>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-4">
            <div class="bg-blue-50 p-3 rounded-xl text-center">
                <div class="text-2xl font-bold text-blue-600" id="orderTotalCount">0</div>
                <div class="text-xs text-gray-500">总订单</div>
            </div>
            <div class="bg-green-50 p-3 rounded-xl text-center">
                <div class="text-2xl font-bold text-green-600" id="orderTodayCount">0</div>
                <div class="text-xs text-gray-500">今日订单</div>
            </div>
            <div class="bg-amber-50 p-3 rounded-xl text-center">
                <div class="text-2xl font-bold text-amber-600" id="orderPendingCount">0</div>
                <div class="text-xs text-gray-500">待处理</div>
            </div>
            <div class="bg-purple-50 p-3 rounded-xl text-center">
                <div class="text-2xl font-bold text-purple-600" id="orderCompletedCount">0</div>
                <div class="text-xs text-gray-500">已完成</div>
            </div>
            <div class="bg-red-50 p-3 rounded-xl text-center">
                <div class="text-2xl font-bold text-red-600" id="orderCancelledCount">0</div>
                <div class="text-xs text-gray-500">已取消</div>
            </div>
        </div>

        <!-- 筛选 -->
        <div class="flex gap-3 mb-4 flex-wrap">
            <select id="orderStatusFilter" class="p-3 border rounded-xl bg-gray-50">
                <option value="all">全部状态</option>
                <option value="pending">⏳ 待确认</option>
                <option value="confirmed">✅ 已确认</option>
                <option value="in_progress">🔄 施工中</option>
                <option value="completed">✔️ 已完成</option>
                <option value="cancelled">❌ 已取消</option>
            </select>
            <input type="date" id="orderDateFilter" class="p-3 border rounded-xl bg-gray-50">
            <input type="text" id="orderSearch" placeholder="🔍 搜索订单号/车牌..." class="flex-1 p-3 border rounded-xl bg-gray-50 min-w-[150px]">
            <button onclick="OrdersModule.loadData()" class="btn-primary px-4 py-3 rounded-xl">筛选</button>
        </div>

        <!-- 订单列表 -->
        <div id="ordersList" class="space-y-2 max-h-[500px] overflow-auto"></div>
    </div>
</div>
