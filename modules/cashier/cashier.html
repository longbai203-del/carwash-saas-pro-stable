<div id="cashierContainer" class="space-y-6">
    
    <!-- ===== 收银台主体 ===== -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- ===== 左侧：商品选择 ===== -->
        <div class="lg:col-span-2 glass-card p-6">
            <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
                <h2 class="text-xl font-bold text-blue-600">🧼 快速收银</h2>
                <div class="flex gap-2">
                    <span class="text-xs bg-green-100 text-green-600 px-3 py-1 rounded-full" id="cashierStatus">🟢 在线</span>
                </div>
            </div>

            <!-- 客户信息 -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                <div>
                    <label class="text-sm font-medium text-gray-600">👤 客户</label>
                    <select id="posCustomer" class="w-full mt-1 p-3 border rounded-xl bg-gray-50">
                        <option value="">散客</option>
                    </select>
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-600">👨‍🔧 员工</label>
                    <select id="posEmployee" class="w-full mt-1 p-3 border rounded-xl bg-gray-50"></select>
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-600">🚗 车牌号</label>
                    <input id="posPlate" class="w-full p-3 border rounded-xl uppercase bg-gray-50" placeholder="输入车牌号">
                </div>
            </div>

            <!-- 快捷服务按钮 -->
            <div class="mb-4">
                <label class="text-sm font-medium text-gray-600 block mb-2">⚡ 快捷服务</label>
                <div class="flex gap-2 flex-wrap" id="quickServices">
                    <button onclick="CashierModule.selectService('基础清洗', 30)" class="service-btn bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-xl border border-blue-200 text-sm">
                        🧽 基础清洗 <span class="text-blue-600 font-bold">30 SAR</span>
                    </button>
                    <button onclick="CashierModule.selectService('深度清洗', 55)" class="service-btn bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-xl border border-blue-200 text-sm">
                        🧼 深度清洗 <span class="text-blue-600 font-bold">55 SAR</span>
                    </button>
                    <button onclick="CashierModule.selectService('外部抛光', 65)" class="service-btn bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-xl border border-blue-200 text-sm">
                        ✨ 外部抛光 <span class="text-blue-600 font-bold">65 SAR</span>
                    </button>
                    <button onclick="CashierModule.selectService('内部护理', 70)" class="service-btn bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-xl border border-blue-200 text-sm">
                        🪑 内部护理 <span class="text-blue-600 font-bold">70 SAR</span>
                    </button>
                    <button onclick="CashierModule.selectService('全车精洗', 110)" class="service-btn bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-xl border border-blue-200 text-sm">
                        🚗 全车精洗 <span class="text-blue-600 font-bold">110 SAR</span>
                    </button>
                    <button onclick="CashierModule.selectService('全车镀晶', 299)" class="service-btn bg-purple-50 hover:bg-purple-100 px-4 py-2 rounded-xl border border-purple-200 text-sm">
                        💎 全车镀晶 <span class="text-purple-600 font-bold">299 SAR</span>
                    </button>
                </div>
            </div>

            <!-- 服务选择和金额 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
                <div>
                    <label class="text-sm font-medium text-gray-600">📋 服务项目</label>
                    <select id="posService" class="w-full mt-1 p-3 border rounded-xl bg-gray-50">
                        <option value="基础清洗">基础清洗 (30 SAR)</option>
                        <option value="深度清洗">深度清洗 (55 SAR)</option>
                        <option value="外部抛光">外部抛光 (65 SAR)</option>
                        <option value="内部护理">内部护理 (70 SAR)</option>
                        <option value="全车精洗">全车精洗 (110 SAR)</option>
                        <option value="全车镀晶">全车镀晶 (299 SAR)</option>
                    </select>
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-600">💳 支付方式</label>
                    <select id="posPayment" class="w-full mt-1 p-3 border rounded-xl bg-gray-50">
                        <option value="cash">💰 现金</option>
                        <option value="card">💳 银行卡</option>
                        <option value="mada">🇸🇦 mada</option>
                        <option value="apple_pay">📱 Apple Pay</option>
                        <option value="google_pay">📱 Google Pay</option>
                        <option value="bank_transfer">🏦 银行转账</option>
                    </select>
                </div>
            </div>

            <!-- 金额输入 -->
            <div class="mb-4">
                <label class="text-sm font-medium text-gray-600">💰 金额 (SAR)</label>
                <input type="number" id="posAmount" class="w-full p-3 border-2 border-blue-300 rounded-xl text-xl font-bold" value="30" step="1" min="0">
            </div>

            <!-- 客户信息卡片 -->
            <div id="posCustomerInfo" class="hidden p-3 bg-green-50 rounded-xl mb-4">
                <div class="flex justify-between items-center flex-wrap">
                    <div>
                        <span class="font-bold">👤 <span id="posCustName">-</span></span>
                        <span class="mx-2 text-gray-400">|</span>
                        <span>💰 余额: <span id="posCustBalance">0 SAR</span></span>
                        <span class="mx-2 text-gray-400">|</span>
                        <span>⭐ 积分: <span id="posCustPoints">0</span></span>
                    </div>
                    <span class="customer-level" id="posCustLevel">普通</span>
                </div>
            </div>
        </div>

        <!-- ===== 右侧：结算面板 ===== -->
        <div class="lg:col-span-1">
            <div class="glass-card p-6 sticky top-6">
                <h3 class="font-bold text-gray-800 mb-4">🧾 结算清单</h3>
                
                <div class="space-y-2 mb-4 max-h-48 overflow-auto" id="orderItemsList">
                    <div class="text-center text-gray-400 py-4 text-sm">暂无商品</div>
                </div>

                <div class="border-t pt-4 space-y-2">
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-500">小计</span>
                        <span id="posSubtotal" class="font-mono">0.00 SAR</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-500">增值税 (15%)</span>
                        <span id="posVat" class="font-mono text-amber-600">0.00 SAR</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-500">折扣</span>
                        <span id="posDiscount" class="font-mono text-green-600">0.00 SAR</span>
                    </div>
                    <div class="flex justify-between text-2xl font-bold text-blue-600 pt-2 border-t">
                        <span>总计</span>
                        <span id="posTotal">0.00 SAR</span>
                    </div>
                </div>

                <!-- 折扣输入 -->
                <div class="mt-4">
                    <label class="text-xs text-gray-500">🎫 折扣金额 (SAR)</label>
                    <input type="number" id="posDiscountInput" class="w-full p-2 border rounded-lg text-sm mt-1 bg-gray-50" value="0" step="1" min="0" oninput="CashierModule.updatePrice()">
                </div>

                <!-- 操作按钮 -->
                <div class="grid grid-cols-2 gap-2 mt-4">
                    <button onclick="CashierModule.saveOrder()" class="btn-primary py-3 rounded-xl font-bold">
                        <i class="fas fa-save"></i> 保存
                    </button>
                    <button onclick="CashierModule.showPrintOptions()" class="bg-purple-600 hover:bg-purple-700 py-3 rounded-xl text-white font-bold">
                        <i class="fas fa-print"></i> 打印
                    </button>
                    <button onclick="CashierModule.voiceTotal()" class="bg-emerald-600 hover:bg-emerald-700 py-3 rounded-xl text-white font-bold">
                        <i class="fas fa-volume-up"></i> 语音
                    </button>
                    <button onclick="CashierModule.findCustomer()" class="bg-amber-500 hover:bg-amber-600 py-3 rounded-xl text-white font-bold">
                        <i class="fas fa-search"></i> 查客户
                    </button>
                    <button onclick="CashierModule.clearOrder()" class="bg-gray-500 hover:bg-gray-600 py-3 rounded-xl text-white font-bold col-span-2">
                        <i class="fas fa-trash"></i> 清空
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 今日订单列表 ===== -->
    <div class="glass-card p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-gray-800">📋 今日订单</h3>
            <div class="flex gap-2">
                <span class="text-sm text-gray-500">今日收入: <span id="todayRevenue" class="font-bold text-green-600">0 SAR</span></span>
                <span class="text-sm text-gray-500">订单数: <span id="todayOrderCount" class="font-bold text-blue-600">0</span></span>
            </div>
        </div>
        <div id="todayOrdersList" class="max-h-72 overflow-auto space-y-2"></div>
    </div>

</div>

<!-- ===== 打印选项弹窗 ===== -->
<div id="printOptionsModal" class="modal-glass hidden">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-6 mx-4">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold text-blue-600">🖨️ 打印选项</h3>
            <button onclick="CashierModule.closePrintOptions()" class="text-gray-400 hover:text-gray-600">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div class="space-y-3">
            <button onclick="CashierModule.printReceipt()" class="w-full btn-primary py-3 rounded-xl font-bold text-lg">
                <i class="fas fa-receipt"></i> 小票打印（热敏）
            </button>
            <button onclick="CashierModule.printTaxInvoice()" class="w-full bg-green-600 hover:bg-green-700 py-3 rounded-xl text-white font-bold text-lg">
                <i class="fas fa-file-invoice"></i> 税务发票（A4）
            </button>
            <button onclick="CashierModule.closePrintOptions()" class="w-full btn-outline py-3 rounded-xl font-bold text-lg">
                取消
            </button>
        </div>
    </div>
</div>
