<!-- 05-customers/gift-cards.html -->
<div class="page-container" data-page="05-customers-gift-cards">
    <div class="page-header">
        <h1><i class="fas fa-gift"></i> 礼品卡管理</h1>
        <div class="page-actions">
            <button class="btn btn-primary" onclick="window.GiftCardModule.newGiftCard()">
                <i class="fas fa-plus"></i> 新建礼品卡
            </button>
            <button class="btn btn-success" onclick="window.GiftCardModule.rechargeCard()">
                <i class="fas fa-plus-circle"></i> 充值
            </button>
            <button class="btn btn-outline" onclick="location.reload()">
                <i class="fas fa-sync-alt"></i> 刷新
            </button>
        </div>
    </div>
    <div class="page-content">
        <div class="giftcard-container">
            <!-- 统计卡片 -->
            <div class="giftcard-stats">
                <div class="stat-card">
                    <span class="stat-label">总礼品卡</span>
                    <span class="stat-number" id="totalCards">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">有效</span>
                    <span class="stat-number" id="activeCards">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">已使用</span>
                    <span class="stat-number" id="usedCards">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">总余额</span>
                    <span class="stat-number" id="totalBalance">¥0</span>
                </div>
            </div>

            <!-- 搜索栏 -->
            <div class="giftcard-search">
                <input type="text" id="giftCardSearch" placeholder="搜索卡号或客户名称..." 
                       oninput="window.GiftCardModule.search(this.value)" />
                <select id="giftCardStatusFilter" onchange="window.GiftCardModule.filterByStatus(this.value)">
                    <option value="">全部状态</option>
                    <option value="active">有效</option>
                    <option value="used">已使用</option>
                    <option value="expired">已过期</option>
                </select>
                <button class="btn btn-primary" onclick="window.GiftCardModule.searchCards()">
                    <i class="fas fa-search"></i> 搜索
                </button>
            </div>

            <!-- 礼品卡列表 -->
            <div class="giftcard-grid" id="giftCardGrid">
                <!-- 由JS生成 -->
            </div>

            <!-- 分页 -->
            <div class="giftcard-pagination" id="giftCardPagination">
                <span id="giftCardTotal">共 0 条记录</span>
                <div class="pagination-btns">
                    <button onclick="window.GiftCardModule.prevPage()"><i class="fas fa-chevron-left"></i></button>
                    <span id="giftCardPageInfo">1/1</span>
                    <button onclick="window.GiftCardModule.nextPage()"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .giftcard-container { max-width: 1200px; margin: 0 auto; }
    
    .giftcard-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
    .giftcard-stats .stat-card { background: white; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #e5e7eb; }
    .giftcard-stats .stat-card .stat-label { display: block; font-size: 13px; color: #6B7280; }
    .giftcard-stats .stat-card .stat-number { display: block; font-size: 28px; font-weight: 700; color: #1F2937; margin-top: 4px; }
    .giftcard-stats .stat-card:nth-child(1) .stat-number { color: #4F46E5; }
    .giftcard-stats .stat-card:nth-child(2) .stat-number { color: #10B981; }
    .giftcard-stats .stat-card:nth-child(3) .stat-number { color: #F59E0B; }
    .giftcard-stats .stat-card:nth-child(4) .stat-number { color: #8B5CF6; }
    
    .giftcard-search { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .giftcard-search input { flex: 1; padding: 8px 14px; border: 1px solid #D1D5DB; border-radius: 6px; font-size: 14px; min-width: 200px; }
    .giftcard-search input:focus { outline: none; border-color: #4F46E5; }
    .giftcard-search select { padding: 8px 14px; border: 1px solid #D1D5DB; border-radius: 6px; font-size: 14px; background: white; }
    
    .giftcard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .giftcard-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 16px; padding: 20px; color: white; transition: all 0.3s; cursor: pointer; }
    .giftcard-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4); }
    .giftcard-card .card-number { font-family: monospace; font-size: 22px; font-weight: 700; letter-spacing: 2px; margin: 8px 0; }
    .giftcard-card .card-balance { font-size: 28px; font-weight: 700; }
    .giftcard-card .card-holder { font-size: 14px; opacity: 0.8; }
    .giftcard-card .card-meta { display: flex; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.2); font-size: 13px; opacity: 0.8; }
    .giftcard-card .card-status { padding: 4px 12px; border-radius: 9999px; font-size: 12px; font-weight: 500; background: rgba(255,255,255,0.2); }
    .giftcard-card .card-status.active { background: rgba(16, 185, 129, 0.3); }
    .giftcard-card .card-status.used { background: rgba(245, 158, 11, 0.3); }
    .giftcard-card .card-status.expired { background: rgba(239, 68, 68, 0.3); }
    
    .empty-giftcards { grid-column: 1 / -1; text-align: center; padding: 60px 0; color: #9CA3AF; }
    .empty-giftcards i { font-size: 48px; margin-bottom: 12px; }
    
    .giftcard-pagination { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: white; border-radius: 12px; margin-top: 16px; border: 1px solid #e5e7eb; }
    .giftcard-pagination .pagination-btns { display: flex; gap: 4px; align-items: center; }
    .giftcard-pagination button { padding: 4px 12px; border: 1px solid #D1D5DB; border-radius: 4px; background: white; cursor: pointer; }
    .giftcard-pagination button:hover { background: #F3F4F6; }
    
    [data-theme="dark"] .giftcard-stats .stat-card,
    [data-theme="dark"] .giftcard-pagination { background: #2C2C2E; border-color: #48484A; }
    [data-theme="dark"] .giftcard-stats .stat-card .stat-number { color: #F5F5F7; }
    [data-theme="dark"] .giftcard-search input,
    [data-theme="dark"] .giftcard-search select { background: #3A3A3C; border-color: #48484A; color: #F5F5F7; }
    
    @media (max-width: 768px) { .giftcard-stats { grid-template-columns: repeat(2, 1fr); } }
</style>

<script>
    /**
     * GiftCardModule - 礼品卡管理模块
     * @module GiftCardModule
     * @description 管理礼品卡的创建、充值、使用和统计
     */
    (function() {
        'use strict';

        /** @type {Object} GiftCardModule - 礼品卡管理模块 */
        window.GiftCardModule = {
            /** @type {Array<Object>} 所有礼品卡数据 */
            cards: [],
            /** @type {Array<Object>} 筛选后的礼品卡数据 */
            filteredCards: [],
            /** @type {number} 当前页码 */
            page: 1,
            /** @type {number} 每页显示数量 */
            pageSize: 10,
            
            /**
             * 初始化模块
             * @returns {void}
             */
            init: function() {
                this.loadCards();
                this.render();
            },
            
            /**
             * 从localStorage加载礼品卡数据
             * @returns {void}
             */
            loadCards: function() {
                const saved = localStorage.getItem('giftcard_data');
                if (saved) {
                    try {
                        this.cards = JSON.parse(saved);
                    } catch (e) {
                        this.cards = this.getMockCards();
                    }
                } else {
                    this.cards = this.getMockCards();
                    localStorage.setItem('giftcard_data', JSON.stringify(this.cards));
                }
                this.filteredCards = [...this.cards];
            },
            
            /**
             * 获取模拟礼品卡数据
             * @returns {Array<Object>} 礼品卡数组
             */
            getMockCards: function() {
                return [
                    { id: 'GC-001', number: '8800 1234 5678 9012', holder: '张伟', balance: 500, status: 'active', created: '2024-01-01', used: 0 },
                    { id: 'GC-002', number: '8800 2345 6789 0123', holder: '李娜', balance: 200, status: 'active', created: '2024-01-15', used: 0 },
                    { id: 'GC-003', number: '8800 3456 7890 1234', holder: '王强', balance: 0, status: 'used', created: '2024-02-01', used: 100 },
                    { id: 'GC-004', number: '8800 4567 8901 2345', holder: '刘洋', balance: 50, status: 'expired', created: '2023-12-01', used: 50 }
                ];
            },
            
            /**
             * 渲染礼品卡列表
             * @returns {void}
             */
            render: function() {
                const grid = document.getElementById('giftCardGrid');
                const start = (this.page - 1) * this.pageSize;
                const end = start + this.pageSize;
                const pageData = this.filteredCards.slice(start, end);
                
                if (pageData.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-giftcards">
                            <i class="fas fa-gift"></i>
                            <p>暂无礼品卡</p>
                        </div>
                    `;
                } else {
                    const statusMap = { active: '有效', used: '已使用', expired: '已过期' };
                    
                    grid.innerHTML = pageData.map(c => `
                        <div class="giftcard-card">
                            <div style="display:flex;justify-content:space-between;align-items:center;">
                                <span style="font-size:12px;opacity:0.7;">🎁 礼品卡</span>
                                <span class="card-status ${c.status}">${statusMap[c.status] || c.status}</span>
                            </div>
                            <div class="card-number">${c.number}</div>
                            <div class="card-balance">¥${c.balance.toFixed(2)}</div>
                            <div class="card-holder">👤 ${c.holder}</div>
                            <div class="card-meta">
                                <span>📅 ${c.created}</span>
                                <span>已用 ¥${c.used || 0}</span>
                            </div>
                            <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end;">
                                ${c.status === 'active' ? `
                                    <button onclick="window.GiftCardModule.useCard('${c.id}')" style="padding:4px 12px;border:none;border-radius:4px;background:rgba(255,255,255,0.2);color:white;cursor:pointer;font-size:12px;">
                                        使用
                                    </button>
                                ` : ''}
                                <button onclick="window.GiftCardModule.deleteCard('${c.id}')" style="padding:4px 12px;border:none;border-radius:4px;background:rgba(255,255,255,0.2);color:white;cursor:pointer;font-size:12px;">
                                    删除
                                </button>
                            </div>
                        </div>
                    `).join('');
                }
                
                this.updateStats();
                this.renderPagination();
            },
            
            /**
             * 更新统计卡片
             * @returns {void}
             */
            updateStats: function() {
                document.getElementById('totalCards').textContent = this.cards.length;
                document.getElementById('activeCards').textContent = this.cards.filter(c => c.status === 'active').length;
                document.getElementById('usedCards').textContent = this.cards.filter(c => c.status === 'used').length;
                const total = this.cards.reduce((sum, c) => sum + c.balance, 0);
                document.getElementById('totalBalance').textContent = '¥' + total.toFixed(2);
            },
            
            /**
             * 渲染分页
             * @returns {void}
             */
            renderPagination: function() {
                const total = this.filteredCards.length;
                const totalPages = Math.ceil(total / this.pageSize) || 1;
                document.getElementById('giftCardTotal').textContent = '共 ' + total + ' 条记录';
                document.getElementById('giftCardPageInfo').textContent = this.page + '/' + totalPages;
            },
            
            /**
             * 新建礼品卡
             * @returns {void}
             */
            newGiftCard: function() {
                const holder = prompt('输入持卡人名称：');
                if (!holder) return;
                const amount = parseFloat(prompt('输入初始金额：'));
                if (isNaN(amount) || amount <= 0) return;
                
                const number = '8800 ' + 
                    String(Math.floor(Math.random() * 10000)).padStart(4, '0') + ' ' +
                    String(Math.floor(Math.random() * 10000)).padStart(4, '0') + ' ' +
                    String(Math.floor(Math.random() * 10000)).padStart(4, '0');
                
                const card = {
                    id: 'GC-' + Date.now().toString().slice(-6),
                    number: number,
                    holder: holder,
                    balance: amount,
                    status: 'active',
                    created: new Date().toISOString().slice(0, 10),
                    used: 0
                };
                this.cards.push(card);
                this.filteredCards = [...this.cards];
                localStorage.setItem('giftcard_data', JSON.stringify(this.cards));
                this.render();
                alert('礼品卡已创建: ' + number);
            },
            
            /**
             * 充值礼品卡
             * @returns {void}
             */
            rechargeCard: function() {
                const number = prompt('输入礼品卡号：');
                if (!number) return;
                const card = this.cards.find(c => c.number === number);
                if (!card) {
                    alert('未找到该礼品卡');
                    return;
                }
                const amount = parseFloat(prompt('输入充值金额：'));
                if (isNaN(amount) || amount <= 0) return;
                card.balance += amount;
                localStorage.setItem('giftcard_data', JSON.stringify(this.cards));
                this.render();
                alert('充值成功！当前余额: ¥' + card.balance.toFixed(2));
            },
            
            /**
             * 搜索礼品卡
             * @param {string} query - 搜索关键词
             * @returns {void}
             */
            search: function(query) {
                if (!query || query.length < 2) {
                    this.filteredCards = [...this.cards];
                } else {
                    this.filteredCards = this.cards.filter(c => 
                        c.number.includes(query) || 
                        c.holder.includes(query)
                    );
                }
                this.page = 1;
                this.render();
            },
            
            /**
             * 按状态筛选
             * @param {string} status - 状态值
             * @returns {void}
             */
            filterByStatus: function(status) {
                if (!status) {
                    this.filteredCards = [...this.cards];
                } else {
                    this.filteredCards = this.cards.filter(c => c.status === status);
                }
                this.page = 1;
                this.render();
            },
            
            /**
             * 执行搜索
             * @returns {void}
             */
            searchCards: function() {
                const query = document.getElementById('giftCardSearch').value;
                this.search(query);
            },
            
            /**
             * 使用礼品卡
             * @param {string} id - 礼品卡ID
             * @returns {void}
             */
            useCard: function(id) {
                const amount = parseFloat(prompt('输入使用金额：'));
                if (isNaN(amount) || amount <= 0) return;
                const card = this.cards.find(c => c.id === id);
                if (card) {
                    if (card.balance < amount) {
                        alert('余额不足！当前余额: ¥' + card.balance.toFixed(2));
                        return;
                    }
                    card.balance -= amount;
                    card.used = (card.used || 0) + amount;
                    if (card.balance === 0) {
                        card.status = 'used';
                    }
                    localStorage.setItem('giftcard_data', JSON.stringify(this.cards));
                    this.render();
                    alert('使用成功！剩余余额: ¥' + card.balance.toFixed(2));
                }
            },
            
            /**
             * 删除礼品卡
             * @param {string} id - 礼品卡ID
             * @returns {void}
             */
            deleteCard: function(id) {
                if (!confirm('确认删除该礼品卡？')) return;
                this.cards = this.cards.filter(c => c.id !== id);
                this.filteredCards = [...this.cards];
                localStorage.setItem('giftcard_data', JSON.stringify(this.cards));
                this.render();
                alert('礼品卡已删除');
            },
            
            /**
             * 上一页
             * @returns {void}
             */
            prevPage: function() {
                if (this.page > 1) {
                    this.page--;
                    this.render();
                }
            },
            
            /**
             * 下一页
             * @returns {void}
             */
            nextPage: function() {
                const totalPages = Math.ceil(this.filteredCards.length / this.pageSize);
                if (this.page < totalPages) {
                    this.page++;
                    this.render();
                }
            }
        };
        
        document.addEventListener('DOMContentLoaded', function() {
            window.GiftCardModule.init();
        });
    })();
</script>
