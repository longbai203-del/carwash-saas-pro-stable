<!-- 05-customers/feedback.html -->
<div class="page-container" data-page="05-customers-feedback">
    <div class="page-header">
        <h1><i class="fas fa-comment-dots"></i> 客户反馈</h1>
        <div class="page-actions">
            <button class="btn btn-primary" onclick="window.FeedbackModule.newFeedback()">
                <i class="fas fa-plus"></i> 新建反馈
            </button>
            <button class="btn btn-success" onclick="window.FeedbackModule.exportFeedback()">
                <i class="fas fa-file-excel"></i> 导出
            </button>
            <button class="btn btn-outline" onclick="location.reload()">
                <i class="fas fa-sync-alt"></i> 刷新
            </button>
        </div>
    </div>
    <div class="page-content">
        <div class="feedback-container">
            <!-- 统计卡片 -->
            <div class="feedback-stats">
                <div class="stat-card">
                    <span class="stat-label">总反馈</span>
                    <span class="stat-number" id="totalFeedback">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">好评</span>
                    <span class="stat-number" id="positiveFeedback">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">中评</span>
                    <span class="stat-number" id="neutralFeedback">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">差评</span>
                    <span class="stat-number" id="negativeFeedback">0</span>
                </div>
            </div>

            <!-- 搜索栏 -->
            <div class="feedback-search">
                <input type="text" id="feedbackSearch" placeholder="搜索客户名称或内容..." 
                       oninput="window.FeedbackModule.search(this.value)" />
                <select id="feedbackRatingFilter" onchange="window.FeedbackModule.filterByRating(this.value)">
                    <option value="">全部评分</option>
                    <option value="5">⭐⭐⭐⭐⭐ 好评</option>
                    <option value="4">⭐⭐⭐⭐ 中评</option>
                    <option value="3">⭐⭐⭐ 中评</option>
                    <option value="2">⭐⭐ 差评</option>
                    <option value="1">⭐ 差评</option>
                </select>
                <button class="btn btn-primary" onclick="window.FeedbackModule.searchFeedback()">
                    <i class="fas fa-search"></i> 搜索
                </button>
            </div>

            <!-- 反馈列表 -->
            <div class="feedback-list" id="feedbackList">
                <!-- 由JS生成 -->
            </div>

            <!-- 分页 -->
            <div class="feedback-pagination" id="feedbackPagination">
                <span id="feedbackTotal">共 0 条记录</span>
                <div class="pagination-btns">
                    <button onclick="window.FeedbackModule.prevPage()"><i class="fas fa-chevron-left"></i></button>
                    <span id="feedbackPageInfo">1/1</span>
                    <button onclick="window.FeedbackModule.nextPage()"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .feedback-container { max-width: 1000px; margin: 0 auto; }
    
    .feedback-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
    .feedback-stats .stat-card { background: white; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #e5e7eb; }
    .feedback-stats .stat-card .stat-label { display: block; font-size: 13px; color: #6B7280; }
    .feedback-stats .stat-card .stat-number { display: block; font-size: 28px; font-weight: 700; color: #1F2937; margin-top: 4px; }
    .feedback-stats .stat-card:nth-child(1) .stat-number { color: #4F46E5; }
    .feedback-stats .stat-card:nth-child(2) .stat-number { color: #10B981; }
    .feedback-stats .stat-card:nth-child(3) .stat-number { color: #F59E0B; }
    .feedback-stats .stat-card:nth-child(4) .stat-number { color: #EF4444; }
    
    .feedback-search { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .feedback-search input { flex: 1; padding: 8px 14px; border: 1px solid #D1D5DB; border-radius: 6px; font-size: 14px; min-width: 200px; }
    .feedback-search input:focus { outline: none; border-color: #4F46E5; }
    .feedback-search select { padding: 8px 14px; border: 1px solid #D1D5DB; border-radius: 6px; font-size: 14px; background: white; }
    
    .feedback-list { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #e5e7eb; }
    .feedback-item { padding: 16px 20px; border-bottom: 1px solid #F3F4F6; transition: background 0.2s; }
    .feedback-item:last-child { border-bottom: none; }
    .feedback-item:hover { background: #F9FAFB; }
    .feedback-item .feedback-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .feedback-item .feedback-customer { font-weight: 600; }
    .feedback-item .feedback-rating { color: #F59E0B; font-size: 16px; }
    .feedback-item .feedback-date { font-size: 13px; color: #6B7280; }
    .feedback-item .feedback-content { font-size: 14px; color: #374151; margin: 4px 0; }
    .feedback-item .feedback-actions { display: flex; gap: 8px; margin-top: 8px; }
    .feedback-item .feedback-actions button { padding: 4px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .feedback-item .feedback-actions .btn-reply { background: #4F46E5; color: white; }
    .feedback-item .feedback-actions .btn-reply:hover { background: #4338CA; }
    .feedback-item .feedback-actions .btn-delete { background: #EF4444; color: white; }
    .feedback-item .feedback-actions .btn-delete:hover { background: #DC2626; }
    
    .empty-feedback { text-align: center; padding: 60px 0; color: #9CA3AF; }
    .empty-feedback i { font-size: 48px; margin-bottom: 12px; }
    
    .feedback-pagination { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: white; border-radius: 12px; margin-top: 16px; border: 1px solid #e5e7eb; }
    .feedback-pagination .pagination-btns { display: flex; gap: 4px; align-items: center; }
    .feedback-pagination button { padding: 4px 12px; border: 1px solid #D1D5DB; border-radius: 4px; background: white; cursor: pointer; }
    .feedback-pagination button:hover { background: #F3F4F6; }
    
    [data-theme="dark"] .feedback-stats .stat-card,
    [data-theme="dark"] .feedback-list,
    [data-theme="dark"] .feedback-pagination { background: #2C2C2E; border-color: #48484A; }
    [data-theme="dark"] .feedback-stats .stat-card .stat-number { color: #F5F5F7; }
    [data-theme="dark"] .feedback-item { border-color: #3A3A3C; }
    [data-theme="dark"] .feedback-item:hover { background: #3A3A3C; }
    [data-theme="dark"] .feedback-search input,
    [data-theme="dark"] .feedback-search select { background: #3A3A3C; border-color: #48484A; color: #F5F5F7; }
    
    @media (max-width: 768px) { .feedback-stats { grid-template-columns: repeat(2, 1fr); } }
</style>

<script>
    /**
     * FeedbackModule - 客户反馈管理模块
     * @module FeedbackModule
     * @description 管理客户反馈、评价和回复
     */
    (function() {
        'use strict';

        /** @type {Object} FeedbackModule - 客户反馈管理模块 */
        window.FeedbackModule = {
            /** @type {Array<Object>} 所有反馈数据 */
            feedbacks: [],
            /** @type {Array<Object>} 筛选后的反馈数据 */
            filteredFeedbacks: [],
            /** @type {number} 当前页码 */
            page: 1,
            /** @type {number} 每页显示数量 */
            pageSize: 10,
            
            /**
             * 初始化模块
             * @returns {void}
             */
            init: function() {
                this.loadFeedbacks();
                this.render();
            },
            
            /**
             * 从localStorage加载反馈数据
             * @returns {void}
             */
            loadFeedbacks: function() {
                const saved = localStorage.getItem('feedback_data');
                if (saved) {
                    try {
                        this.feedbacks = JSON.parse(saved);
                    } catch (e) {
                        this.feedbacks = this.getMockFeedbacks();
                    }
                } else {
                    this.feedbacks = this.getMockFeedbacks();
                    localStorage.setItem('feedback_data', JSON.stringify(this.feedbacks));
                }
                this.filteredFeedbacks = [...this.feedbacks];
            },
            
            /**
             * 获取模拟反馈数据
             * @returns {Array<Object>} 反馈数组
             */
            getMockFeedbacks: function() {
                return [
                    { id: 'FB-001', customer: '张伟', rating: 5, content: '服务非常好，洗得很干净！', reply: '', date: '2024-01-15 14:30', status: 'pending' },
                    { id: 'FB-002', customer: '李娜', rating: 4, content: '整体不错，但等待时间有点长', reply: '感谢您的反馈，我们会优化流程', date: '2024-01-16 09:20', status: 'replied' },
                    { id: 'FB-003', customer: '王强', rating: 2, content: '洗车效果一般，有地方没洗干净', reply: '', date: '2024-01-17 16:45', status: 'pending' },
                    { id: 'FB-004', customer: '刘洋', rating: 5, content: '非常满意，下次还会来！', reply: '感谢您的支持！', date: '2024-01-18 11:00', status: 'replied' },
                    { id: 'FB-005', customer: '陈静', rating: 3, content: '价格有点贵，但服务还可以', reply: '', date: '2024-01-19 13:15', status: 'pending' }
                ];
            },
            
            /**
             * 渲染反馈列表
             * @returns {void}
             */
            render: function() {
                const container = document.getElementById('feedbackList');
                const start = (this.page - 1) * this.pageSize;
                const end = start + this.pageSize;
                const pageData = this.filteredFeedbacks.slice(start, end);
                
                if (pageData.length === 0) {
                    container.innerHTML = `
                        <div class="empty-feedback">
                            <i class="fas fa-comment-dots"></i>
                            <p>暂无反馈</p>
                        </div>
                    `;
                } else {
                    container.innerHTML = pageData.map(f => `
                        <div class="feedback-item">
                            <div class="feedback-header">
                                <div>
                                    <span class="feedback-customer">${f.customer}</span>
                                    <span class="feedback-rating">${'⭐'.repeat(f.rating)}</span>
                                </div>
                                <span class="feedback-date">${f.date}</span>
                            </div>
                            <div class="feedback-content">${f.content}</div>
                            ${f.reply ? `<div style="font-size:13px;color:#4F46E5;margin-top:4px;">💬 回复: ${f.reply}</div>` : ''}
                            <div class="feedback-actions">
                                ${!f.reply ? `<button class="btn-reply" onclick="window.FeedbackModule.replyFeedback('${f.id}')"><i class="fas fa-reply"></i> 回复</button>` : ''}
                                <button class="btn-delete" onclick="window.FeedbackModule.deleteFeedback('${f.id}')"><i class="fas fa-trash"></i> 删除</button>
                            </div>
                        </div>
                    `).join('');
                }
                
                this.updateStats();
                this.renderPagination();
            },
            
            /**
             * 更新统计卡片
             * @returns {void}
             */
            updateStats: function() {
                document.getElementById('totalFeedback').textContent = this.feedbacks.length;
                document.getElementById('positiveFeedback').textContent = this.feedbacks.filter(f => f.rating >= 4).length;
                document.getElementById('neutralFeedback').textContent = this.feedbacks.filter(f => f.rating === 3).length;
                document.getElementById('negativeFeedback').textContent = this.feedbacks.filter(f => f.rating <= 2).length;
            },
            
            /**
             * 渲染分页
             * @returns {void}
             */
            renderPagination: function() {
                const total = this.filteredFeedbacks.length;
                const totalPages = Math.ceil(total / this.pageSize) || 1;
                document.getElementById('feedbackTotal').textContent = '共 ' + total + ' 条记录';
                document.getElementById('feedbackPageInfo').textContent = this.page + '/' + totalPages;
            },
            
            /**
             * 新建反馈
             * @returns {void}
             */
            newFeedback: function() {
                const customer = prompt('输入客户名称：');
                if (!customer) return;
                const rating = parseInt(prompt('评分 (1-5)：', '5'));
                if (isNaN(rating) || rating < 1 || rating > 5) return;
                const content = prompt('输入反馈内容：');
                if (!content) return;
                
                const feedback = {
                    id: 'FB-' + Date.now().toString().slice(-6),
                    customer: customer,
                    rating: rating,
                    content: content,
                    reply: '',
                    date: new Date().toLocaleString(),
                    status: 'pending'
                };
                this.feedbacks.push(feedback);
                this.filteredFeedbacks = [...this.feedbacks];
                localStorage.setItem('feedback_data', JSON.stringify(this.feedbacks));
                this.render();
                alert('反馈已添加');
            },
            
            /**
             * 搜索反馈
             * @param {string} query - 搜索关键词
             * @returns {void}
             */
            search: function(query) {
                if (!query || query.length < 2) {
                    this.filteredFeedbacks = [...this.feedbacks];
                } else {
                    this.filteredFeedbacks = this.feedbacks.filter(f => 
                        f.customer.includes(query) || 
                        f.content.includes(query)
                    );
                }
                this.page = 1;
                this.render();
            },
            
            /**
             * 按评分筛选
             * @param {string} rating - 评分值
             * @returns {void}
             */
            filterByRating: function(rating) {
                if (!rating) {
                    this.filteredFeedbacks = [...this.feedbacks];
                } else {
                    this.filteredFeedbacks = this.feedbacks.filter(f => f.rating === parseInt(rating));
                }
                this.page = 1;
                this.render();
            },
            
            /**
             * 执行搜索
             * @returns {void}
             */
            searchFeedback: function() {
                const query = document.getElementById('feedbackSearch').value;
                this.search(query);
            },
            
            /**
             * 回复反馈
             * @param {string} id - 反馈ID
             * @returns {void}
             */
            replyFeedback: function(id) {
                const reply = prompt('输入回复内容：');
                if (!reply) return;
                const feedback = this.feedbacks.find(f => f.id === id);
                if (feedback) {
                    feedback.reply = reply;
                    feedback.status = 'replied';
                    localStorage.setItem('feedback_data', JSON.stringify(this.feedbacks));
                    this.render();
                    alert('回复已发送');
                }
            },
            
            /**
             * 删除反馈
             * @param {string} id - 反馈ID
             * @returns {void}
             */
            deleteFeedback: function(id) {
                if (!confirm('确认删除该反馈？')) return;
                this.feedbacks = this.feedbacks.filter(f => f.id !== id);
                this.filteredFeedbacks = [...this.feedbacks];
                localStorage.setItem('feedback_data', JSON.stringify(this.feedbacks));
                this.render();
                alert('反馈已删除');
            },
            
            /**
             * 导出反馈数据
             * @returns {void}
             */
            exportFeedback: function() {
                if (this.feedbacks.length === 0) {
                    alert('没有反馈数据可导出');
                    return;
                }
                const data = this.feedbacks.map(f => ({
                    '客户': f.customer,
                    '评分': f.rating,
                    '内容': f.content,
                    '回复': f.reply || '',
                    '日期': f.date
                }));
                console.log('导出数据:', data);
                alert('数据已导出到控制台');
            },
            
            /**
             * 上一页
             * @returns {void}
             */
            prevPage: function() {
                if (this.page > 1) {
                    this.page--;
                    this.render();
                }
            },
            
            /**
             * 下一页
             * @returns {void}
             */
            nextPage: function() {
                const totalPages = Math.ceil(this.filteredFeedbacks.length / this.pageSize);
                if (this.page < totalPages) {
                    this.page++;
                    this.render();
                }
            }
        };
        
        document.addEventListener('DOMContentLoaded', function() {
            window.FeedbackModule.init();
        });
    })();
</script>
