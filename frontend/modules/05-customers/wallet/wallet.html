<!-- 05-customers/wallet.html -->
<div class="page-container" data-page="05-customers-wallet">
    <div class="page-header">
        <h1><i class="fas fa-wallet"></i> 电子钱包</h1>
        <div class="page-actions">
            <button class="btn btn-primary" onclick="window.WalletModule.recharge()">
                <i class="fas fa-plus-circle"></i> 充值
            </button>
            <button class="btn btn-success" onclick="window.WalletModule.withdraw()">
                <i class="fas fa-minus-circle"></i> 提现
            </button>
            <button class="btn btn-outline" onclick="location.reload()">
                <i class="fas fa-sync-alt"></i> 刷新
            </button>
        </div>
    </div>
    <div class="page-content">
        <div class="wallet-container">
            <!-- 余额展示 -->
            <div class="wallet-balance">
                <div class="balance-card">
                    <div class="balance-label">💰 总余额</div>
                    <div class="balance-amount" id="totalBalance">¥0.00</div>
                    <div class="balance-sub">可用余额</div>
                </div>
                <div class="balance-stats">
                    <div class="stat-item">
                        <span class="stat-label">总充值</span>
                        <span class="stat-value" id="totalRecharge">¥0.00</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">总消费</span>
                        <span class="stat-value" id="totalSpend">¥0.00</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">交易笔数</span>
                        <span class="stat-value" id="totalTransactions">0</span>
                    </div>
                </div>
            </div>

            <!-- 交易记录 -->
            <div class="wallet-transactions">
                <h4 style="margin-bottom:12px;">📋 交易记录</h4>
                <div class="transaction-list" id="transactionList">
                    <!-- 由JS生成 -->
                </div>
            </div>

            <!-- 分页 -->
            <div class="wallet-pagination" id="walletPagination">
                <span id="walletTotal">共 0 条记录</span>
                <div class="pagination-btns">
                    <button onclick="window.WalletModule.prevPage()"><i class="fas fa-chevron-left"></i></button>
                    <span id="walletPageInfo">1/1</span>
                    <button onclick="window.WalletModule.nextPage()"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .wallet-container { max-width: 800px; margin: 0 auto; }
    
    .wallet-balance { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .balance-card { background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%); border-radius: 16px; padding: 24px; color: white; }
    .balance-card .balance-label { font-size: 14px; opacity: 0.8; }
    .balance-card .balance-amount { font-size: 36px; font-weight: 700; margin: 8px 0; }
    .balance-card .balance-sub { font-size: 13px; opacity: 0.7; }
    
    .balance-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .balance-stats .stat-item { background: white; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #e5e7eb; }
    .balance-stats .stat-item .stat-label { display: block; font-size: 12px; color: #6B7280; }
    .balance-stats .stat-item .stat-value { display: block; font-size: 18px; font-weight: 700; color: #1F2937; margin-top: 4px; }
    .balance-stats .stat-item:nth-child(1) .stat-value { color: #10B981; }
    .balance-stats .stat-item:nth-child(2) .stat-value { color: #EF4444; }
    .balance-stats .stat-item:nth-child(3) .stat-value { color: #4F46E5; }
    
    .wallet-transactions { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #e5e7eb; }
    .transaction-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid #F3F4F6; }
    .transaction-item:last-child { border-bottom: none; }
    .transaction-item:hover { background: #F9FAFB; }
    .transaction-item .trans-info { display: flex; flex-direction: column; }
    .transaction-item .trans-info .trans-desc { font-weight: 500; }
    .transaction-item .trans-info .trans-date { font-size: 12px; color: #6B7280; }
    .transaction-item .trans-amount.income { color: #10B981; font-weight: 700; }
    .transaction-item .trans-amount.expense { color: #EF4444; font-weight: 700; }
    .transaction-item .trans-status { font-size: 12px; padding: 2px 10px; border-radius: 9999px; }
    .transaction-item .trans-status.success { background: #D1FAE5; color: #065F46; }
    .transaction-item .trans-status.pending { background: #FEF3C7; color: #92400E; }
    .transaction-item .trans-status.failed { background: #FEE2E2; color: #991B1B; }
    
    .empty-transactions { text-align: center; padding: 60px 0; color: #9CA3AF; }
    .empty-transactions i { font-size: 48px; margin-bottom: 12px; }
    
    .wallet-pagination { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: white; border-radius: 12px; margin-top: 16px; border: 1px solid #e5e7eb; }
    .wallet-pagination .pagination-btns { display: flex; gap: 4px; align-items: center; }
    .wallet-pagination button { padding: 4px 12px; border: 1px solid #D1D5DB; border-radius: 4px; background: white; cursor: pointer; }
    .wallet-pagination button:hover { background: #F3F4F6; }
    
    [data-theme="dark"] .balance-stats .stat-item,
    [data-theme="dark"] .wallet-transactions,
    [data-theme="dark"] .wallet-pagination { background: #2C2C2E; border-color: #48484A; }
    [data-theme="dark"] .balance-stats .stat-item .stat-value { color: #F5F5F7; }
    [data-theme="dark"] .transaction-item { border-color: #3A3A3C; }
    [data-theme="dark"] .transaction-item:hover { background: #3A3A3C; }
</style>

<script>
    /**
     * WalletModule - 电子钱包模块
     * @module WalletModule
     * @description 管理钱包余额、充值和交易记录
     */
    (function() {
        'use strict';

        /** @type {Object} WalletModule - 电子钱包模块 */
        window.WalletModule = {
            /** @type {Array<Object>} 交易记录 */
            transactions: [],
            /** @type {Object} 钱包数据 */
            wallet: { balance: 0, totalRecharge: 0, totalSpend: 0 },
            /** @type {number} 当前页码 */
            page: 1,
            /** @type {number} 每页显示数量 */
            pageSize: 10,
            
            /**
             * 初始化模块
             * @returns {void}
             */
            init: function() {
                this.loadData();
                this.render();
            },
            
            /**
             * 从localStorage加载数据
             * @returns {void}
             */
            loadData: function() {
                const savedWallet = localStorage.getItem('wallet_data');
                if (savedWallet) {
                    try {
                        this.wallet = JSON.parse(savedWallet);
                    } catch (e) {
                        this.wallet = { balance: 500, totalRecharge: 1000, totalSpend: 500 };
                    }
                } else {
                    this.wallet = { balance: 500, totalRecharge: 1000, totalSpend: 500 };
                    localStorage.setItem('wallet_data', JSON.stringify(this.wallet));
                }
                
                const savedTransactions = localStorage.getItem('wallet_transactions');
                if (savedTransactions) {
                    try {
                        this.transactions = JSON.parse(savedTransactions);
                    } catch (e) {
                        this.transactions = this.getMockTransactions();
                    }
                } else {
                    this.transactions = this.getMockTransactions();
                    localStorage.setItem('wallet_transactions', JSON.stringify(this.transactions));
                }
            },
            
            /**
             * 获取模拟交易记录
             * @returns {Array<Object>} 交易数组
             */
            getMockTransactions: function() {
                return [
                    { id: 'T-001', type: 'income', desc: '充值 - 微信支付', amount: 200, date: '2024-01-15 10:30', status: 'success' },
                    { id: 'T-002', type: 'expense', desc: '消费 - 洗车服务', amount: 68, date: '2024-01-15 14:20', status: 'success' },
                    { id: 'T-003', type: 'income', desc: '充值 - 支付宝', amount: 500, date: '2024-01-16 09:00', status: 'success' },
                    { id: 'T-004', type: 'expense', desc: '消费 - 抛光打蜡', amount: 388, date: '2024-01-17 16:45', status: 'success' },
                    { id: 'T-005', type: 'income', desc: '退款 - 订单取消', amount: 68, date: '2024-01-18 11:00', status: 'success' }
                ];
            },
            
            /**
             * 渲染所有内容
             * @returns {void}
             */
            render: function() {
                this.renderBalance();
                this.renderTransactions();
                this.renderPagination();
            },
            
            /**
             * 渲染余额信息
             * @returns {void}
             */
            renderBalance: function() {
                document.getElementById('totalBalance').textContent = '¥' + this.wallet.balance.toFixed(2);
                document.getElementById('totalRecharge').textContent = '¥' + this.wallet.totalRecharge.toFixed(2);
                document.getElementById('totalSpend').textContent = '¥' + this.wallet.totalSpend.toFixed(2);
                document.getElementById('totalTransactions').textContent = this.transactions.length;
            },
            
            /**
             * 渲染交易记录
             * @returns {void}
             */
            renderTransactions: function() {
                const container = document.getElementById('transactionList');
                const start = (this.page - 1) * this.pageSize;
                const end = start + this.pageSize;
                const pageData = this.transactions.slice(start, end);
                
                if (pageData.length === 0) {
                    container.innerHTML = `
                        <div class="empty-transactions">
                            <i class="fas fa-receipt"></i>
                            <p>暂无交易记录</p>
                        </div>
                    `;
                } else {
                    const typeMap = { income: '收入', expense: '支出' };
                    const statusMap = { success: '成功', pending: '处理中', failed: '失败' };
                    
                    container.innerHTML = pageData.map(t => `
                        <div class="transaction-item">
                            <div class="trans-info">
                                <span class="trans-desc">${t.desc}</span>
                                <span class="trans-date">${t.date}</span>
                            </div>
                            <div style="display:flex;align-items:center;gap:12px;">
                                <span class="trans-amount ${t.type}">${t.type === 'income' ? '+' : '-'}¥${t.amount.toFixed(2)}</span>
                                <span class="trans-status ${t.status}">${statusMap[t.status] || t.status}</span>
                            </div>
                        </div>
                    `).join('');
                }
            },
            
            /**
             * 渲染分页
             * @returns {void}
             */
            renderPagination: function() {
                const total = this.transactions.length;
                const totalPages = Math.ceil(total / this.pageSize) || 1;
                document.getElementById('walletTotal').textContent = '共 ' + total + ' 条记录';
                document.getElementById('walletPageInfo').textContent = this.page + '/' + totalPages;
            },
            
            /**
             * 充值
             * @returns {void}
             */
            recharge: function() {
                const amount = parseFloat(prompt('输入充值金额：'));
                if (isNaN(amount) || amount <= 0) return;
                const method = prompt('充值方式 (微信/支付宝/银行)：', '微信');
                
                this.wallet.balance += amount;
                this.wallet.totalRecharge += amount;
                
                const transaction = {
                    id: 'T-' + Date.now().toString().slice(-6),
                    type: 'income',
                    desc: '充值 - ' + (method || '未知'),
                    amount: amount,
                    date: new Date().toLocaleString(),
                    status: 'success'
                };
                this.transactions.push(transaction);
                
                this.saveData();
                this.render();
                alert('充值成功！当前余额: ¥' + this.wallet.balance.toFixed(2));
            },
            
            /**
             * 提现
             * @returns {void}
             */
            withdraw: function() {
                const amount = parseFloat(prompt('输入提现金额：'));
                if (isNaN(amount) || amount <= 0) return;
                if (amount > this.wallet.balance) {
                    alert('余额不足！当前余额: ¥' + this.wallet.balance.toFixed(2));
                    return;
                }
                
                this.wallet.balance -= amount;
                
                const transaction = {
                    id: 'T-' + Date.now().toString().slice(-6),
                    type: 'expense',
                    desc: '提现 - 银行转账',
                    amount: amount,
                    date: new Date().toLocaleString(),
                    status: 'pending'
                };
                this.transactions.push(transaction);
                
                this.saveData();
                this.render();
                alert('提现申请已提交！当前余额: ¥' + this.wallet.balance.toFixed(2));
            },
            
            /**
             * 保存数据到localStorage
             * @returns {void}
             */
            saveData: function() {
                localStorage.setItem('wallet_data', JSON.stringify(this.wallet));
                localStorage.setItem('wallet_transactions', JSON.stringify(this.transactions));
            },
            
            /**
             * 上一页
             * @returns {void}
             */
            prevPage: function() {
                if (this.page > 1) {
                    this.page--;
                    this.render();
                }
            },
            
            /**
             * 下一页
             * @returns {void}
             */
            nextPage: function() {
                const totalPages = Math.ceil(this.transactions.length / this.pageSize);
                if (this.page < totalPages) {
                    this.page++;
                    this.render();
                }
            }
        };
        
        document.addEventListener('DOMContentLoaded', function() {
            window.WalletModule.init();
        });
    })();
</script>
