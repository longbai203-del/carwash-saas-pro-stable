<!-- ============================================================ -->
<!-- 客户管理 - 纯内容区域 (由 app.js 加载)                         -->
<!-- ============================================================ -->

<!-- 页面标题 -->
<div class="page-header">
    <div>
        <h1 class="page-title">👥 客户管理</h1>
        <p class="page-subtitle">管理所有客户信息</p>
    </div>
    <button id="createBtn" class="btn btn-primary">
        <i class="fas fa-plus"></i> 新建客户
    </button>
</div>

<!-- 统计卡片 -->
<div class="crm-stats-grid" id="statsContainer">
    <div class="crm-stat-card">
        <div class="crm-stat-icon blue"><i class="fas fa-users"></i></div>
        <div class="crm-stat-info">
            <div class="crm-stat-value" id="totalCustomers">0</div>
            <div class="crm-stat-label">总客户</div>
        </div>
    </div>
    <div class="crm-stat-card">
        <div class="crm-stat-icon purple"><i class="fas fa-crown"></i></div>
        <div class="crm-stat-info">
            <div class="crm-stat-value" id="vipCount">0</div>
            <div class="crm-stat-label">VIP 客户</div>
        </div>
    </div>
    <div class="crm-stat-card">
        <div class="crm-stat-icon gold"><i class="fas fa-star"></i></div>
        <div class="crm-stat-info">
            <div class="crm-stat-value" id="goldCount">0</div>
            <div class="crm-stat-label">黄金客户</div>
        </div>
    </div>
    <div class="crm-stat-card">
        <div class="crm-stat-icon green"><i class="fas fa-coins"></i></div>
        <div class="crm-stat-info">
            <div class="crm-stat-value" id="totalSpent">¥0</div>
            <div class="crm-stat-label">累计消费</div>
        </div>
    </div>
</div>

<!-- 搜索栏 -->
<div class="crm-search-bar">
    <div class="crm-search-row">
        <div class="crm-form-group">
            <label>客户姓名</label>
            <input id="searchName" type="text" placeholder="输入客户姓名" />
        </div>
        <div class="crm-form-group">
            <label>手机号</label>
            <input id="searchPhone" type="text" placeholder="输入手机号" />
        </div>
        <div class="crm-form-group">
            <label>会员等级</label>
            <select id="searchLevel">
                <option value="">全部等级</option>
                <option value="vip">VIP</option>
                <option value="gold">黄金</option>
                <option value="silver">白银</option>
                <option value="bronze">青铜</option>
            </select>
        </div>
        <div class="crm-search-actions">
            <button id="searchBtn" class="btn btn-primary">
                <i class="fas fa-search"></i> 搜索
            </button>
            <button id="resetBtn" class="btn btn-secondary">
                <i class="fas fa-undo"></i> 重置
            </button>
        </div>
    </div>
</div>

<!-- 工具栏 -->
<div class="crm-toolbar">
    <div class="crm-left">
        <button class="btn btn-secondary" onclick="location.reload()">
            <i class="fas fa-sync"></i> 刷新
        </button>
    </div>
    <div class="crm-right">
        <span style="font-size:14px;color:#6B7280;">共 <span id="totalCount">0</span> 位客户</span>
    </div>
</div>

<!-- 加载状态 -->
<div id="loadingSpinner" class="hidden text-center py-4">
    <i class="fas fa-spinner fa-spin text-2xl text-blue-500"></i>
    <p class="mt-2 text-gray-500">加载中...</p>
</div>

<!-- 表格 -->
<div class="table-container">
    <table class="table">
        <thead>
            <tr>
                <th>客户信息</th>
                <th>手机号</th>
                <th>邮箱</th>
                <th>等级</th>
                <th class="text-right">累计消费</th>
                <th class="text-center">订单数</th>
                <th>最近访问</th>
                <th style="width:120px;">操作</th>
            </tr>
        </thead>
        <tbody id="customersTableBody">
            <tr>
                <td colspan="8" class="text-center py-8 text-gray-500">
                    <i class="fas fa-spinner fa-spin text-2xl"></i>
                    <p class="mt-2">加载中...</p>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<!-- 分页 -->
<div id="paginationContainer" class="crm-pagination"></div>

<!-- ============================================================ -->
<!-- 新建/编辑客户弹窗 -->
<!-- ============================================================ -->
<div id="customerModal" class="crm-modal-overlay hidden">
    <div class="crm-modal-content">
        <div class="crm-modal-header">
            <h3 id="modalTitle">新建客户</h3>
            <button class="crm-modal-close" id="closeModal">&times;</button>
        </div>
        <div class="crm-modal-body">
            <form id="customerForm">
                <input type="hidden" id="customerId" value="" />

                <div class="crm-form-group">
                    <label>客户姓名 <span class="crm-required">*</span></label>
                    <input type="text" id="customerName" class="crm-form-control" placeholder="请输入客户姓名" required />
                </div>

                <div class="crm-form-group">
                    <label>手机号 <span class="crm-required">*</span></label>
                    <input type="tel" id="customerPhone" class="crm-form-control" placeholder="请输入手机号" required />
                </div>

                <div class="crm-form-group">
                    <label>邮箱</label>
                    <input type="email" id="customerEmail" class="crm-form-control" placeholder="请输入邮箱" />
                </div>

                <div class="crm-form-group">
                    <label>会员等级</label>
                    <select id="customerLevel" class="crm-form-control">
                        <option value="bronze">青铜</option>
                        <option value="silver">白银</option>
                        <option value="gold">黄金</option>
                        <option value="vip">VIP</option>
                    </select>
                </div>

                <div class="crm-form-group">
                    <label>地址</label>
                    <input type="text" id="customerAddress" class="crm-form-control" placeholder="请输入地址" />
                </div>

                <div class="crm-form-group">
                    <label>备注</label>
                    <textarea id="customerNotes" class="crm-form-control" rows="3" placeholder="请输入备注信息"></textarea>
                </div>
            </form>
        </div>
        <div class="crm-modal-footer">
            <button class="btn btn-secondary" id="cancelModal">取消</button>
            <button class="btn btn-primary" id="saveCustomer">
                <i class="fas fa-save"></i> 保存
            </button>
        </div>
    </div>
</div>

<!-- ============================================================ -->
<!-- 确认删除弹窗 -->
<!-- ============================================================ -->
<div id="deleteModal" class="crm-modal-overlay hidden">
    <div class="crm-modal-content" style="max-width:400px;">
        <div class="crm-modal-header">
            <h3>⚠️ 确认删除</h3>
            <button class="crm-modal-close" id="closeDeleteModal">&times;</button>
        </div>
        <div class="crm-modal-body" style="text-align:center;padding:24px;">
            <i class="fas fa-exclamation-triangle" style="font-size:48px;color:#EF4444;margin-bottom:16px;"></i>
            <p style="font-size:16px;margin-bottom:8px;">确定要删除该客户吗？</p>
            <p style="color:#6B7280;font-size:14px;" id="deleteCustomerName"></p>
            <p style="color:#9CA3AF;font-size:12px;margin-top:8px;">此操作不可撤销</p>
        </div>
        <div class="crm-modal-footer" style="justify-content:center;">
            <button class="btn btn-secondary" id="cancelDelete">取消</button>
            <button class="btn btn-danger" id="confirmDelete">
                <i class="fas fa-trash"></i> 确认删除
            </button>
        </div>
    </div>
</div>

<!-- ============================================================ -->
<!-- JavaScript 模块 -->
<!-- ============================================================ -->
<script type="module">
    import { init } from './customers.js';
    // 暴露全局函数供 HTML 调用
    window.editCustomer = window.editCustomer;
    window.deleteCustomer = window.deleteCustomer;
    window.viewCustomer = window.viewCustomer;
    window.changePage = window.changePage;
    init();
</script>
