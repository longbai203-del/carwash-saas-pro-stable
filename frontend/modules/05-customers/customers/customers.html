                <tr><td style="padding:12px 16px;border-bottom:1px solid #F3F4F6;"><div style="display:flex;align-items:center;gap:12px;"><div style="width:32px;height:32px;border-radius:50%;background:#EDE9FE;display:flex;align-items:center;justify-content:center;color:#6D28D9;font-weight:700;">李</div><div><div style="font-weight:500;">李娜</div></div></div></td><td style="padding:12px 16px;border-bottom:1px solid #F3F4F6;">13800002222</td><td style="padding:12px 16px;border-bottom:1px solid #F3F4F6;"><span style="display:inline-block;padding:4px 10px;border-radius:9999px;font-size:12px;background:#EDE9FE;color:#6D28D9;">VIP</span></td><td style="padding:12px 16px;border-bottom:1px solid #F3F4F6;text-align:right;font-weight:600;">¥32,800</td><td style="padding:12px 16px;border-bottom:1px solid #F3F4F6;"><div style="display:flex;gap:4px;"><button style="padding:4px 10px;border:none;border-radius:4px;cursor:pointer;background:#4F46E5;color:white;"><i class="fas fa-eye"></i></button><button style="padding:4px 10px;border:none;border-radius:4px;cursor:pointer;background:#EF4444;color:white;"><i class="fas fa-trash"></i></button></div></td></tr>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户管理 - CarwashPro</title>
    <link rel="stylesheet" href="../../../css/style.css">
    <link rel="stylesheet" href="../../../css/design-system.css">
    <link rel="stylesheet" href="./customers.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- ============================================================ -->
    <!-- 页面内容 -->
    <!-- ============================================================ -->
    <div class="container-fluid">
        <!-- 页面标题 -->
        <div class="page-header">
            <div>
                <h1 class="page-title">👥 客户管理</h1>
                <p class="page-subtitle">管理所有客户信息</p>
            </div>
            <button id="createBtn" class="btn btn-primary">
                <i class="fas fa-plus"></i> 新建客户
            </button>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid" id="statsContainer">
            <div class="stat-card">
                <div class="stat-icon blue"><i class="fas fa-users"></i></div>
                <div class="stat-info">
                    <div class="stat-value" id="totalCustomers">0</div>
                    <div class="stat-label">总客户</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon purple"><i class="fas fa-crown"></i></div>
                <div class="stat-info">
                    <div class="stat-value" id="vipCount">0</div>
                    <div class="stat-label">VIP 客户</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon gold"><i class="fas fa-star"></i></div>
                <div class="stat-info">
                    <div class="stat-value" id="goldCount">0</div>
                    <div class="stat-label">黄金客户</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><i class="fas fa-coins"></i></div>
                <div class="stat-info">
                    <div class="stat-value" id="totalSpent">¥0</div>
                    <div class="stat-label">累计消费</div>
                </div>
            </div>
        </div>

        <!-- 搜索栏 -->
        <div class="search-bar">
            <div class="search-row">
                <div class="form-group">
                    <label>客户姓名</label>
                    <input id="searchName" type="text" placeholder="输入客户姓名" />
                </div>
                <div class="form-group">
                    <label>手机号</label>
                    <input id="searchPhone" type="text" placeholder="输入手机号" />
                </div>
                <div class="form-group">
                    <label>会员等级</label>
                    <select id="searchLevel">
                        <option value="">全部等级</option>
                        <option value="vip">VIP</option>
                        <option value="gold">黄金</option>
                        <option value="silver">白银</option>
                        <option value="bronze">青铜</option>
                    </select>
                </div>
                <div class="search-actions">
                    <button id="searchBtn" class="btn btn-primary">
                        <i class="fas fa-search"></i> 搜索
                    </button>
                    <button id="resetBtn" class="btn btn-secondary">
                        <i class="fas fa-undo"></i> 重置
                    </button>
                </div>
            </div>
        </div>

        <!-- 工具栏 -->
        <div class="toolbar">
            <div class="left">
                <button class="btn btn-secondary" onclick="location.reload()">
                    <i class="fas fa-sync"></i> 刷新
                </button>
                <button class="btn btn-secondary" onclick="window.location.href='../membership/membership.html'">
                    <i class="fas fa-crown"></i> 会员管理
                </button>
            </div>
            <div class="right">
                <span class="text-sm text-gray-500">共 <span id="totalCount">0</span> 位客户</span>
            </div>
        </div>

        <!-- 加载状态 -->
        <div id="loadingSpinner" class="hidden text-center py-4">
            <i class="fas fa-spinner fa-spin text-2xl text-blue-500"></i>
            <p class="mt-2 text-gray-500">加载中...</p>
        </div>

        <!-- 表格 -->
        <div class="table-container">
            <table class="table">
                <thead>
                    <tr>
                        <th>客户信息</th>
                        <th>手机号</th>
                        <th>邮箱</th>
                        <th>等级</th>
                        <th class="text-right">累计消费</th>
                        <th class="text-center">订单数</th>
                        <th>最近访问</th>
                        <th style="width:120px;">操作</th>
                    </tr>
                </thead>
                <tbody id="customersTableBody">
                    <tr>
                        <td colspan="8" class="text-center py-8 text-gray-500">
                            <i class="fas fa-spinner fa-spin text-2xl"></i>
                            <p class="mt-2">加载中...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 分页 -->
        <div id="paginationContainer" class="pagination-container"></div>
    </div>

    <!-- ============================================================ -->
    <!-- 新建/编辑客户弹窗 -->
    <!-- ============================================================ -->
    <div id="customerModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">新建客户</h3>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="customerForm">
                    <input type="hidden" id="customerId" value="" />

                    <div class="form-group">
                        <label for="customerName">客户姓名 <span class="required">*</span></label>
                        <input type="text" id="customerName" class="form-control" placeholder="请输入客户姓名" required />
                    </div>

                    <div class="form-group">
                        <label for="customerPhone">手机号 <span class="required">*</span></label>
                        <input type="tel" id="customerPhone" class="form-control" placeholder="请输入手机号" required />
                    </div>

                    <div class="form-group">
                        <label for="customerEmail">邮箱</label>
                        <input type="email" id="customerEmail" class="form-control" placeholder="请输入邮箱" />
                    </div>

                    <div class="form-group">
                        <label for="customerLevel">会员等级</label>
                        <select id="customerLevel" class="form-control">
                            <option value="bronze">青铜</option>
                            <option value="silver">白银</option>
                            <option value="gold">黄金</option>
                            <option value="vip">VIP</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="customerAddress">地址</label>
                        <input type="text" id="customerAddress" class="form-control" placeholder="请输入地址" />
                    </div>

                    <div class="form-group">
                        <label for="customerNotes">备注</label>
                        <textarea id="customerNotes" class="form-control" rows="3" placeholder="请输入备注信息"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelModal">取消</button>
                <button class="btn btn-primary" id="saveCustomer">
                    <i class="fas fa-save"></i> 保存
                </button>
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- 确认删除弹窗 -->
    <!-- ============================================================ -->
    <div id="deleteModal" class="modal-overlay hidden">
        <div class="modal-content" style="max-width:400px;">
            <div class="modal-header">
                <h3>⚠️ 确认删除</h3>
                <button class="modal-close" id="closeDeleteModal">&times;</button>
            </div>
            <div class="modal-body" style="text-align:center;padding:24px;">
                <i class="fas fa-exclamation-triangle" style="font-size:48px;color:#EF4444;margin-bottom:16px;"></i>
                <p style="font-size:16px;margin-bottom:8px;">确定要删除该客户吗？</p>
                <p style="color:#6B7280;font-size:14px;" id="deleteCustomerName"></p>
                <p style="color:#9CA3AF;font-size:12px;margin-top:8px;">此操作不可撤销</p>
            </div>
            <div class="modal-footer" style="justify-content:center;">
                <button class="btn btn-secondary" id="cancelDelete">取消</button>
                <button class="btn btn-danger" id="confirmDelete">
                    <i class="fas fa-trash"></i> 确认删除
                </button>
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- JavaScript 模块 -->
    <!-- ============================================================ -->
    <script type="module">
        import { init } from './customers.js';
        // 暴露全局函数供 HTML 调用
        window.editCustomer = window.editCustomer;
        window.deleteCustomer = window.deleteCustomer;
        window.viewCustomer = window.viewCustomer;
        window.changePage = window.changePage;
        init();
    </script>
</body>
</html>
