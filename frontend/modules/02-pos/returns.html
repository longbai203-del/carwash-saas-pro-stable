<!-- 02-pos/returns.html -->
<div class="page-container" data-page="02-pos-returns">
    <div class="page-header">
        <h1><i class="fas fa-undo-alt"></i> 退货管理</h1>
        <div class="page-actions">
            <button class="btn btn-primary" onclick="window.ReturnModule.newReturn()">
                <i class="fas fa-plus"></i> 新建退货
            </button>
            <button class="btn btn-success" onclick="window.ReturnModule.processReturn()">
                <i class="fas fa-check"></i> 处理退货
            </button>
            <button class="btn btn-outline" onclick="location.reload()">
                <i class="fas fa-sync-alt"></i> 刷新
            </button>
        </div>
    </div>
    <div class="page-content">
        <div class="returns-container">
            <div class="returns-grid">
                <div class="returns-left">
                    <div class="search-section">
                        <input type="text" id="returnSearch" placeholder="输入订单号或商品名称..." 
                               oninput="window.ReturnModule.search(this.value)" />
                        <button class="btn btn-primary" onclick="window.ReturnModule.findOrder()">
                            <i class="fas fa-search"></i> 查找
                        </button>
                    </div>
                    <div class="order-info" id="returnOrderInfo">
                        <div class="empty-order">
                            <i class="fas fa-file-invoice"></i>
                            <p>请搜索要退货的订单</p>
                        </div>
                    </div>
                    <div class="return-items" id="returnItems">
                        <div class="empty-items">
                            <i class="fas fa-boxes"></i>
                            <p>选择要退货的商品</p>
                        </div>
                    </div>
                </div>
                <div class="returns-right">
                    <div class="return-summary">
                        <h4>📋 退货摘要</h4>
                        <div class="summary-row">
                            <span>原订单</span>
                            <span id="returnOrderId">-</span>
                        </div>
                        <div class="summary-row">
                            <span>退货金额</span>
                            <span id="returnAmount">¥0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>退款方式</span>
                            <span id="returnMethod">原路返回</span>
                        </div>
                        <div class="summary-row total">
                            <span>应退款</span>
                            <span id="refundAmount" style="color:#10b981;">¥0.00</span>
                        </div>
                    </div>
                    <div class="return-reason">
                        <h4>退货原因</h4>
                        <select id="returnReason">
                            <option value="defective">商品质量问题</option>
                            <option value="wrong">发错商品</option>
                            <option value="damaged">运输损坏</option>
                            <option value="dissatisfied">客户不满意</option>
                            <option value="other">其他</option>
                        </select>
                        <textarea id="returnNote" placeholder="备注说明..." rows="3"></textarea>
                    </div>
                    <button class="btn btn-danger btn-block" onclick="window.ReturnModule.submitReturn()">
                        <i class="fas fa-undo-alt"></i> 提交退货
                    </button>
                </div>
            </div>
            <div class="return-history">
                <h4>📜 退货记录</h4>
                <table class="history-table" id="returnHistory">
                    <thead>
                        <tr><th>退货单号</th><th>原订单</th><th>金额</th><th>状态</th><th>操作</th></tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="5" style="text-align:center;color:#9ca3af;">暂无退货记录</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<style>
    .returns-container { max-width: 1200px; margin: 0 auto; }
    .returns-grid { display: grid; grid-template-columns: 1fr 320px; gap: 20px; margin-bottom: 20px; }
    .returns-left, .returns-right { background: white; border-radius: 12px; padding: 20px; border: 1px solid #e5e7eb; }
    .search-section { display: flex; gap: 8px; margin-bottom: 16px; }
    .search-section input { flex: 1; padding: 8px 14px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
    .search-section input:focus { outline: none; border-color: #4f46e5; }
    .empty-order, .empty-items { text-align: center; padding: 30px 0; color: #9ca3af; }
    .empty-order i, .empty-items i { font-size: 36px; margin-bottom: 8px; }
    .return-summary h4, .return-reason h4 { margin: 0 0 12px 0; font-size: 14px; color: #374151; }
    .summary-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; border-bottom: 1px solid #f3f4f6; }
    .summary-row.total { border-top: 2px solid #e5e7eb; padding-top: 10px; margin-top: 4px; font-weight: 700; font-size: 16px; }
    .return-reason select, .return-reason textarea { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; margin-bottom: 8px; }
    .return-reason textarea { resize: vertical; }
    .btn-block { width: 100%; padding: 12px; font-size: 16px; }
    .btn-danger { background: #ef4444; color: white; border: none; }
    .btn-danger:hover { background: #dc2626; }
    .return-history { background: white; border-radius: 12px; padding: 20px; border: 1px solid #e5e7eb; }
    .return-history h4 { margin: 0 0 12px 0; font-size: 14px; color: #374151; }
    .history-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .history-table th { text-align: left; padding: 8px 12px; border-bottom: 2px solid #e5e7eb; font-weight: 600; color: #6b7280; }
    .history-table td { padding: 8px 12px; border-bottom: 1px solid #f3f4f6; }
    .status-badge { padding: 2px 10px; border-radius: 9999px; font-size: 12px; font-weight: 500; }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-processing { background: #dbeafe; color: #1e40af; }
    .status-completed { background: #d1fae5; color: #065f46; }
    .status-rejected { background: #fee2e2; color: #991b1b; }
    [data-theme="dark"] .returns-left,
    [data-theme="dark"] .returns-right,
    [data-theme="dark"] .return-history { background: #2c2c2e; border-color: #48484a; }
    [data-theme="dark"] .return-summary h4,
    [data-theme="dark"] .return-reason h4,
    [data-theme="dark"] .return-history h4 { color: #f5f5f7; }
    [data-theme="dark"] .search-section input,
    [data-theme="dark"] .return-reason select,
    [data-theme="dark"] .return-reason textarea { background: #3a3a3c; border-color: #48484a; color: #f5f5f7; }
    @media (max-width: 768px) { .returns-grid { grid-template-columns: 1fr; } }
</style>

<script>
    (function() {
        window.ReturnModule = {
            returns: [],
            currentOrder: null,
            returnItems: [],
            
            newReturn: function() {
                this.returnItems = [];
                this.currentOrder = null;
                document.getElementById('returnOrderInfo').innerHTML = `
                    <div class="empty-order">
                        <i class="fas fa-file-invoice"></i>
                        <p>请搜索要退货的订单</p>
                    </div>
                `;
                document.getElementById('returnItems').innerHTML = `
                    <div class="empty-items">
                        <i class="fas fa-boxes"></i>
                        <p>选择要退货的商品</p>
                    </div>
                `;
                document.getElementById('returnOrderId').textContent = '-';
                document.getElementById('returnAmount').textContent = '¥0.00';
                document.getElementById('refundAmount').textContent = '¥0.00';
                alert('新建退货单');
            },
            
            search: function(query) {
                if (query.length > 2) {
                    console.log('搜索退货订单:', query);
                }
            },
            
            findOrder: function() {
                const orderNo = prompt('输入订单号：', 'ORD-2024-001');
                if (!orderNo) return;
                
                // 模拟找到订单
                this.currentOrder = {
                    id: orderNo,
                    date: new Date().toLocaleString(),
                    total: 388,
                    items: [
                        { name: '抛光打蜡', price: 388, qty: 1 }
                    ]
                };
                
                document.getElementById('returnOrderInfo').innerHTML = `
                    <div style="padding:12px;">
                        <div><strong>订单号:</strong> ${this.currentOrder.id}</div>
                        <div><strong>日期:</strong> ${this.currentOrder.date}</div>
                        <div><strong>金额:</strong> ¥${this.currentOrder.total.toFixed(2)}</div>
                        <div style="margin-top:8px;font-size:13px;color:#6b7280;">
                            ${this.currentOrder.items.map(i => i.name + ' × ' + i.qty).join(', ')}
                        </div>
                    </div>
                `;
                document.getElementById('returnOrderId').textContent = this.currentOrder.id;
                
                // 添加退货商品
                this.returnItems = [
                    { name: '抛光打蜡', price: 388, qty: 1 }
                ];
                this.renderReturnItems();
            },
            
            renderReturnItems: function() {
                const container = document.getElementById('returnItems');
                if (this.returnItems.length === 0) {
                    container.innerHTML = `
                        <div class="empty-items">
                            <i class="fas fa-boxes"></i>
                            <p>选择要退货的商品</p>
                        </div>
                    `;
                    return;
                }
                let html = '<div style="display:grid;grid-template-columns:1fr 60px 80px;gap:8px;font-weight:600;padding:8px 0;border-bottom:2px solid #e5e7eb;">';
                html += '<span>商品</span><span>数量</span><span>金额</span></div>';
                let total = 0;
                this.returnItems.forEach(item => {
                    total += item.price * item.qty;
                    html += `<div style="display:grid;grid-template-columns:1fr 60px 80px;gap:8px;padding:6px 0;border-bottom:1px solid #f3f4f6;">`;
                    html += `<span>${item.name}</span><span>${item.qty}</span><span>¥${(item.price * item.qty).toFixed(2)}</span>`;
                    html += `</div>`;
                });
                container.innerHTML = html;
                document.getElementById('returnAmount').textContent = '¥' + total.toFixed(2);
                document.getElementById('refundAmount').textContent = '¥' + total.toFixed(2);
            },
            
            processReturn: function() {
                if (this.returnItems.length === 0) {
                    alert('请先选择要退货的商品');
                    return;
                }
                const confirm = confirm('确认退货处理？\n退货金额: ' + document.getElementById('refundAmount').textContent);
                if (confirm) {
                    alert('退货处理中...');
                }
            },
            
            submitReturn: function() {
                if (this.returnItems.length === 0) {
                    alert('请先选择要退货的商品');
                    return;
                }
                const reason = document.getElementById('returnReason').value;
                const note = document.getElementById('returnNote').value;
                const returnNo = 'RTN-' + Date.now().toString().slice(-8);
                
                const record = {
                    id: returnNo,
                    orderId: this.currentOrder ? this.currentOrder.id : '-',
                    items: this.returnItems,
                    reason: reason,
                    note: note,
                    date: new Date().toLocaleString(),
                    status: 'pending'
                };
                
                this.returns.push(record);
                this.renderHistory();
                
                alert('退货已提交!\n退货单号: ' + returnNo);
                this.newReturn();
            },
            
            renderHistory: function() {
                const tbody = document.querySelector('#returnHistory tbody');
                if (!tbody) return;
                if (this.returns.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#9ca3af;">暂无退货记录</td></tr>';
                    return;
                }
                const statusMap = {
                    pending: '<span class="status-badge status-pending">待处理</span>',
                    processing: '<span class="status-badge status-processing">处理中</span>',
                    completed: '<span class="status-badge status-completed">已完成</span>',
                    rejected: '<span class="status-badge status-rejected">已拒绝</span>'
                };
                let html = '';
                this.returns.slice().reverse().forEach(record => {
                    const total = record.items.reduce((s, i) => s + i.price * i.qty, 0);
                    html += `<tr>
                        <td><strong>${record.id}</strong></td>
                        <td>${record.orderId}</td>
                        <td>¥${total.toFixed(2)}</td>
                        <td>${statusMap[record.status] || statusMap.pending}</td>
                        <td><button class="btn btn-sm btn-outline" onclick="alert('查看详情: ${record.id}')">查看</button></td>
                    </tr>`;
                });
                tbody.innerHTML = html;
            }
        };
        
        document.addEventListener('DOMContentLoaded', function() {
            const saved = localStorage.getItem('return_history');
            if (saved) {
                try {
                    window.ReturnModule.returns = JSON.parse(saved);
                    window.ReturnModule.renderHistory();
                } catch (e) {}
            }
            
            setInterval(function() {
                localStorage.setItem('return_history', JSON.stringify(window.ReturnModule.returns));
            }, 5000);
        });
    })();
</script>
