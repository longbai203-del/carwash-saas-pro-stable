<!-- 02-pos/offline-pos.html -->
<div class="page-container" data-page="02-pos-offline-pos">
    <div class="page-header">
        <h1><i class="fas fa-wifi-slash"></i> 离线 POS</h1>
        <div class="page-actions">
            <button class="btn btn-success" onclick="window.OfflinePOSModule.sync()">
                <i class="fas fa-sync"></i> 同步数据
            </button>
            <button class="btn btn-primary" onclick="window.OfflinePOSModule.newOfflineOrder()">
                <i class="fas fa-plus"></i> 离线下单
            </button>
            <button class="btn btn-outline" onclick="location.reload()">
                <i class="fas fa-sync-alt"></i> 刷新
            </button>
        </div>
    </div>
    <div class="page-content">
        <div class="offline-container">
            <div class="offline-status">
                <div class="status-indicator" id="connectionStatus">
                    <i class="fas fa-wifi-slash"></i>
                    <span>离线模式</span>
                </div>
                <div class="status-detail">
                    <span>待同步订单: <strong id="pendingSync">0</strong></span>
                    <span>本地存储: <strong id="storageUsed">0 KB</strong></span>
                </div>
            </div>
            <div class="offline-grid">
                <div class="offline-orders">
                    <h4>📋 离线订单</h4>
                    <div id="offlineOrderList">
                        <div class="empty-offline">
                            <i class="fas fa-file-invoice"></i>
                            <p>暂无离线订单</p>
                        </div>
                    </div>
                </div>
                <div class="offline-products">
                    <h4>📦 商品缓存</h4>
                    <div id="offlineProductList">
                        <div class="product-cache-item">标准洗车 ¥68</div>
                        <div class="product-cache-item">精致洗车 ¥128</div>
                        <div class="product-cache-item">深度清洁 ¥268</div>
                        <div class="product-cache-item">抛光打蜡 ¥388</div>
                    </div>
                    <div class="cache-info">
                        <span>缓存时间: <span id="cacheTime">--</span></span>
                        <button class="btn btn-sm btn-outline" onclick="window.OfflinePOSModule.refreshCache()">
                            <i class="fas fa-refresh"></i> 刷新缓存
                        </button>
                    </div>
                </div>
            </div>
            <div class="offline-log">
                <h4>📜 同步日志</h4>
                <div id="syncLog">
                    <div class="log-entry">系统启动 - 离线模式</div>
                    <div class="log-entry">本地缓存已加载</div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .offline-container { max-width: 1000px; margin: 0 auto; }
    .offline-status { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: #fef3c7; border-radius: 12px; margin-bottom: 20px; border: 1px solid #f59e0b; flex-wrap: wrap; gap: 12px; }
    .offline-status .status-indicator { display: flex; align-items: center; gap: 8px; font-weight: 600; color: #92400e; }
    .offline-status .status-indicator i { font-size: 20px; }
    .offline-status .status-detail { display: flex; gap: 20px; font-size: 14px; color: #6b7280; }
    .offline-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .offline-orders, .offline-products { background: white; border-radius: 12px; padding: 16px; border: 1px solid #e5e7eb; }
    .offline-orders h4, .offline-products h4 { margin: 0 0 12px 0; font-size: 14px; color: #374151; }
    .empty-offline { text-align: center; padding: 30px 0; color: #9ca3af; }
    .empty-offline i { font-size: 28px; margin-bottom: 8px; }
    .offline-order-item { display: flex; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid #f3f4f6; font-size: 13px; align-items: center; }
    .offline-order-item .order-info { display: flex; flex-direction: column; }
    .offline-order-item .order-info .order-id { font-weight: 600; }
    .offline-order-item .order-info .order-date { font-size: 11px; color: #9ca3af; }
    .offline-order-item .order-status { padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 500; }
    .status-pending-sync { background: #fef3c7; color: #92400e; }
    .status-synced { background: #d1fae5; color: #065f46; }
    .product-cache-item { padding: 6px 12px; border-bottom: 1px solid #f3f4f6; font-size: 13px; display: flex; justify-content: space-between; }
    .cache-info { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; margin-top: 8px; border-top: 1px solid #e5e7eb; font-size: 12px; color: #6b7280; }
    .offline-log { background: white; border-radius: 12px; padding: 16px; border: 1px solid #e5e7eb; }
    .offline-log h4 { margin: 0 0 12px 0; font-size: 14px; color: #374151; }
    .offline-log #syncLog { max-height: 120px; overflow-y: auto; font-size: 12px; }
    .log-entry { padding: 4px 0; border-bottom: 1px solid #f3f4f6; color: #6b7280; }
    .log-entry .time { color: #9ca3af; margin-right: 8px; }
    .btn-sm { padding: 4px 12px; font-size: 12px; }
    [data-theme="dark"] .offline-status { background: #2c2c2e; border-color: #48484a; }
    [data-theme="dark"] .offline-status .status-indicator { color: #f5f5f7; }
    [data-theme="dark"] .offline-orders,
    [data-theme="dark"] .offline-products,
    [data-theme="dark"] .offline-log { background: #2c2c2e; border-color: #48484a; }
    [data-theme="dark"] .offline-orders h4,
    [data-theme="dark"] .offline-products h4,
    [data-theme="dark"] .offline-log h4 { color: #f5f5f7; }
    @media (max-width: 768px) { .offline-grid { grid-template-columns: 1fr; } }
</style>

<script>
    (function() {
        window.OfflinePOSModule = {
            orders: [],
            products: [],
            isOnline: false,
            
            init: function() {
                this.loadData();
                this.updateUI();
                this.addLog('系统启动 - 离线模式');
                
                // 模拟网络检测
                setInterval(() => {
                    this.checkConnection();
                }, 30000);
            },
            
            loadData: function() {
                try {
                    const orders = localStorage.getItem('offline_orders');
                    if (orders) this.orders = JSON.parse(orders);
                    
                    const products = localStorage.getItem('offline_products');
                    if (products) this.products = JSON.parse(products);
                    else {
                        this.products = [
                            { id: 'P001', name: '标准洗车', price: 68 },
                            { id: 'P002', name: '精致洗车', price: 128 },
                            { id: 'P003', name: '深度清洁', price: 268 },
                            { id: 'P004', name: '抛光打蜡', price: 388 }
                        ];
                        localStorage.setItem('offline_products', JSON.stringify(this.products));
                    }
                } catch (e) {
                    console.error('加载数据失败:', e);
                }
            },
            
            checkConnection: function() {
                // 模拟网络检测
                this.isOnline = navigator.onLine;
                const indicator = document.getElementById('connectionStatus');
                if (indicator) {
                    if (this.isOnline) {
                        indicator.innerHTML = '<i class="fas fa-wifi" style="color:#10b981;"></i><span style="color:#065f46;">在线模式</span>';
                    } else {
                        indicator.innerHTML = '<i class="fas fa-wifi-slash" style="color:#f59e0b;"></i><span style="color:#92400e;">离线模式</span>';
                    }
                }
            },
            
            newOfflineOrder: function() {
                const name = prompt('输入客户名称：', '客户');
                if (!name) return;
                
                const total = Math.floor(Math.random() * 500) + 100;
                const order = {
                    id: 'OFF-' + Date.now().toString().slice(-8),
                    customer: name,
                    total: total,
                    items: [
                        { name: '洗车服务', price: total, qty: 1 }
                    ],
                    date: new Date().toLocaleString(),
                    status: 'pending_sync'
                };
                
                this.orders.push(order);
                this.saveOrders();
                this.updateUI();
                this.addLog('新离线订单: ' + order.id + ' - ¥' + total.toFixed(2));
                alert('离线订单已创建: ' + order.id + '\n金额: ¥' + total.toFixed(2));
            },
            
            sync: function() {
                if (this.orders.length === 0) {
                    alert('没有需要同步的订单');
                    return;
                }
                
                const pending = this.orders.filter(o => o.status === 'pending_sync');
                if (pending.length === 0) {
                    alert('所有订单已同步');
                    return;
                }
                
                this.addLog('开始同步 ' + pending.length + ' 个订单...');
                
                // 模拟同步
                let synced = 0;
                pending.forEach(order => {
                    order.status = 'synced';
                    synced++;
                    this.addLog('已同步: ' + order.id);
                });
                
                this.saveOrders();
                this.updateUI();
                this.addLog('同步完成! 共同步 ' + synced + ' 个订单');
                alert('同步完成! 已同步 ' + synced + ' 个订单');
            },
            
            refreshCache: function() {
                this.products = [
                    { id: 'P001', name: '标准洗车', price: 68 },
                    { id: 'P002', name: '精致洗车', price: 128 },
                    { id: 'P003', name: '深度清洁', price: 268 },
                    { id: 'P004', name: '抛光打蜡', price: 388 },
                    { id: 'P005', name: '内饰清洗', price: 328 },
                    { id: 'P006', name: '发动机清洗', price: 188 }
                ];
                localStorage.setItem('offline_products', JSON.stringify(this.products));
                this.updateUI();
                document.getElementById('cacheTime').textContent = new Date().toLocaleTimeString();
                this.addLog('商品缓存已刷新');
                alert('缓存已刷新!');
            },
            
            saveOrders: function() {
                localStorage.setItem('offline_orders', JSON.stringify(this.orders));
                document.getElementById('pendingSync').textContent = this.orders.filter(o => o.status === 'pending_sync').length;
                
                // 计算存储使用量
                const size = new Blob([JSON.stringify(this.orders)]).size;
                document.getElementById('storageUsed').textContent = (size / 1024).toFixed(1) + ' KB';
            },
            
            updateUI: function() {
                const list = document.getElementById('offlineOrderList');
                const pending = this.orders.filter(o => o.status === 'pending_sync');
                document.getElementById('pendingSync').textContent = pending.length;
                
                if (this.orders.length === 0) {
                    list.innerHTML = `
                        <div class="empty-offline">
                            <i class="fas fa-file-invoice"></i>
                            <p>暂无离线订单</p>
                        </div>
                    `;
                    return;
                }
                
                let html = '';
                this.orders.slice().reverse().forEach(order => {
                    const statusText = order.status === 'pending_sync' ? '待同步' : '已同步';
                    const statusClass = order.status === 'pending_sync' ? 'status-pending-sync' : 'status-synced';
                    html += `<div class="offline-order-item">
                        <div class="order-info">
                            <span class="order-id">${order.id}</span>
                            <span class="order-date">${order.date} | ${order.customer}</span>
                        </div>
                        <div style="display:flex;align-items:center;gap:12px;">
                            <span>¥${order.total.toFixed(2)}</span>
                            <span class="order-status ${statusClass}">${statusText}</span>
                        </div>
                    </div>`;
                });
                list.innerHTML = html;
            },
            
            addLog: function(message) {
                const log = document.getElementById('syncLog');
                if (!log) return;
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                const time = new Date().toLocaleTimeString();
                entry.innerHTML = `<span class="time">[${time}]</span> ${message}`;
                log.prepend(entry);
                // 限制日志数量
                while (log.children.length > 50) {
                    log.removeChild(log.lastChild);
                }
            }
        };
        
        document.addEventListener('DOMContentLoaded', function() {
            window.OfflinePOSModule.init();
            document.getElementById('cacheTime').textContent = new Date().toLocaleTimeString();
        });
    })();
</script>
