<!-- 02-pos/exchange.html -->
<div class="page-container" data-page="02-pos-exchange">
    <div class="page-header">
        <h1><i class="fas fa-exchange-alt"></i> 换货管理</h1>
        <div class="page-actions">
            <button class="btn btn-primary" onclick="window.ExchangeModule.newExchange()">
                <i class="fas fa-plus"></i> 新建换货
            </button>
            <button class="btn btn-success" onclick="window.ExchangeModule.processExchange()">
                <i class="fas fa-check"></i> 处理换货
            </button>
            <button class="btn btn-outline" onclick="location.reload()">
                <i class="fas fa-sync-alt"></i> 刷新
            </button>
        </div>
    </div>
    <div class="page-content">
        <div class="exchange-container">
            <div class="exchange-grid">
                <div class="exchange-left">
                    <div class="search-section">
                        <input type="text" id="exchangeSearch" placeholder="输入订单号或商品名称搜索..." 
                               oninput="window.ExchangeModule.search(this.value)" />
                        <button class="btn btn-primary" onclick="window.ExchangeModule.findOrder()">
                            <i class="fas fa-search"></i> 查找
                        </button>
                    </div>
                    <div class="order-info" id="orderInfo">
                        <div class="empty-order">
                            <i class="fas fa-file-invoice"></i>
                            <p>请搜索订单或输入换货信息</p>
                        </div>
                    </div>
                    <div class="exchange-items" id="exchangeItems">
                        <div class="empty-items">
                            <i class="fas fa-boxes"></i>
                            <p>换货商品列表</p>
                        </div>
                    </div>
                </div>
                <div class="exchange-right">
                    <div class="exchange-summary">
                        <h4>📋 换货摘要</h4>
                        <div class="summary-row">
                            <span>原订单</span>
                            <span id="originalOrder">-</span>
                        </div>
                        <div class="summary-row">
                            <span>原金额</span>
                            <span id="originalAmount">¥0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>换货金额</span>
                            <span id="exchangeAmount">¥0.00</span>
                        </div>
                        <div class="summary-row total">
                            <span>差额</span>
                            <span id="difference" style="color:#10b981;">¥0.00</span>
                        </div>
                    </div>
                    <div class="exchange-reason">
                        <h4>换货原因</h4>
                        <select id="exchangeReason">
                            <option value="damaged">商品损坏</option>
                            <option value="wrong">发错商品</option>
                            <option value="quality">质量问题</option>
                            <option value="customer">客户要求</option>
                            <option value="other">其他</option>
                        </select>
                        <textarea id="exchangeNote" placeholder="备注说明..." rows="3"></textarea>
                    </div>
                    <button class="btn btn-primary btn-block" onclick="window.ExchangeModule.submitExchange()">
                        <i class="fas fa-check-circle"></i> 提交换货
                    </button>
                </div>
            </div>
            <div class="exchange-history">
                <h4>📜 换货记录</h4>
                <table class="history-table" id="exchangeHistory">
                    <thead>
                        <tr><th>换货单号</th><th>原订单</th><th>金额</th><th>状态</th><th>操作</th></tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="5" style="text-align:center;color:#9ca3af;">暂无换货记录</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<style>
    .exchange-container { max-width: 1200px; margin: 0 auto; }
    .exchange-grid { display: grid; grid-template-columns: 1fr 320px; gap: 20px; margin-bottom: 20px; }
    .exchange-left, .exchange-right { background: white; border-radius: 12px; padding: 20px; border: 1px solid #e5e7eb; }
    .search-section { display: flex; gap: 8px; margin-bottom: 16px; }
    .search-section input { flex: 1; padding: 8px 14px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
    .search-section input:focus { outline: none; border-color: #4f46e5; }
    .empty-order, .empty-items { text-align: center; padding: 30px 0; color: #9ca3af; }
    .empty-order i, .empty-items i { font-size: 36px; margin-bottom: 8px; }
    .exchange-summary h4, .exchange-reason h4 { margin: 0 0 12px 0; font-size: 14px; color: #374151; }
    .summary-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; border-bottom: 1px solid #f3f4f6; }
    .summary-row.total { border-top: 2px solid #e5e7eb; padding-top: 10px; margin-top: 4px; font-weight: 700; font-size: 16px; }
    .exchange-reason select, .exchange-reason textarea { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; margin-bottom: 8px; }
    .exchange-reason textarea { resize: vertical; }
    .btn-block { width: 100%; padding: 12px; font-size: 16px; }
    .exchange-history { background: white; border-radius: 12px; padding: 20px; border: 1px solid #e5e7eb; }
    .exchange-history h4 { margin: 0 0 12px 0; font-size: 14px; color: #374151; }
    .history-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .history-table th { text-align: left; padding: 8px 12px; border-bottom: 2px solid #e5e7eb; font-weight: 600; color: #6b7280; }
    .history-table td { padding: 8px 12px; border-bottom: 1px solid #f3f4f6; }
    .status-badge { padding: 2px 10px; border-radius: 9999px; font-size: 12px; font-weight: 500; }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-processing { background: #dbeafe; color: #1e40af; }
    .status-completed { background: #d1fae5; color: #065f46; }
    .status-cancelled { background: #fee2e2; color: #991b1b; }
    [data-theme="dark"] .exchange-left, 
    [data-theme="dark"] .exchange-right,
    [data-theme="dark"] .exchange-history { background: #2c2c2e; border-color: #48484a; }
    [data-theme="dark"] .exchange-summary h4, 
    [data-theme="dark"] .exchange-reason h4,
    [data-theme="dark"] .exchange-history h4 { color: #f5f5f7; }
    [data-theme="dark"] .search-section input,
    [data-theme="dark"] .exchange-reason select,
    [data-theme="dark"] .exchange-reason textarea { background: #3a3a3c; border-color: #48484a; color: #f5f5f7; }
    @media (max-width: 768px) { .exchange-grid { grid-template-columns: 1fr; } }
</style>

<script>
    (function() {
        window.ExchangeModule = {
            exchanges: [],
            currentOrder: null,
            exchangeItems: [],
            
            newExchange: function() {
                this.exchangeItems = [];
                this.currentOrder = null;
                document.getElementById('orderInfo').innerHTML = `
                    <div class="empty-order">
                        <i class="fas fa-file-invoice"></i>
                        <p>请搜索订单</p>
                    </div>
                `;
                document.getElementById('exchangeItems').innerHTML = `
                    <div class="empty-items">
                        <i class="fas fa-boxes"></i>
                        <p>请添加换货商品</p>
                    </div>
                `;
                document.getElementById('originalOrder').textContent = '-';
                document.getElementById('originalAmount').textContent = '¥0.00';
                document.getElementById('exchangeAmount').textContent = '¥0.00';
                document.getElementById('difference').textContent = '¥0.00';
                alert('新建换货单');
            },
            
            search: function(query) {
                if (query.length > 2) {
                    // 模拟搜索
                    console.log('搜索:', query);
                }
            },
            
            findOrder: function() {
                const orderNo = prompt('输入订单号：', 'ORD-2024-001');
                if (!orderNo) return;
                
                // 模拟找到订单
                this.currentOrder = {
                    id: orderNo,
                    date: new Date().toLocaleString(),
                    total: 388,
                    items: [
                        { name: '抛光打蜡', price: 388, qty: 1 }
                    ]
                };
                
                document.getElementById('orderInfo').innerHTML = `
                    <div style="padding:12px;">
                        <div><strong>订单号:</strong> ${this.currentOrder.id}</div>
                        <div><strong>日期:</strong> ${this.currentOrder.date}</div>
                        <div><strong>金额:</strong> ¥${this.currentOrder.total.toFixed(2)}</div>
                        <div style="margin-top:8px;font-size:13px;color:#6b7280;">
                            ${this.currentOrder.items.map(i => i.name + ' × ' + i.qty).join(', ')}
                        </div>
                    </div>
                `;
                document.getElementById('originalOrder').textContent = this.currentOrder.id;
                document.getElementById('originalAmount').textContent = '¥' + this.currentOrder.total.toFixed(2);
                
                // 添加换货商品
                this.exchangeItems = [
                    { name: '精致洗车', price: 128, qty: 1 }
                ];
                this.renderExchangeItems();
            },
            
            renderExchangeItems: function() {
                const container = document.getElementById('exchangeItems');
                if (this.exchangeItems.length === 0) {
                    container.innerHTML = `
                        <div class="empty-items">
                            <i class="fas fa-boxes"></i>
                            <p>请添加换货商品</p>
                        </div>
                    `;
                    return;
                }
                let html = '<div style="display:grid;grid-template-columns:1fr 60px 80px;gap:8px;font-weight:600;padding:8px 0;border-bottom:2px solid #e5e7eb;">';
                html += '<span>商品</span><span>数量</span><span>金额</span></div>';
                let total = 0;
                this.exchangeItems.forEach(item => {
                    total += item.price * item.qty;
                    html += `<div style="display:grid;grid-template-columns:1fr 60px 80px;gap:8px;padding:6px 0;border-bottom:1px solid #f3f4f6;">`;
                    html += `<span>${item.name}</span><span>${item.qty}</span><span>¥${(item.price * item.qty).toFixed(2)}</span>`;
                    html += `</div>`;
                });
                container.innerHTML = html;
                document.getElementById('exchangeAmount').textContent = '¥' + total.toFixed(2);
                const diff = total - (this.currentOrder ? this.currentOrder.total : 0);
                const diffEl = document.getElementById('difference');
                diffEl.textContent = '¥' + diff.toFixed(2);
                diffEl.style.color = diff > 0 ? '#ef4444' : '#10b981';
            },
            
            processExchange: function() {
                if (this.exchangeItems.length === 0) {
                    alert('请先添加换货商品');
                    return;
                }
                alert('换货处理中...\n请确认商品信息');
            },
            
            submitExchange: function() {
                if (this.exchangeItems.length === 0) {
                    alert('请先添加换货商品');
                    return;
                }
                const reason = document.getElementById('exchangeReason').value;
                const note = document.getElementById('exchangeNote').value;
                const exchangeNo = 'EXC-' + Date.now().toString().slice(-8);
                
                const record = {
                    id: exchangeNo,
                    orderId: this.currentOrder ? this.currentOrder.id : '-',
                    items: this.exchangeItems,
                    reason: reason,
                    note: note,
                    date: new Date().toLocaleString(),
                    status: 'pending'
                };
                
                // 添加到历史记录
                this.exchanges.push(record);
                this.renderHistory();
                
                alert('换货已提交!\n换货单号: ' + exchangeNo);
                this.newExchange();
            },
            
            renderHistory: function() {
                const tbody = document.querySelector('#exchangeHistory tbody');
                if (!tbody) return;
                if (this.exchanges.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#9ca3af;">暂无换货记录</td></tr>';
                    return;
                }
                const statusMap = {
                    pending: '<span class="status-badge status-pending">待处理</span>',
                    processing: '<span class="status-badge status-processing">处理中</span>',
                    completed: '<span class="status-badge status-completed">已完成</span>',
                    cancelled: '<span class="status-badge status-cancelled">已取消</span>'
                };
                let html = '';
                this.exchanges.slice().reverse().forEach(record => {
                    const total = record.items.reduce((s, i) => s + i.price * i.qty, 0);
                    html += `<tr>
                        <td><strong>${record.id}</strong></td>
                        <td>${record.orderId}</td>
                        <td>¥${total.toFixed(2)}</td>
                        <td>${statusMap[record.status] || statusMap.pending}</td>
                        <td><button class="btn btn-sm btn-outline" onclick="alert('查看详情: ${record.id}')">查看</button></td>
                    </tr>`;
                });
                tbody.innerHTML = html;
            }
        };
        
        document.addEventListener('DOMContentLoaded', function() {
            // 加载历史记录
            const saved = localStorage.getItem('exchange_history');
            if (saved) {
                try {
                    window.ExchangeModule.exchanges = JSON.parse(saved);
                    window.ExchangeModule.renderHistory();
                } catch (e) {}
            }
            
            // 保存历史记录
            setInterval(function() {
                localStorage.setItem('exchange_history', JSON.stringify(window.ExchangeModule.exchanges));
            }, 5000);
        });
    })();
</script>
