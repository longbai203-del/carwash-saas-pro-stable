<!-- 02-pos/customer-display.html -->
<div class="page-container" data-page="02-pos-customer-display">
    <div class="page-header">
        <h1><i class="fas fa-tv"></i> 客户显示屏</h1>
        <div class="page-actions">
            <button class="btn btn-primary" onclick="window.CustomerDisplayModule.toggleDisplay()">
                <i class="fas fa-power-off"></i> 开关
            </button>
            <button class="btn btn-primary" onclick="window.CustomerDisplayModule.testDisplay()">
                <i class="fas fa-eye"></i> 测试
            </button>
            <button class="btn btn-outline" onclick="location.reload()">
                <i class="fas fa-sync-alt"></i> 刷新
            </button>
        </div>
    </div>
    <div class="page-content">
        <div class="display-container">
            <div class="display-preview" id="displayPreview">
                <div class="preview-header">
                    <span class="shop-name">🧼 洗车店</span>
                    <span class="datetime" id="displayTime">--:--</span>
                </div>
                <div class="preview-items" id="previewItems">
                    <div class="empty-preview">
                        <i class="fas fa-receipt"></i>
                        <p>等待商品扫描...</p>
                    </div>
                </div>
                <div class="preview-total">
                    <span>总计</span>
                    <span class="total-amount" id="previewTotal">¥0.00</span>
                </div>
                <div class="preview-footer">
                    <span>感谢光临!</span>
                </div>
            </div>
            <div class="display-controls">
                <div class="control-group">
                    <label>显示模式</label>
                    <select id="displayMode" onchange="window.CustomerDisplayModule.setMode(this.value)">
                        <option value="full">完整模式</option>
                        <option value="compact">简洁模式</option>
                        <option value="minimal">极简模式</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>亮度</label>
                    <input type="range" min="0" max="100" value="80" id="displayBrightness" 
                           oninput="window.CustomerDisplayModule.setBrightness(this.value)" />
                </div>
                <div class="control-group">
                    <label>字体大小</label>
                    <select id="displayFontSize" onchange="window.CustomerDisplayModule.setFontSize(this.value)">
                        <option value="small">小</option>
                        <option value="medium" selected>中</option>
                        <option value="large">大</option>
                    </select>
                </div>
            </div>
            <div class="display-messages" id="displayMessages">
                <div class="message-item success">
                    <i class="fas fa-check-circle"></i> 显示屏已连接
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .display-container { max-width: 1000px; margin: 0 auto; }
    .display-preview { background: #1a1a2e; border-radius: 16px; padding: 24px; max-width: 600px; margin: 0 auto 20px; color: white; font-family: 'Courier New', monospace; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .preview-header { display: flex; justify-content: space-between; border-bottom: 2px solid #2a2a4e; padding-bottom: 12px; margin-bottom: 12px; }
    .shop-name { font-size: 20px; font-weight: 700; color: #00ff88; }
    .datetime { color: #8899aa; font-size: 14px; }
    .preview-items { min-height: 120px; padding: 8px 0; }
    .empty-preview { text-align: center; color: #556677; padding: 30px 0; }
    .empty-preview i { font-size: 32px; margin-bottom: 8px; }
    .preview-total { display: flex; justify-content: space-between; border-top: 2px solid #2a2a4e; padding-top: 12px; margin-top: 8px; font-size: 24px; font-weight: 700; }
    .total-amount { color: #00ff88; }
    .preview-footer { text-align: center; color: #556677; font-size: 12px; margin-top: 12px; border-top: 1px solid #2a2a4e; padding-top: 8px; }
    .display-controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; padding: 20px; background: #f8f9fa; border-radius: 12px; margin-bottom: 16px; }
    .control-group { display: flex; flex-direction: column; gap: 6px; }
    .control-group label { font-size: 13px; font-weight: 500; color: #374151; }
    .control-group select, .control-group input { padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; }
    .display-messages { max-height: 150px; overflow-y: auto; padding: 8px; background: #f8f9fa; border-radius: 8px; }
    .message-item { padding: 6px 12px; border-radius: 4px; font-size: 13px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
    .message-item.success { background: #d1fae5; color: #065f46; }
    .message-item.info { background: #dbeafe; color: #1e40af; }
    .message-item.warning { background: #fef3c7; color: #92400e; }
    .message-item.error { background: #fee2e2; color: #991b1b; }
    .preview-item { display: flex; justify-content: space-between; padding: 4px 0; font-size: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .compact .preview-item { font-size: 14px; }
    .minimal .preview-item { font-size: 12px; }
    .minimal .preview-header .shop-name { font-size: 16px; }
    .minimal .preview-total { font-size: 18px; }
    [data-theme="dark"] .display-controls { background: #2c2c2e; }
    [data-theme="dark"] .display-messages { background: #2c2c2e; }
    [data-theme="dark"] .control-group label { color: #f5f5f7; }
    [data-theme="dark"] .control-group select, 
    [data-theme="dark"] .control-group input { background: #3a3a3c; border-color: #48484a; color: #f5f5f7; }
</style>

<script>
    (function() {
        window.CustomerDisplayModule = {
            isOn: true,
            mode: 'full',
            items: [],
            total: 0,
            brightness: 80,
            fontSize: 'medium',
            
            toggleDisplay: function() {
                this.isOn = !this.isOn;
                const preview = document.getElementById('displayPreview');
                if (preview) {
                    preview.style.opacity = this.isOn ? '1' : '0.3';
                }
                this.addMessage(this.isOn ? '显示屏已开启' : '显示屏已关闭', 'info');
            },
            
            testDisplay: function() {
                this.addMessage('测试模式 - 显示所有功能', 'info');
                // 添加测试数据
                this.items = [
                    { name: '标准洗车', price: 68, qty: 1 },
                    { name: '抛光打蜡', price: 388, qty: 1 },
                    { name: '内饰清洗', price: 328, qty: 1 }
                ];
                this.total = 784;
                this.updatePreview();
                setTimeout(() => {
                    this.items = [];
                    this.total = 0;
                    this.updatePreview();
                    this.addMessage('测试完成', 'success');
                }, 5000);
            },
            
            setMode: function(mode) {
                this.mode = mode;
                const preview = document.getElementById('displayPreview');
                if (preview) {
                    preview.className = 'display-preview ' + mode;
                }
                this.addMessage('显示模式: ' + mode, 'info');
            },
            
            setBrightness: function(value) {
                this.brightness = value;
                const preview = document.getElementById('displayPreview');
                if (preview) {
                    preview.style.opacity = (value / 100).toString();
                }
            },
            
            setFontSize: function(size) {
                this.fontSize = size;
                const preview = document.getElementById('displayPreview');
                if (preview) {
                    preview.style.fontSize = size === 'small' ? '14px' : size === 'medium' ? '16px' : '20px';
                }
                this.addMessage('字体大小: ' + size, 'info');
            },
            
            addItem: function(name, price) {
                this.items.push({ name, price, qty: 1 });
                this.total += price;
                this.updatePreview();
                this.addMessage('已添加: ' + name + ' ¥' + price, 'success');
            },
            
            clearItems: function() {
                this.items = [];
                this.total = 0;
                this.updatePreview();
                this.addMessage('已清空商品列表', 'warning');
            },
            
            updatePreview: function() {
                const container = document.getElementById('previewItems');
                const totalEl = document.getElementById('previewTotal');
                const timeEl = document.getElementById('displayTime');
                
                // 更新时间
                if (timeEl) {
                    const now = new Date();
                    timeEl.textContent = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                }
                
                if (this.items.length === 0) {
                    container.innerHTML = `
                        <div class="empty-preview">
                            <i class="fas fa-receipt"></i>
                            <p>等待商品扫描...</p>
                        </div>
                    `;
                    totalEl.textContent = '¥0.00';
                    return;
                }
                
                let html = '';
                this.items.forEach(item => {
                    html += `<div class="preview-item">
                        <span>${item.name} × ${item.qty}</span>
                        <span>¥${item.price.toFixed(2)}</span>
                    </div>`;
                });
                container.innerHTML = html;
                totalEl.textContent = '¥' + this.total.toFixed(2);
            },
            
            addMessage: function(text, type) {
                const container = document.getElementById('displayMessages');
                if (!container) return;
                const msg = document.createElement('div');
                msg.className = 'message-item ' + (type || 'info');
                const icons = { success: 'fa-check-circle', info: 'fa-info-circle', warning: 'fa-exclamation-triangle', error: 'fa-times-circle' };
                msg.innerHTML = `<i class="fas ${icons[type] || 'fa-info-circle'}"></i> ${text}`;
                container.prepend(msg);
                // 限制消息数量
                while (container.children.length > 20) {
                    container.removeChild(container.lastChild);
                }
            }
        };
        
        // 定时更新时间
        setInterval(function() {
            const timeEl = document.getElementById('displayTime');
            if (timeEl) {
                const now = new Date();
                timeEl.textContent = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            }
        }, 10000);
        
        // 模拟接收商品数据
        document.addEventListener('DOMContentLoaded', function() {
            window.CustomerDisplayModule.addMessage('系统已启动，等待连接', 'info');
        });
    })();
</script>
