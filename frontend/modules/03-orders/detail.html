<!-- 03-orders/detail.html -->
<div class="page-container" data-page="03-orders-detail">
    <div class="page-header">
        <h1><i class="fas fa-clipboard-list"></i> 订单详情</h1>
        <div class="page-actions">
            <button class="btn btn-success" onclick="window.OrderDetailModule.printOrder()">
                <i class="fas fa-print"></i> 打印
            </button>
            <button class="btn btn-warning" onclick="window.OrderDetailModule.editOrder()">
                <i class="fas fa-edit"></i> 编辑
            </button>
            <button class="btn btn-outline" onclick="window.history.back()">
                <i class="fas fa-arrow-left"></i> 返回
            </button>
        </div>
    </div>
    <div class="page-content">
        <div class="detail-container">
            <!-- 订单状态 -->
            <div class="detail-status" id="orderStatus">
                <div class="status-badge">
                    <span class="badge badge-processing" id="statusBadge">处理中</span>
                </div>
                <div class="status-timeline" id="statusTimeline">
                    <div class="timeline-step active">已下单</div>
                    <div class="timeline-step active">已确认</div>
                    <div class="timeline-step">制作中</div>
                    <div class="timeline-step">已完成</div>
                </div>
            </div>

            <!-- 基本信息 -->
            <div class="detail-grid">
                <div class="detail-card">
                    <h4>📋 订单信息</h4>
                    <div class="info-row">
                        <span class="label">订单编号</span>
                        <span class="value" id="orderId">ORD-2024-0001</span>
                    </div>
                    <div class="info-row">
                        <span class="label">创建时间</span>
                        <span class="value" id="orderCreatedAt">2024-01-15 14:30</span>
                    </div>
                    <div class="info-row">
                        <span class="label">支付方式</span>
                        <span class="value" id="orderPayment">微信支付</span>
                    </div>
                    <div class="info-row">
                        <span class="label">支付状态</span>
                        <span class="value"><span class="badge badge-success" id="paymentStatus">已支付</span></span>
                    </div>
                </div>

                <div class="detail-card">
                    <h4>👤 客户信息</h4>
                    <div class="info-row">
                        <span class="label">客户名称</span>
                        <span class="value" id="customerName">张伟</span>
                    </div>
                    <div class="info-row">
                        <span class="label">联系电话</span>
                        <span class="value" id="customerPhone">13800001111</span>
                    </div>
                    <div class="info-row">
                        <span class="label">客户等级</span>
                        <span class="value"><span class="badge badge-gold" id="customerLevel">黄金会员</span></span>
                    </div>
                    <div class="info-row">
                        <span class="label">备注</span>
                        <span class="value" id="orderNote">无特殊要求</span>
                    </div>
                </div>
            </div>

            <!-- 商品列表 -->
            <div class="detail-card full-width">
                <h4>🛒 商品明细</h4>
                <table class="detail-table" id="orderItems">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>商品名称</th>
                            <th>单价</th>
                            <th>数量</th>
                            <th>小计</th>
                        </tr>
                    </thead>
                    <tbody id="orderItemsBody">
                        <tr>
                            <td>1</td>
                            <td>标准洗车</td>
                            <td>¥68.00</td>
                            <td>1</td>
                            <td>¥68.00</td>
                        </tr>
                        <tr>
                            <td>2</td>
                            <td>抛光打蜡</td>
                            <td>¥388.00</td>
                            <td>1</td>
                            <td>¥388.00</td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="4" style="text-align:right;font-weight:600;">小计</td>
                            <td id="subtotal">¥456.00</td>
                        </tr>
                        <tr>
                            <td colspan="4" style="text-align:right;font-weight:600;">折扣</td>
                            <td id="discount">-¥0.00</td>
                        </tr>
                        <tr>
                            <td colspan="4" style="text-align:right;font-weight:600;">税费 (6%)</td>
                            <td id="tax">¥27.36</td>
                        </tr>
                        <tr class="total-row">
                            <td colspan="4" style="text-align:right;font-weight:700;">总计</td>
                            <td id="totalAmount" style="font-weight:700;font-size:18px;color:#4F46E5;">¥483.36</td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <!-- 操作按钮 -->
            <div class="detail-actions">
                <button class="btn btn-success" onclick="window.OrderDetailModule.approveOrder()">
                    <i class="fas fa-check-circle"></i> 确认订单
                </button>
                <button class="btn btn-warning" onclick="window.OrderDetailModule.updateStatus()">
                    <i class="fas fa-sync"></i> 更新状态
                </button>
                <button class="btn btn-danger" onclick="window.OrderDetailModule.cancelOrder()">
                    <i class="fas fa-times-circle"></i> 取消订单
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    .detail-container { max-width: 1000px; margin: 0 auto; }
    
    .detail-status { background: white; border-radius: 12px; padding: 20px 24px; border: 1px solid #e5e7eb; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
    .status-badge .badge { font-size: 16px; padding: 6px 16px; }
    .badge-processing { background: #DBEAFE; color: #1E40AF; }
    .badge-completed { background: #D1FAE5; color: #065F46; }
    .badge-cancelled { background: #FEE2E2; color: #991B1B; }
    .badge-pending { background: #FEF3C7; color: #92400E; }
    .badge-gold { background: #FEF3C7; color: #92400E; }
    
    .status-timeline { display: flex; gap: 8px; align-items: center; }
    .timeline-step { font-size: 13px; color: #9CA3AF; padding: 4px 12px; border-radius: 9999px; background: #F3F4F6; }
    .timeline-step.active { background: #4F46E5; color: white; }
    
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .detail-card { background: white; border-radius: 12px; padding: 20px 24px; border: 1px solid #e5e7eb; }
    .detail-card.full-width { grid-column: 1 / -1; }
    .detail-card h4 { margin: 0 0 16px 0; font-size: 15px; color: #374151; }
    
    .info-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #F3F4F6; font-size: 14px; }
    .info-row:last-child { border-bottom: none; }
    .info-row .label { color: #6B7280; }
    .info-row .value { font-weight: 500; }
    
    .detail-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .detail-table th { text-align: left; padding: 8px 12px; background: #F9FAFB; font-weight: 600; color: #6B7280; border-bottom: 2px solid #E5E7EB; }
    .detail-table td { padding: 8px 12px; border-bottom: 1px solid #F3F4F6; }
    .detail-table tfoot td { padding: 8px 12px; border-top: 2px solid #E5E7EB; }
    .detail-table .total-row td { border-top: 3px solid #4F46E5; }
    
    .detail-actions { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
    .btn-success { background: #10B981; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; display: inline-flex; align-items: center; gap: 6px; }
    .btn-success:hover { background: #059669; }
    .btn-warning { background: #F59E0B; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; display: inline-flex; align-items: center; gap: 6px; }
    .btn-warning:hover { background: #D97706; }
    .btn-danger { background: #EF4444; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; display: inline-flex; align-items: center; gap: 6px; }
    .btn-danger:hover { background: #DC2626; }
    
    [data-theme="dark"] .detail-status,
    [data-theme="dark"] .detail-card { background: #2C2C2E; border-color: #48484A; }
    [data-theme="dark"] .detail-card h4 { color: #F5F5F7; }
    [data-theme="dark"] .detail-table th { background: #3A3A3C; color: #9CA3AF; }
    [data-theme="dark"] .detail-table td { border-color: #48484A; }
    [data-theme="dark"] .info-row { border-color: #3A3A3C; }
    [data-theme="dark"] .timeline-step { background: #3A3A3C; color: #9CA3AF; }
    [data-theme="dark"] .timeline-step.active { background: #4F46E5; color: white; }
    
    @media (max-width: 768px) { .detail-grid { grid-template-columns: 1fr; } .detail-status { flex-direction: column; align-items: flex-start; } .status-timeline { flex-wrap: wrap; } }
</style>

<script>
    (function() {
        window.OrderDetailModule = {
            orderData: null,
            orderId: null,
            
            init: function() {
                // 从URL获取订单ID
                const params = new URLSearchParams(window.location.search);
                this.orderId = params.get('id') || 'ORD-2024-0001';
                this.loadOrderData();
            },
            
            loadOrderData: function() {
                // 模拟订单数据
                this.orderData = {
                    id: this.orderId,
                    createdAt: '2024-01-15 14:30',
                    payment: '微信支付',
                    paymentStatus: 'paid',
                    customer: '张伟',
                    phone: '13800001111',
                    level: 'gold',
                    note: '无特殊要求',
                    status: 'processing',
                    items: [
                        { name: '标准洗车', price: 68, qty: 1 },
                        { name: '抛光打蜡', price: 388, qty: 1 }
                    ],
                    subtotal: 456,
                    discount: 0,
                    tax: 27.36,
                    total: 483.36
                };
                this.render();
            },
            
            render: function() {
                const data = this.orderData;
                if (!data) return;
                
                // 基本信息
                document.getElementById('orderId').textContent = data.id;
                document.getElementById('orderCreatedAt').textContent = data.createdAt;
                document.getElementById('orderPayment').textContent = data.payment;
                document.getElementById('paymentStatus').textContent = data.paymentStatus === 'paid' ? '已支付' : '未支付';
                document.getElementById('paymentStatus').className = 'badge ' + (data.paymentStatus === 'paid' ? 'badge-success' : 'badge-warning');
                
                document.getElementById('customerName').textContent = data.customer;
                document.getElementById('customerPhone').textContent = data.phone;
                document.getElementById('customerLevel').textContent = data.level === 'gold' ? '黄金会员' : '普通会员';
                document.getElementById('orderNote').textContent = data.note || '无';
                
                // 状态
                const statusMap = {
                    pending: '待处理',
                    processing: '处理中',
                    completed: '已完成',
                    cancelled: '已取消'
                };
                const statusBadge = document.getElementById('statusBadge');
                statusBadge.textContent = statusMap[data.status] || data.status;
                statusBadge.className = 'badge badge-' + data.status;
                
                // 时间线
                const steps = ['已下单', '已确认', '制作中', '已完成'];
                const statusIndex = { pending: 1, processing: 2, completed: 3, cancelled: 1 };
                const idx = statusIndex[data.status] || 1;
                const timeline = document.getElementById('statusTimeline');
                timeline.innerHTML = steps.map((s, i) => 
                    `<div class="timeline-step ${i < idx ? 'active' : ''}">${s}</div>`
                ).join('');
                
                // 商品列表
                const tbody = document.getElementById('orderItemsBody');
                tbody.innerHTML = data.items.map((item, i) => `
                    <tr>
                        <td>${i + 1}</td>
                        <td>${item.name}</td>
                        <td>¥${item.price.toFixed(2)}</td>
                        <td>${item.qty}</td>
                        <td>¥${(item.price * item.qty).toFixed(2)}</td>
                    </tr>
                `).join('');
                
                // 总计
                document.getElementById('subtotal').textContent = '¥' + data.subtotal.toFixed(2);
                document.getElementById('discount').textContent = '-¥' + data.discount.toFixed(2);
                document.getElementById('tax').textContent = '¥' + data.tax.toFixed(2);
                document.getElementById('totalAmount').textContent = '¥' + data.total.toFixed(2);
            },
            
            printOrder: function() {
                window.print();
            },
            
            editOrder: function() {
                alert('编辑订单功能开发中...');
            },
            
            approveOrder: function() {
                if (confirm('确认该订单吗？')) {
                    this.orderData.status = 'processing';
                    this.render();
                    alert('订单已确认');
                }
            },
            
            updateStatus: function() {
                const statuses = ['pending', 'processing', 'completed', 'cancelled'];
                const current = statuses.indexOf(this.orderData.status);
                const next = prompt('选择新状态:\n0: 待处理\n1: 处理中\n2: 已完成\n3: 已取消', current + 1);
                if (next !== null && next >= 0 && next < statuses.length) {
                    this.orderData.status = statuses[parseInt(next)];
                    this.render();
                    alert('状态已更新为: ' + this.orderData.status);
                }
            },
            
            cancelOrder: function() {
                if (confirm('确认取消该订单吗？')) {
                    this.orderData.status = 'cancelled';
                    this.render();
                    alert('订单已取消');
                }
            }
        };
        
        document.addEventListener('DOMContentLoaded', function() {
            window.OrderDetailModule.init();
        });
    })();
</script>
