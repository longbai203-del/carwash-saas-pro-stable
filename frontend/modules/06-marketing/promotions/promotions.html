<!-- 06-marketing/promotions.html -->
<div class="page-container" data-page="06-marketing-promotions">
    <div class="page-header">
        <h1><i class="fas fa-tags"></i> 促销管理</h1>
        <div class="page-actions">
            <button class="btn btn-primary" onclick="window.PromotionModule.showCreateModal()">
                <i class="fas fa-plus"></i> 新建促销
            </button>
            <button class="btn btn-success" onclick="window.PromotionModule.exportPromotions()">
                <i class="fas fa-file-excel"></i> 导出
            </button>
            <button class="btn btn-outline" onclick="location.reload()">
                <i class="fas fa-sync-alt"></i> 刷新
            </button>
        </div>
    </div>
    <div class="page-content">
        <div class="promotion-container">
            <!-- 统计卡片 -->
            <div class="promotion-stats">
                <div class="stat-card">
                    <span class="stat-label">总促销</span>
                    <span class="stat-number" id="totalPromotions">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">进行中</span>
                    <span class="stat-number" id="activePromotions">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">待开始</span>
                    <span class="stat-number" id="pendingPromotions">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">已结束</span>
                    <span class="stat-number" id="endedPromotions">0</span>
                </div>
            </div>

            <!-- 搜索栏 -->
            <div class="promotion-search">
                <div class="search-row">
                    <div class="form-group">
                        <label>促销名称</label>
                        <input id="searchName" type="text" placeholder="输入促销名称" />
                    </div>
                    <div class="form-group">
                        <label>类型</label>
                        <select id="searchType">
                            <option value="">全部类型</option>
                            <option value="discount">折扣</option>
                            <option value="coupon">优惠券</option>
                            <option value="bundle">组合优惠</option>
                            <option value="member">会员专享</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>状态</label>
                        <select id="searchStatus">
                            <option value="">全部状态</option>
                            <option value="active">进行中</option>
                            <option value="pending">待开始</option>
                            <option value="ended">已结束</option>
                        </select>
                    </div>
                    <div class="search-actions">
                        <button id="searchBtn" class="btn btn-primary"><i class="fas fa-search"></i> 搜索</button>
                        <button id="resetBtn" class="btn btn-secondary"><i class="fas fa-undo"></i> 重置</button>
                    </div>
                </div>
            </div>

            <!-- 工具栏 -->
            <div class="promotion-toolbar">
                <span class="text-sm text-gray-500">共 <span id="totalCount">0</span> 条记录</span>
            </div>

            <!-- 促销列表 -->
            <div class="promotion-table-container">
                <table class="promotion-table">
                    <thead>
                        <tr>
                            <th>促销名称</th>
                            <th>类型</th>
                            <th style="text-align:center;">优惠力度</th>
                            <th>有效期</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="promotionsTableBody">
                        <tr>
                            <td colspan="6" style="text-align:center;padding:40px;color:#9CA3AF;">
                                <i class="fas fa-tags" style="font-size:32px;display:block;margin-bottom:8px;"></i>
                                加载中...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 分页 -->
            <div class="promotion-pagination" id="paginationContainer">
                <span id="pageInfo">共 0 条，第 1/1 页</span>
                <div class="pagination-btns">
                    <button onclick="window.PromotionModule.prevPage()"><i class="fas fa-chevron-left"></i></button>
                    <span id="pageNumbers">1</span>
                    <button onclick="window.PromotionModule.nextPage()"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- 新建/编辑促销弹窗 -->
    <div class="modal-overlay" id="promotionModal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">新建促销</h3>
                <button class="modal-close" onclick="window.PromotionModule.closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>促销名称 <span style="color:red;">*</span></label>
                    <input id="formName" type="text" placeholder="输入促销名称" />
                </div>
                <div class="form-group">
                    <label>类型 <span style="color:red;">*</span></label>
                    <select id="formType">
                        <option value="discount">折扣</option>
                        <option value="coupon">优惠券</option>
                        <option value="bundle">组合优惠</option>
                        <option value="member">会员专享</option>
                    </select>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                    <div class="form-group">
                        <label>优惠值 <span style="color:red;">*</span></label>
                        <input id="formValue" type="text" placeholder="如: 20% 或 ¥50" />
                    </div>
                    <div class="form-group">
                        <label>状态</label>
                        <select id="formStatus">
                            <option value="active">进行中</option>
                            <option value="pending">待开始</option>
                            <option value="ended">已结束</option>
                        </select>
                    </div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                    <div class="form-group">
                        <label>开始日期</label>
                        <input id="formStartDate" type="date" />
                    </div>
                    <div class="form-group">
                        <label>结束日期</label>
                        <input id="formEndDate" type="date" />
                    </div>
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea id="formDesc" rows="2" placeholder="促销活动描述"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="window.PromotionModule.closeModal()">取消</button>
                <button class="btn btn-primary" onclick="window.PromotionModule.savePromotion()">保存</button>
            </div>
        </div>
    </div>
</div>

<script>
    /**
     * PromotionModule - 促销管理模块
     * @module PromotionModule
     * @description 管理促销活动的创建、编辑、删除和状态
     */
    (function() {
        'use strict';

        /** @type {Object} PromotionModule - 促销管理模块 */
        window.PromotionModule = {
            /** @type {Array<Object>} 所有促销数据 */
            promotions: [],
            /** @type {Array<Object>} 筛选后的促销数据 */
            filteredPromotions: [],
            /** @type {number} 当前页码 */
            page: 1,
            /** @type {number} 每页显示数量 */
            pageSize: 10,
            /** @type {string|null} 正在编辑的促销ID */
            editingId: null,
            
            /**
             * 初始化模块
             * @returns {void}
             */
            init: function() {
                this.loadPromotions();
                this.bindEvents();
                this.render();
            },
            
            /**
             * 从localStorage加载促销数据
             * @returns {void}
             */
            loadPromotions: function() {
                const saved = localStorage.getItem('promotion_data');
                if (saved) {
                    try {
                        this.promotions = JSON.parse(saved);
                    } catch (e) {
                        this.promotions = this.getMockPromotions();
                    }
                } else {
                    this.promotions = this.getMockPromotions();
                    localStorage.setItem('promotion_data', JSON.stringify(this.promotions));
                }
                this.filteredPromotions = [...this.promotions];
            },
            
            /**
             * 获取模拟促销数据
             * @returns {Array<Object>} 促销数组
             */
            getMockPromotions: function() {
                return [
                    { id: 'PM-001', name: '夏日特惠', type: 'discount', value: '20%', status: 'active', startDate: '2024-06-01', endDate: '2024-08-31', desc: '夏季洗车服务8折优惠' },
                    { id: 'PM-002', name: '新客立减', type: 'coupon', value: '¥50', status: 'active', startDate: '2024-01-01', endDate: '2024-12-31', desc: '新客户首次洗车立减50元' },
                    { id: 'PM-003', name: '会员折扣', type: 'member', value: '15%', status: 'ended', startDate: '2024-01-01', endDate: '2024-06-30', desc: '会员专享85折优惠' },
                    { id: 'PM-004', name: '国庆特惠', type: 'bundle', value: '满300减50', status: 'pending', startDate: '2024-10-01', endDate: '2024-10-07', desc: '国庆期间满300减50' },
                    { id: 'PM-005', name: '双十一优惠', type: 'discount', value: '30%', status: 'pending', startDate: '2024-11-01', endDate: '2024-11-11', desc: '双十一全场7折' }
                ];
            },
            
            /**
             * 渲染促销列表
             * @returns {void}
             */
            render: function() {
                const tbody = document.getElementById('promotionsTableBody');
                const start = (this.page - 1) * this.pageSize;
                const end = start + this.pageSize;
                const pageData = this.filteredPromotions.slice(start, end);
                
                if (pageData.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="6" style="text-align:center;padding:40px;color:#9CA3AF;">
                                <i class="fas fa-tags" style="font-size:32px;display:block;margin-bottom:8px;"></i>
                                暂无促销数据
                            </td>
                        </tr>
                    `;
                } else {
                    const typeMap = { discount: '折扣', coupon: '优惠券', bundle: '组合优惠', member: '会员专享' };
                    const typeClass = { discount: 'badge-discount', coupon: 'badge-coupon', bundle: 'badge-bundle', member: 'badge-member' };
                    const statusMap = { active: '进行中', pending: '待开始', ended: '已结束' };
                    const statusClass = { active: 'badge-status-active', pending: 'badge-status-pending', ended: 'badge-status-ended' };
                    
                    tbody.innerHTML = pageData.map(p => `
                        <tr>
                            <td><strong>${p.name}</strong></td>
                            <td><span class="badge-type ${typeClass[p.type] || 'badge-discount'}">${typeMap[p.type] || p.type}</span></td>
                            <td style="text-align:center;font-weight:700;">${p.value}</td>
                            <td style="font-size:13px;color:#6B7280;">${p.startDate || '-'} ~ ${p.endDate || '-'}</td>
                            <td><span class="badge-type ${statusClass[p.status] || 'badge-status-active'}">${statusMap[p.status] || p.status}</span></td>
                            <td>
                                <div style="display:flex;gap:4px;">
                                    <button class="btn-sm btn-sm-primary" onclick="window.PromotionModule.editPromotion('${p.id}')">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button class="btn-sm ${p.status === 'active' ? 'btn-sm-warning' : 'btn-sm-success'}" onclick="window.PromotionModule.toggleStatus('${p.id}')">
                                        <i class="fas ${p.status === 'active' ? 'fa-pause' : 'fa-play'}"></i>
                                    </button>
                                    <button class="btn-sm btn-sm-danger" onclick="window.PromotionModule.deletePromotion('${p.id}')">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `).join('');
                }
                
                this.updateStats();
                this.renderPagination();
            },
            
            /**
             * 更新统计卡片
             * @returns {void}
             */
            updateStats: function() {
                document.getElementById('totalPromotions').textContent = this.promotions.length;
                document.getElementById('activePromotions').textContent = this.promotions.filter(p => p.status === 'active').length;
                document.getElementById('pendingPromotions').textContent = this.promotions.filter(p => p.status === 'pending').length;
                document.getElementById('endedPromotions').textContent = this.promotions.filter(p => p.status === 'ended').length;
                document.getElementById('totalCount').textContent = this.filteredPromotions.length;
            },
            
            /**
             * 渲染分页
             * @returns {void}
             */
            renderPagination: function() {
                const total = this.filteredPromotions.length;
                const totalPages = Math.ceil(total / this.pageSize) || 1;
                document.getElementById('pageInfo').textContent = `共 ${total} 条，第 ${this.page}/${totalPages} 页`;
                
                let html = '';
                for (let i = 1; i <= Math.min(totalPages, 7); i++) {
                    if (i === this.page) {
                        html += `<span style="font-weight:700;padding:0 6px;color:#4F46E5;">${i}</span>`;
                    } else if (i === 1 || i === totalPages || Math.abs(i - this.page) <= 2) {
                        html += `<button onclick="window.PromotionModule.goToPage(${i})">${i}</button>`;
                    } else if (i === this.page - 3 || i === this.page + 3) {
                        html += `<span style="padding:0 4px;color:#9CA3AF;">...</span>`;
                    }
                }
                document.getElementById('pageNumbers').innerHTML = html;
            },
            
            /**
             * 跳转到指定页
             * @param {number} page - 目标页码
             * @returns {void}
             */
            goToPage: function(page) {
                const totalPages = Math.ceil(this.filteredPromotions.length / this.pageSize) || 1;
                if (page < 1 || page > totalPages) return;
                this.page = page;
                this.render();
            },
            
            /**
             * 上一页
             * @returns {void}
             */
            prevPage: function() {
                if (this.page > 1) {
                    this.page--;
                    this.render();
                }
            },
            
            /**
             * 下一页
             * @returns {void}
             */
            nextPage: function() {
                const totalPages = Math.ceil(this.filteredPromotions.length / this.pageSize) || 1;
                if (this.page < totalPages) {
                    this.page++;
                    this.render();
                }
            },
            
            /**
             * 绑定事件
             * @returns {void}
             */
            bindEvents: function() {
                document.getElementById('searchBtn')?.addEventListener('click', () => this.handleSearch());
                document.getElementById('resetBtn')?.addEventListener('click', () => this.handleReset());
                document.querySelectorAll('#searchName, #searchType, #searchStatus').forEach(el => {
                    el.addEventListener('keypress', e => { if (e.key === 'Enter') this.handleSearch(); });
                });
            },
            
            /**
             * 处理搜索
             * @returns {void}
             */
            handleSearch: function() {
                const name = document.getElementById('searchName').value.toLowerCase();
                const type = document.getElementById('searchType').value;
                const status = document.getElementById('searchStatus').value;
                
                this.filteredPromotions = this.promotions.filter(p => {
                    let match = true;
                    if (name && !p.name.toLowerCase().includes(name)) match = false;
                    if (type && p.type !== type) match = false;
                    if (status && p.status !== status) match = false;
                    return match;
                });
                this.page = 1;
                this.render();
            },
            
            /**
             * 重置搜索
             * @returns {void}
             */
            handleReset: function() {
                document.getElementById('searchName').value = '';
                document.getElementById('searchType').value = '';
                document.getElementById('searchStatus').value = '';
                this.filteredPromotions = [...this.promotions];
                this.page = 1;
                this.render();
            },
            
            /**
             * 显示创建弹窗
             * @returns {void}
             */
            showCreateModal: function() {
                this.editingId = null;
                document.getElementById('modalTitle').textContent = '新建促销';
                document.getElementById('formName').value = '';
                document.getElementById('formType').value = 'discount';
                document.getElementById('formValue').value = '';
                document.getElementById('formStatus').value = 'active';
                document.getElementById('formStartDate').value = '';
                document.getElementById('formEndDate').value = '';
                document.getElementById('formDesc').value = '';
                document.getElementById('promotionModal').style.display = 'flex';
            },
            
            /**
             * 编辑促销
             * @param {string} id - 促销ID
             * @returns {void}
             */
            editPromotion: function(id) {
                const promotion = this.promotions.find(p => p.id === id);
                if (!promotion) return;
                this.editingId = id;
                document.getElementById('modalTitle').textContent = '编辑促销';
                document.getElementById('formName').value = promotion.name;
                document.getElementById('formType').value = promotion.type;
                document.getElementById('formValue').value = promotion.value;
                document.getElementById('formStatus').value = promotion.status;
                document.getElementById('formStartDate').value = promotion.startDate || '';
                document.getElementById('formEndDate').value = promotion.endDate || '';
                document.getElementById('formDesc').value = promotion.desc || '';
                document.getElementById('promotionModal').style.display = 'flex';
            },
            
            /**
             * 关闭弹窗
             * @returns {void}
             */
            closeModal: function() {
                document.getElementById('promotionModal').style.display = 'none';
            },
            
            /**
             * 保存促销
             * @returns {void}
             */
            savePromotion: function() {
                const name = document.getElementById('formName').value.trim();
                const type = document.getElementById('formType').value;
                const value = document.getElementById('formValue').value.trim();
                const status = document.getElementById('formStatus').value;
                const startDate = document.getElementById('formStartDate').value;
                const endDate = document.getElementById('formEndDate').value;
                const desc = document.getElementById('formDesc').value.trim();
                
                if (!name) { alert('请输入促销名称'); return; }
                if (!value) { alert('请输入优惠值'); return; }
                
                if (this.editingId) {
                    const index = this.promotions.findIndex(p => p.id === this.editingId);
                    if (index >= 0) {
                        this.promotions[index] = { ...this.promotions[index], name, type, value, status, startDate, endDate, desc };
                    }
                } else {
                    const newPromotion = {
                        id: 'PM-' + Date.now().toString().slice(-6),
                        name, type, value, status, startDate, endDate, desc
                    };
                    this.promotions.push(newPromotion);
                }
                
                localStorage.setItem('promotion_data', JSON.stringify(this.promotions));
                this.filteredPromotions = [...this.promotions];
                this.closeModal();
                this.render();
                alert(this.editingId ? '促销已更新' : '促销已创建');
            },
            
            /**
             * 切换促销状态
             * @param {string} id - 促销ID
             * @returns {void}
             */
            toggleStatus: function(id) {
                const promotion = this.promotions.find(p => p.id === id);
                if (promotion) {
                    const statusMap = { active: 'ended', pending: 'active', ended: 'active' };
                    promotion.status = statusMap[promotion.status] || 'active';
                    localStorage.setItem('promotion_data', JSON.stringify(this.promotions));
                    this.filteredPromotions = [...this.promotions];
                    this.render();
                }
            },
            
            /**
             * 删除促销
             * @param {string} id - 促销ID
             * @returns {void}
             */
            deletePromotion: function(id) {
                if (!confirm('确认删除该促销？')) return;
                this.promotions = this.promotions.filter(p => p.id !== id);
                this.filteredPromotions = [...this.promotions];
                localStorage.setItem('promotion_data', JSON.stringify(this.promotions));
                this.render();
                alert('促销已删除');
            },
            
            /**
             * 导出促销数据
             * @returns {void}
             */
            exportPromotions: function() {
                if (this.promotions.length === 0) {
                    alert('没有促销数据可导出');
                    return;
                }
                const data = this.promotions.map(p => ({
                    '名称': p.name,
                    '类型': p.type,
                    '优惠值': p.value,
                    '状态': p.status,
                    '开始日期': p.startDate || '',
                    '结束日期': p.endDate || '',
                    '描述': p.desc || ''
                }));
                console.log('导出数据:', data);
                alert('数据已导出到控制台');
            }
        };
        
        document.addEventListener('DOMContentLoaded', function() {
            window.PromotionModule.init();
            document.getElementById('promotionModal')?.addEventListener('click', function(e) {
                if (e.target === this) window.PromotionModule.closeModal();
            });
        });
    })();
</script>
