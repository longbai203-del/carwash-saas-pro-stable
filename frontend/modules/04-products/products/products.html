<!-- 04-products/products.html -->
<div class="page-container" data-page="04-products-products">
    <div class="page-header">
        <h1><i class="fas fa-box"></i> 商品管理</h1>
        <div class="page-actions">
            <button class="btn btn-primary" onclick="window.ProductModule.showCreateModal()">
                <i class="fas fa-plus"></i> 新建商品
            </button>
            <button class="btn btn-outline" onclick="location.reload()">
                <i class="fas fa-sync-alt"></i> 刷新
            </button>
        </div>
    </div>
    <div class="page-content">
        <div class="product-container">
            <!-- 统计卡片 -->
            <div class="product-stats">
                <div class="stat-card">
                    <span class="stat-label">总商品</span>
                    <span class="stat-number" id="totalProducts">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">上架</span>
                    <span class="stat-number" id="activeProducts">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">下架</span>
                    <span class="stat-number" id="inactiveProducts">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">库存不足</span>
                    <span class="stat-number" id="lowStockProducts">0</span>
                </div>
            </div>

            <!-- 搜索栏 -->
            <div class="product-search">
                <div class="search-row">
                    <div class="form-group">
                        <label>商品名称</label>
                        <input id="searchName" type="text" placeholder="输入商品名称" />
                    </div>
                    <div class="form-group">
                        <label>分类</label>
                        <select id="searchCategory">
                            <option value="">全部分类</option>
                            <option value="洗车">洗车</option>
                            <option value="美容">美容</option>
                            <option value="保养">保养</option>
                            <option value="会员">会员</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>状态</label>
                        <select id="searchStatus">
                            <option value="">全部状态</option>
                            <option value="active">上架</option>
                            <option value="inactive">下架</option>
                        </select>
                    </div>
                    <div class="search-actions">
                        <button id="searchBtn" class="btn btn-primary"><i class="fas fa-search"></i> 搜索</button>
                        <button id="resetBtn" class="btn btn-secondary"><i class="fas fa-undo"></i> 重置</button>
                    </div>
                </div>
            </div>

            <!-- 工具栏 -->
            <div class="product-toolbar">
                <span class="text-sm text-gray-500">共 <span id="totalCount">0</span> 条记录</span>
            </div>

            <!-- 商品列表 -->
            <div class="product-table-container">
                <table class="product-table">
                    <thead>
                        <tr>
                            <th>商品信息</th>
                            <th>分类</th>
                            <th style="text-align:right;">售价</th>
                            <th style="text-align:right;">成本</th>
                            <th style="text-align:right;">库存</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody">
                        <tr>
                            <td colspan="7" style="text-align:center;padding:40px;color:#9CA3AF;">
                                <i class="fas fa-box" style="font-size:32px;display:block;margin-bottom:8px;"></i>
                                加载中...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 分页 -->
            <div class="product-pagination" id="paginationContainer">
                <span id="pageInfo">共 0 条，第 1/1 页</span>
                <div class="pagination-btns">
                    <button onclick="window.ProductModule.prevPage()"><i class="fas fa-chevron-left"></i></button>
                    <span id="pageNumbers">1</span>
                    <button onclick="window.ProductModule.nextPage()"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- 新建商品弹窗 -->
    <div class="modal-overlay" id="productModal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">新建商品</h3>
                <button class="modal-close" onclick="window.ProductModule.closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>商品名称 <span style="color:red;">*</span></label>
                    <input id="formName" type="text" placeholder="输入商品名称" />
                </div>
                <div class="form-group">
                    <label>分类 <span style="color:red;">*</span></label>
                    <select id="formCategory">
                        <option value="洗车">洗车</option>
                        <option value="美容">美容</option>
                        <option value="保养">保养</option>
                        <option value="会员">会员</option>
                    </select>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                    <div class="form-group">
                        <label>售价 <span style="color:red;">*</span></label>
                        <input id="formPrice" type="number" step="0.01" placeholder="0.00" />
                    </div>
                    <div class="form-group">
                        <label>成本</label>
                        <input id="formCost" type="number" step="0.01" placeholder="0.00" />
                    </div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                    <div class="form-group">
                        <label>库存 <span style="color:red;">*</span></label>
                        <input id="formStock" type="number" placeholder="0" />
                    </div>
                    <div class="form-group">
                        <label>单位</label>
                        <input id="formUnit" type="text" placeholder="个/件/瓶" />
                    </div>
                </div>
                <div class="form-group">
                    <label>状态</label>
                    <select id="formStatus">
                        <option value="active">上架</option>
                        <option value="inactive">下架</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="window.ProductModule.closeModal()">取消</button>
                <button class="btn btn-primary" onclick="window.ProductModule.saveProduct()">保存</button>
            </div>
        </div>
    </div>
</div>

<style>
    .product-container { max-width: 1200px; margin: 0 auto; }
    
    .product-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
    .product-stats .stat-card { background: white; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #e5e7eb; }
    .product-stats .stat-card .stat-label { display: block; font-size: 13px; color: #6B7280; }
    .product-stats .stat-card .stat-number { display: block; font-size: 28px; font-weight: 700; color: #1F2937; margin-top: 4px; }
    .product-stats .stat-card:nth-child(1) .stat-number { color: #4F46E5; }
    .product-stats .stat-card:nth-child(2) .stat-number { color: #10B981; }
    .product-stats .stat-card:nth-child(3) .stat-number { color: #EF4444; }
    .product-stats .stat-card:nth-child(4) .stat-number { color: #F59E0B; }
    
    .product-search { background: white; border-radius: 12px; padding: 16px 20px; border: 1px solid #e5e7eb; margin-bottom: 16px; }
    .search-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
    .search-row .form-group { flex: 1; min-width: 150px; }
    .search-row .form-group label { display: block; font-size: 12px; color: #6B7280; margin-bottom: 4px; }
    .search-row .form-group input,
    .search-row .form-group select { width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 6px; font-size: 14px; background: white; }
    .search-row .form-group input:focus,
    .search-row .form-group select:focus { outline: none; border-color: #4F46E5; }
    .search-actions { display: flex; gap: 8px; padding-top: 4px; }
    
    .product-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .text-sm { font-size: 14px; }
    .text-gray-500 { color: #6B7280; }
    
    .product-table-container { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #e5e7eb; }
    .product-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .product-table th { background: #F9FAFB; padding: 10px 16px; text-align: left; font-weight: 600; color: #6B7280; border-bottom: 1px solid #E5E7EB; }

    .badge-active { background: #D1FAE5; color: #065F46; }
    .badge-inactive { background: #FEE2E2; color: #991B1B; }
    
    .product-pagination { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: white; border-radius: 12px; margin-top: 16px; border: 1px solid #e5e7eb; }
    .product-pagination .pagination-btns { display: flex; gap: 4px; align-items: center; }
    .product-pagination button { padding: 4px 12px; border: 1px solid #D1D5DB; border-radius: 4px; background: white; cursor: pointer; }

    .btn-sm { padding: 4px 10px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; }

    .btn-sm-primary:hover { background: #4338CA; }
    .btn-sm-danger { background: #EF4444; color: white; }
    .btn-sm-danger:hover { background: #DC2626; }
    .btn-sm-success { background: #10B981; color: white; }
    .btn-sm-success:hover { background: #059669; }
    
    .btn-secondary { background: #F3F4F6; color: #374151; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; }
    .btn-secondary:hover { background: #E5E7EB; }
    
    .product-info { display: flex; align-items: center; gap: 12px; }
    .product-info .product-icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: #F3F4F6; color: #6B7280; }
    
    /* Modal */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .modal-content { background: white; border-radius: 16px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid #E5E7EB; }
    .modal-header h3 { margin: 0; font-size: 18px; }
    .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #9CA3AF; }
    .modal-close:hover { color: #374151; }
    .modal-body { padding: 20px 24px; }
    .modal-body .form-group { margin-bottom: 12px; }
    .modal-body .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: #374151; }
    .modal-body .form-group input,
    .modal-body .form-group select { width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 6px; font-size: 14px; }
    .modal-body .form-group input:focus,
    .modal-body .form-group select:focus { outline: none; border-color: #4F46E5; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 16px 24px; border-top: 1px solid #E5E7EB; }
    
    [data-theme="dark"] .product-stats .stat-card,
    [data-theme="dark"] .product-search,
    [data-theme="dark"] .product-table-container,
    [data-theme="dark"] .product-pagination,
    [data-theme="dark"] .modal-content { background: #2C2C2E; border-color: #48484A; }
    [data-theme="dark"] .product-stats .stat-card .stat-number { color: #F5F5F7; }
    [data-theme="dark"] .product-table th { background: #3A3A3C; color: #9CA3AF; }
    [data-theme="dark"] .product-table td { border-color: #3A3A3C; }
    [data-theme="dark"] .product-table tr:hover { background: #3A3A3C; }
    [data-theme="dark"] .search-row .form-group input,
    [data-theme="dark"] .search-row .form-group select,
    [data-theme="dark"] .modal-body .form-group input,
    [data-theme="dark"] .modal-body .form-group select { background: #3A3A3C; border-color: #48484A; color: #F5F5F7; }
    [data-theme="dark"] .modal-overlay { background: rgba(0,0,0,0.7); }
    
    @media (max-width: 768px) { .product-stats { grid-template-columns: repeat(2, 1fr); } .search-row { flex-direction: column; } }
</style>

<script>
    (function() {
        window.ProductModule = {
            products: [],
            filteredProducts: [],
            page: 1,
            pageSize: 10,
            editingId: null,
            
            init: function() {
                this.loadProducts();
                this.bindEvents();
                this.render();
            },
            
            loadProducts: function() {
                const saved = localStorage.getItem('product_data');
                if (saved) {
                    try {
                        this.products = JSON.parse(saved);
                    } catch (e) {
                        this.products = this.getMockProducts();
                    }
                } else {
                    this.products = this.getMockProducts();
                    localStorage.setItem('product_data', JSON.stringify(this.products));
                }
                this.filteredProducts = [...this.products];
            },
            
            getMockProducts: function() {
                return [
                    { id: 'P001', name: '泡沫洗车液', category: '洗车', price: 68, cost: 35, stock: 45, unit: '瓶', status: 'active' },
                    { id: 'P002', name: '水蜡', category: '洗车', price: 128, cost: 65, stock: 30, unit: '瓶', status: 'active' },
                    { id: 'P003', name: '轮胎光亮剂', category: '美容', price: 88, cost: 40, stock: 20, unit: '瓶', status: 'active' },
                    { id: 'P004', name: '抛光蜡', category: '美容', price: 388, cost: 200, stock: 15, unit: '盒', status: 'active' },
                    { id: 'P005', name: '内饰清洁剂', category: '保养', price: 78, cost: 35, stock: 25, unit: '瓶', status: 'inactive' },
                    { id: 'P006', name: '发动机清洗剂', category: '保养', price: 188, cost: 90, stock: 10, unit: '瓶', status: 'active' },
                    { id: 'P007', name: '空调清洗剂', category: '保养', price: 158, cost: 75, stock: 8, unit: '瓶', status: 'active' },
                    { id: 'P008', name: '玻璃镀膜', category: '美容', price: 228, cost: 120, stock: 12, unit: '瓶', status: 'active' },
                    { id: 'P009', name: '漆面镀晶', category: '美容', price: 688, cost: 350, stock: 5, unit: '套', status: 'active' },
                    { id: 'P010', name: '洗车月卡', category: '会员', price: 398, cost: 200, stock: 50, unit: '张', status: 'active' }
                ];
            },
            
            render: function() {
                const tbody = document.getElementById('productsTableBody');
                const start = (this.page - 1) * this.pageSize;
                const end = start + this.pageSize;
                const pageData = this.filteredProducts.slice(start, end);
                
                if (pageData.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="7" style="text-align:center;padding:40px;color:#9CA3AF;">
                                <i class="fas fa-box" style="font-size:32px;display:block;margin-bottom:8px;"></i>
                                暂无商品数据
                            </td>
                        </tr>
                    `;
                } else {
                    const statusMap = { active: '上架', inactive: '下架' };
                    const statusClass = { active: 'badge-active', inactive: 'badge-inactive' };
                    
                    tbody.innerHTML = pageData.map(p => `
                        <tr>
                            <td>
                                <div class="product-info">
                                    <div class="product-icon"><i class="fas fa-box"></i></div>
                                    <div>
                                        <div style="font-weight:500;">${p.name}</div>
                                        <div style="font-size:12px;color:#6B7280;">${p.id}</div>
                                    </div>
                                </div>
                            </td>
                            <td>${p.category}</td>
                            <td style="text-align:right;font-weight:600;">¥${p.price.toFixed(2)}</td>
                            <td style="text-align:right;color:#6B7280;">¥${p.cost.toFixed(2)}</td>
                            <td style="text-align:right;">
                                <span style="${p.stock < 10 ? 'color:#EF4444;font-weight:700;' : ''}">${p.stock}</span>
                                ${p.stock < 10 ? ' <span style="color:#EF4444;font-size:12px;">⚠️</span>' : ''}
                            </td>
                            <td><span class="badge ${statusClass[p.status] || 'badge-inactive'}">${statusMap[p.status] || p.status}</span></td>
                            <td>
                                <div style="display:flex;gap:4px;">
                                    <button class="btn-sm btn-sm-primary" onclick="window.ProductModule.editProduct('${p.id}')">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button class="btn-sm ${p.status === 'active' ? 'btn-sm-warning' : 'btn-sm-success'}" onclick="window.ProductModule.toggleProduct('${p.id}')" style="${p.status === 'active' ? 'background:#F59E0B;color:white;' : 'background:#10B981;color:white;'}">
                                        <i class="fas ${p.status === 'active' ? 'fa-pause' : 'fa-play'}"></i>
                                    </button>
                                    <button class="btn-sm btn-sm-danger" onclick="window.ProductModule.deleteProduct('${p.id}')">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `).join('');
                }
                
                this.updateStats();
                this.renderPagination();
            },
            
            updateStats: function() {
                document.getElementById('totalProducts').textContent = this.products.length;
                document.getElementById('activeProducts').textContent = this.products.filter(p => p.status === 'active').length;
                document.getElementById('inactiveProducts').textContent = this.products.filter(p => p.status === 'inactive').length;
                document.getElementById('lowStockProducts').textContent = this.products.filter(p => p.stock < 10).length;
                document.getElementById('totalCount').textContent = this.filteredProducts.length;
            },
            
            renderPagination: function() {
                const total = this.filteredProducts.length;
                const totalPages = Math.ceil(total / this.pageSize) || 1;
                document.getElementById('pageInfo').textContent = `共 ${total} 条，第 ${this.page}/${totalPages} 页`;
                
                // 生成页码
                let html = '';
                for (let i = 1; i <= Math.min(totalPages, 7); i++) {
                    if (i === this.page) {
                        html += `<span style="font-weight:700;padding:0 6px;color:#4F46E5;">${i}</span>`;
                    } else if (i === 1 || i === totalPages || Math.abs(i - this.page) <= 2) {
                        html += `<button onclick="window.ProductModule.goToPage(${i})">${i}</button>`;
                    } else if (i === this.page - 3 || i === this.page + 3) {
                        html += `<span style="padding:0 4px;color:#9CA3AF;">...</span>`;
                    }
                }
                document.getElementById('pageNumbers').innerHTML = html;
            },
            
            goToPage: function(page) {
                const totalPages = Math.ceil(this.filteredProducts.length / this.pageSize) || 1;
                if (page < 1 || page > totalPages) return;
                this.page = page;
                this.render();
            },
            
            prevPage: function() {
                if (this.page > 1) {
                    this.page--;
                    this.render();
                }
            },
            
            nextPage: function() {
                const totalPages = Math.ceil(this.filteredProducts.length / this.pageSize) || 1;
                if (this.page < totalPages) {
                    this.page++;
                    this.render();
                }
            },
            
            bindEvents: function() {
                document.getElementById('searchBtn')?.addEventListener('click', () => this.handleSearch());
                document.getElementById('resetBtn')?.addEventListener('click', () => this.handleReset());
                document.querySelectorAll('#searchName, #searchCategory, #searchStatus').forEach(el => {
                    el.addEventListener('keypress', e => { if (e.key === 'Enter') this.handleSearch(); });
                });
            },
            
            handleSearch: function() {
                const name = document.getElementById('searchName').value.toLowerCase();
                const category = document.getElementById('searchCategory').value;
                const status = document.getElementById('searchStatus').value;
                
                this.filteredProducts = this.products.filter(p => {
                    let match = true;
                    if (name && !p.name.toLowerCase().includes(name)) match = false;
                    if (category && p.category !== category) match = false;
                    if (status && p.status !== status) match = false;
                    return match;
                });
                this.page = 1;
                this.render();
            },
            
            handleReset: function() {
                document.getElementById('searchName').value = '';
                document.getElementById('searchCategory').value = '';
                document.getElementById('searchStatus').value = '';
                this.filteredProducts = [...this.products];
                this.page = 1;
                this.render();
            },
            
            showCreateModal: function() {
                this.editingId = null;
                document.getElementById('modalTitle').textContent = '新建商品';
                document.getElementById('formName').value = '';
                document.getElementById('formCategory').value = '洗车';
                document.getElementById('formPrice').value = '';
                document.getElementById('formCost').value = '';
                document.getElementById('formStock').value = '';
                document.getElementById('formUnit').value = '';
                document.getElementById('formStatus').value = 'active';
                document.getElementById('productModal').style.display = 'flex';
            },
            
            editProduct: function(id) {
                const product = this.products.find(p => p.id === id);
                if (!product) return;
                this.editingId = id;
                document.getElementById('modalTitle').textContent = '编辑商品';
                document.getElementById('formName').value = product.name;
                document.getElementById('formCategory').value = product.category;
                document.getElementById('formPrice').value = product.price;
                document.getElementById('formCost').value = product.cost || '';
                document.getElementById('formStock').value = product.stock;
                document.getElementById('formUnit').value = product.unit || '';
                document.getElementById('formStatus').value = product.status;
                document.getElementById('productModal').style.display = 'flex';
            },
            
            closeModal: function() {
                document.getElementById('productModal').style.display = 'none';
            },
            
            saveProduct: function() {
                const name = document.getElementById('formName').value.trim();
                const category = document.getElementById('formCategory').value;
                const price = parseFloat(document.getElementById('formPrice').value);
                const cost = parseFloat(document.getElementById('formCost').value) || 0;
                const stock = parseInt(document.getElementById('formStock').value) || 0;
                const unit = document.getElementById('formUnit').value.trim() || '个';
                const status = document.getElementById('formStatus').value;
                
                if (!name) { alert('请输入商品名称'); return; }
                if (isNaN(price) || price <= 0) { alert('请输入有效的价格'); return; }
                
                if (this.editingId) {
                    const index = this.products.findIndex(p => p.id === this.editingId);
                    if (index >= 0) {
                        this.products[index] = { ...this.products[index], name, category, price, cost, stock, unit, status };
                    }
                } else {
                    const newProduct = {
                        id: 'P' + String(Date.now()).slice(-6),
                        name, category, price, cost, stock, unit, status
                    };
                    this.products.push(newProduct);
                }
                
                localStorage.setItem('product_data', JSON.stringify(this.products));
                this.filteredProducts = [...this.products];
                this.closeModal();
                this.render();
                alert(this.editingId ? '商品已更新' : '商品已创建');
            },
            
            toggleProduct: function(id) {
                const product = this.products.find(p => p.id === id);
                if (product) {
                    product.status = product.status === 'active' ? 'inactive' : 'active';
                    localStorage.setItem('product_data', JSON.stringify(this.products));
                    this.filteredProducts = [...this.products];
                    this.render();
                }
            },
            
            deleteProduct: function(id) {
                if (!confirm('确认删除该商品？')) return;
                this.products = this.products.filter(p => p.id !== id);
                this.filteredProducts = [...this.products];
                localStorage.setItem('product_data', JSON.stringify(this.products));
                this.render();
                alert('商品已删除');
            }
        };
        
        document.addEventListener('DOMContentLoaded', function() {
            window.ProductModule.init();
            // 点击弹窗外部关闭
            document.getElementById('productModal')?.addEventListener('click', function(e) {
                if (e.target === this) window.ProductModule.closeModal();
            });
        });
    })();
</script>
