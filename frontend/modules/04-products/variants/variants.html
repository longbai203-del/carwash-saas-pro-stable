<!-- 04-products/variants.html -->
<div class="page-container" data-page="04-products-variants">
    <div class="page-header">
        <h1><i class="fas fa-code-branch"></i> 产品变体</h1>
        <div class="page-actions">
            <button class="btn btn-primary" onclick="window.VariantModule.newVariant()">
                <i class="fas fa-plus"></i> 新建变体
            </button>
            <button class="btn btn-outline" onclick="location.reload()">
                <i class="fas fa-sync-alt"></i> 刷新
            </button>
        </div>
    </div>
    <div class="page-content">
        <div class="variant-container">
            <!-- 统计卡片 -->
            <div class="variant-stats">
                <div class="stat-card">
                    <span class="stat-label">变体总数</span>
                    <span class="stat-number" id="totalVariants">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">活跃</span>
                    <span class="stat-number" id="activeVariants">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">关联商品</span>
                    <span class="stat-number" id="variantProducts">0</span>
                </div>
            </div>

            <!-- 变体列表 -->
            <div class="variant-list" id="variantList">
                <!-- 由JS生成 -->
            </div>
        </div>
    </div>
</div>

<style>
    .variant-container { max-width: 1000px; margin: 0 auto; }
    
    .variant-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
    .variant-stats .stat-card { background: white; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #e5e7eb; }
    .variant-stats .stat-card .stat-label { display: block; font-size: 13px; color: #6B7280; }
    .variant-stats .stat-card .stat-number { display: block; font-size: 28px; font-weight: 700; color: #1F2937; margin-top: 4px; }
    .variant-stats .stat-card:nth-child(1) .stat-number { color: #4F46E5; }
    .variant-stats .stat-card:nth-child(2) .stat-number { color: #10B981; }
    .variant-stats .stat-card:nth-child(3) .stat-number { color: #8B5CF6; }
    
    .variant-list { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #e5e7eb; }
    .variant-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid #F3F4F6; }
    .variant-item:last-child { border-bottom: none; }
    .variant-item:hover { background: #F9FAFB; }
    .variant-item .variant-info { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .variant-item .variant-name { font-weight: 500; }
    .variant-item .variant-option { font-size: 13px; color: #6B7280; padding: 2px 10px; background: #F3F4F6; border-radius: 9999px; }
    .variant-item .variant-price { font-weight: 600; color: #4F46E5; }
    .variant-item .variant-stock { font-size: 13px; color: #6B7280; }
    .variant-item .variant-actions { display: flex; gap: 4px; }
    
    .empty-variants { text-align: center; padding: 60px 0; color: #9CA3AF; }
    .empty-variants i { font-size: 48px; margin-bottom: 12px; }
    
    [data-theme="dark"] .variant-stats .stat-card,
    [data-theme="dark"] .variant-list { background: #2C2C2E; border-color: #48484A; }
    [data-theme="dark"] .variant-stats .stat-card .stat-number { color: #F5F5F7; }
    [data-theme="dark"] .variant-item { border-color: #3A3A3C; }
    [data-theme="dark"] .variant-item:hover { background: #3A3A3C; }
    [data-theme="dark"] .variant-item .variant-option { background: #3A3A3C; color: #9CA3AF; }
</style>

<script>
    (function() {
        window.VariantModule = {
            variants: [],
            
            init: function() {
                this.loadVariants();
                this.render();
            },
            
            loadVariants: function() {
                const saved = localStorage.getItem('variant_data');
                if (saved) {
                    try {
                        this.variants = JSON.parse(saved);
                    } catch (e) {
                        this.variants = this.getMockVariants();
                    }
                } else {
                    this.variants = this.getMockVariants();
                    localStorage.setItem('variant_data', JSON.stringify(this.variants));
                }
            },
            
            getMockVariants: function() {
                return [
                    { id: 'VR-001', product: '洗车液', option: '500ml', price: 68, stock: 45, status: 'active' },
                    { id: 'VR-002', product: '洗车液', option: '1L', price: 128, stock: 30, status: 'active' },
                    { id: 'VR-003', product: '抛光蜡', option: '200g', price: 88, stock: 20, status: 'active' },
                    { id: 'VR-004', product: '抛光蜡', option: '500g', price: 168, stock: 15, status: 'inactive' },
                    { id: 'VR-005', product: '内饰清洁剂', option: '500ml', price: 78, stock: 25, status: 'active' }
                ];
            },
            
            render: function() {
                const container = document.getElementById('variantList');
                
                if (this.variants.length === 0) {
                    container.innerHTML = `
                        <div class="empty-variants">
                            <i class="fas fa-code-branch"></i>
                            <p>暂无产品变体</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = this.variants.map(v => `
                    <div class="variant-item">
                        <div class="variant-info">
                            <span class="variant-name">${v.product}</span>
                            <span class="variant-option">${v.option}</span>
                            <span class="variant-price">¥${v.price}</span>
                            <span class="variant-stock">库存: ${v.stock}</span>
                            <span class="badge ${v.status === 'active' ? 'badge-success' : 'badge-secondary'}">
                                ${v.status === 'active' ? '活跃' : '停用'}
                            </span>
                        </div>
                        <div class="variant-actions">
                            <button class="btn-sm btn-primary" onclick="window.VariantModule.editVariant('${v.id}')">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn-sm ${v.status === 'active' ? 'btn-warning' : 'btn-success'}" onclick="window.VariantModule.toggleVariant('${v.id}')">
                                <i class="fas ${v.status === 'active' ? 'fa-pause' : 'fa-play'}"></i>
                            </button>
                            <button class="btn-sm btn-danger" onclick="window.VariantModule.deleteVariant('${v.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `).join('');
                
                this.updateStats();
            },
            
            updateStats: function() {
                document.getElementById('totalVariants').textContent = this.variants.length;
                document.getElementById('activeVariants').textContent = this.variants.filter(v => v.status === 'active').length;
                document.getElementById('variantProducts').textContent = [...new Set(this.variants.map(v => v.product))].length;
            },
            
            newVariant: function() {
                const product = prompt('输入产品名称：');
                if (!product) return;
                const option = prompt('输入变体规格（如：500ml/1L）：');
                if (!option) return;
                const price = parseFloat(prompt('输入价格：'));
                if (isNaN(price) || price < 0) return;
                const stock = parseInt(prompt('输入库存数量：')) || 0;
                const variant = {
                    id: 'VR-' + Date.now().toString().slice(-6),
                    product: product,
                    option: option,
                    price: price,
                    stock: stock,
                    status: 'active'
                };
                this.variants.push(variant);
                localStorage.setItem('variant_data', JSON.stringify(this.variants));
                this.render();
                alert('变体已创建: ' + product + ' - ' + option);
            },
            
            editVariant: function(id) {
                const variant = this.variants.find(v => v.id === id);
                if (variant) {
                    const newPrice = prompt('修改价格：', variant.price);
                    if (newPrice !== null) {
                        variant.price = parseFloat(newPrice) || variant.price;
                        localStorage.setItem('variant_data', JSON.stringify(this.variants));
                        this.render();
                        alert('变体已更新');
                    }
                }
            },
            
            toggleVariant: function(id) {
                const variant = this.variants.find(v => v.id === id);
                if (variant) {
                    variant.status = variant.status === 'active' ? 'inactive' : 'active';
                    localStorage.setItem('variant_data', JSON.stringify(this.variants));
                    this.render();
                    alert('变体状态已切换');
                }
            },
            
            deleteVariant: function(id) {
                if (confirm('确认删除该变体？')) {
                    this.variants = this.variants.filter(v => v.id !== id);
                    localStorage.setItem('variant_data', JSON.stringify(this.variants));
                    this.render();
                    alert('变体已删除');
                }
            }
        };
        
        document.addEventListener('DOMContentLoaded', function() {
            window.VariantModule.init();
        });
    })();
</script>
