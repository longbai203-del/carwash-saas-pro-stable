<!-- ============================================================ -->
<!-- 系统设置 - Settings Dashboard                                 -->
<!-- ============================================================ -->

<div class="settings-container" style="padding:20px;max-width:1400px;margin:0 auto;">
    <!-- 页面标题 -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
        <div>
            <h1 style="font-size:24px;font-weight:700;margin:0;color:#1F2937;">⚙️ 系统设置</h1>
            <p style="color:#6B7280;margin:4px 0 0 0;">管理系统配置和偏好</p>
        </div>
        <div style="display:flex;gap:8px;">
            <button id="saveAllSettings" style="padding:8px 16px;background:#4F46E5;color:white;border:none;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:6px;">
                <i class="fas fa-save"></i> 保存所有设置
            </button>
            <button id="resetSettings" style="padding:8px 16px;background:#F3F4F6;border:none;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:6px;">
                <i class="fas fa-undo"></i> 重置
            </button>
        </div>
    </div>

    <!-- 设置选项卡 -->
    <div style="display:flex;gap:4px;border-bottom:2px solid #E5E7EB;margin-bottom:24px;overflow-x:auto;">
        <button class="settings-tab active" data-tab="general" style="padding:10px 20px;border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:500;color:#4F46E5;border-bottom:2px solid #4F46E5;margin-bottom:-2px;white-space:nowrap;">
            <i class="fas fa-sliders-h"></i> 常规
        </button>
        <button class="settings-tab" data-tab="company" style="padding:10px 20px;border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:500;color:#6B7280;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;">
            <i class="fas fa-building"></i> 公司信息
        </button>
        <button class="settings-tab" data-tab="appearance" style="padding:10px 20px;border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:500;color:#6B7280;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;">
            <i class="fas fa-palette"></i> 外观
        </button>
        <button class="settings-tab" data-tab="business" style="padding:10px 20px;border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:500;color:#6B7280;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;">
            <i class="fas fa-store"></i> 业务设置
        </button>
        <button class="settings-tab" data-tab="notifications" style="padding:10px 20px;border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:500;color:#6B7280;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;">
            <i class="fas fa-bell"></i> 通知
        </button>
        <button class="settings-tab" data-tab="security" style="padding:10px 20px;border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:500;color:#6B7280;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;">
            <i class="fas fa-shield-alt"></i> 安全
        </button>
    </div>

    <!-- 常规设置 -->
    <div id="tab-general" class="settings-panel" style="display:block;">
        <div style="background:white;border-radius:12px;padding:24px;border:1px solid #E5E7EB;">
            <h3 style="margin:0 0 16px 0;font-size:16px;font-weight:600;">🌐 常规设置</h3>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                <div>
                    <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px;">系统语言</label>
                    <select id="settingLanguage" style="width:100%;padding:8px 12px;border:1px solid #D1D5DB;border-radius:6px;font-size:14px;">
                        <option value="zh-CN">简体中文</option>
                        <option value="zh-TW">繁體中文</option>
                        <option value="en-US">English</option>
                    </select>
                </div>
                <div>
                    <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px;">时区</label>
                    <select id="settingTimezone" style="width:100%;padding:8px 12px;border:1px solid #D1D5DB;border-radius:6px;font-size:14px;">
                        <option value="Asia/Shanghai">Asia/Shanghai (UTC+8)</option>
                        <option value="Asia/Hong_Kong">Asia/Hong_Kong (UTC+8)</option>
                        <option value="Asia/Taipei">Asia/Taipei (UTC+8)</option>
                        <option value="America/New_York">America/New_York (UTC-5)</option>
                        <option value="Europe/London">Europe/London (UTC+0)</option>
                    </select>
                </div>
                <div>
                    <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px;">日期格式</label>
                    <select id="settingDateFormat" style="width:100%;padding:8px 12px;border:1px solid #D1D5DB;border-radius:6px;font-size:14px;">
                        <option value="YYYY-MM-DD">YYYY-MM-DD</option>
                        <option value="DD/MM/YYYY">DD/MM/YYYY</option>
                        <option value="MM/DD/YYYY">MM/DD/YYYY</option>
                        <option value="YYYY年MM月DD日">YYYY年MM月DD日</option>
                    </select>
                </div>
                <div>
                    <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px;">货币单位</label>
                    <select id="settingCurrency" style="width:100%;padding:8px 12px;border:1px solid #D1D5DB;border-radius:6px;font-size:14px;">
                        <option value="CNY">CNY (¥)</option>
                        <option value="USD">USD ($)</option>
                        <option value="EUR">EUR (€)</option>
                        <option value="HKD">HKD (HK$)</option>
                    </select>
                </div>
            </div>
            <div style="margin-top:16px;padding-top:16px;border-top:1px solid #E5E7EB;">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                    <input type="checkbox" id="settingAutoSave" checked />
                    <span style="font-size:14px;color:#374151;">启用自动保存</span>
                </label>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:8px;">
                    <input type="checkbox" id="settingDebugMode" />
                    <span style="font-size:14px;color:#374151;">启用调试模式</span>
                </label>
            </div>
        </div>
    </div>

    <!-- 公司信息 -->
    <div id="tab-company" class="settings-panel" style="display:none;">
        <div style="background:white;border-radius:12px;padding:24px;border:1px solid #E5E7EB;">
            <h3 style="margin:0 0 16px 0;font-size:16px;font-weight:600;">🏢 公司信息</h3>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                <div style="grid-column:1/-1;">
                    <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px;">公司名称</label>
                    <input id="settingCompanyName" type="text" value="洗车店" style="width:100%;padding:8px 12px;border:1px solid #D1D5DB;border-radius:6px;font-size:14px;" />
                </div>
                <div>
                    <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px;">公司地址</label>
                    <input id="settingCompanyAddress" type="text" value="市区洗车路88号" style="width:100%;padding:8px 12px;border:1px solid #D1D5DB;border-radius:6px;font-size:14px;" />
                </div>
                <div>
                    <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px;">联系电话</label>
                    <input id="settingCompanyPhone" type="text" value="400-888-8888" style="width:100%;padding:8px 12px;border:1px solid #D1D5DB;border-radius:6px;font-size:14px;" />
                </div>
                <div>
                    <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px;">公司邮箱</label>
                    <input id="settingCompanyEmail" type="email" value="info@carwash.com" style="width:100%;padding:8px 12px;border:1px solid #D1D5DB;border-radius:6px;font-size:14px;" />
                </div>
                <div>
                    <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px;">公司网站</label>
                    <input id="settingCompanyWebsite" type="text" value="https://www.carwash.com" style="width:100%;padding:8px 12px;border:1px solid #D1D5DB;border-radius:6px;font-size:14px;" />
                </div>
            </div>
            <div style="margin-top:16px;padding-top:16px;border-top:1px solid #E5E7EB;">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                    <input type="checkbox" id="settingShowCompanyOnReceipt" checked />
                    <span style="font-size:14px;color:#374151;">在小票上显示公司信息</span>
                </label>
            </div>
        </div>
    </div>

    <!-- 外观设置 -->
    <div id="tab-appearance" class="settings-panel" style="display:none;">
        <div style="background:white;border-radius:12px;padding:24px;border:1px solid #E5E7EB;">
            <h3 style="margin:0 0 16px 0;font-size:16px;font-weight:600;">🎨 外观设置</h3>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                <div>
                    <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px;">主题颜色</label>
                    <div style="display:flex;gap:12px;flex-wrap:wrap;">
                        <button class="color-option active" data-color="#4F46E5" style="width:36px;height:36px;border-radius:50%;border:3px solid #4F46E5;background:#4F46E5;cursor:pointer;outline:none;"></button>
                        <button class="color-option" data-color="#10B981" style="width:36px;height:36px;border-radius:50%;border:3px solid transparent;background:#10B981;cursor:pointer;outline:none;"></button>
                        <button class="color-option" data-color="#F59E0B" style="width:36px;height:36px;border-radius:50%;border:3px solid transparent;background:#F59E0B;cursor:pointer;outline:none;"></button>
                        <button class="color-option" data-color="#EF4444" style="width:36px;height:36px;border-radius:50%;border:3px solid transparent;background:#EF4444;cursor:pointer;outline:none;"></button>
                        <button class="color-option" data-color="#8B5CF6" style="width:36px;height:36px;border-radius:50%;border:3px solid transparent;background:#8B5CF6;cursor:pointer;outline:none;"></button>
                    </div>
                </div>
                <div>
                    <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px;">主题模式</label>
                    <select id="settingTheme" style="width:100%;padding:8px 12px;border:1px solid #D1D5DB;border-radius:6px;font-size:14px;">
                        <option value="light">浅色模式</option>
                        <option value="dark">深色模式</option>
                        <option value="auto">跟随系统</option>
                    </select>
                </div>
                <div>
                    <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px;">字体大小</label>
                    <select id="settingFontSize" style="width:100%;padding:8px 12px;border:1px solid #D1D5DB;border-radius:6px;font-size:14px;">
                        <option value="small">小</option>
                        <option value="medium" selected>中</option>
                        <option value="large">大</option>
                    </select>
                </div>
                <div>
                    <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px;">布局模式</label>
                    <select id="settingLayout" style="width:100%;padding:8px 12px;border:1px solid #D1D5DB;border-radius:6px;font-size:14px;">
                        <option value="default">默认</option>
                        <option value="compact">紧凑</option>
                        <option value="comfortable">舒适</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- 业务设置 -->
    <div id="tab-business" class="settings-panel" style="display:none;">
        <div style="background:white;border-radius:12px;padding:24px;border:1px solid #E5E7EB;">
            <h3 style="margin:0 0 16px 0;font-size:16px;font-weight:600;">🏪 业务设置</h3>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                <div>
                    <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px;">税率 (%)</label>
                    <input id="settingTaxRate" type="number" value="6" style="width:100%;padding:8px 12px;border:1px solid #D1D5DB;border-radius:6px;font-size:14px;" />
                </div>
                <div>
                    <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px;">低库存预警阈值</label>
                    <input id="settingLowStockThreshold" type="number" value="10" style="width:100%;padding:8px 12px;border:1px solid #D1D5DB;border-radius:6px;font-size:14px;" />
                </div>
                <div>
                    <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px;">营业开始时间</label>
                    <input id="settingBusinessStart" type="time" value="08:00" style="width:100%;padding:8px 12px;border:1px solid #D1D5DB;border-radius:6px;font-size:14px;" />
                </div>
                <div>
                    <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px;">营业结束时间</label>
                    <input id="settingBusinessEnd" type="time" value="22:00" style="width:100%;padding:8px 12px;border:1px solid #D1D5DB;border-radius:6px;font-size:14px;" />
                </div>
            </div>
            <div style="margin-top:16px;padding-top:16px;border-top:1px solid #E5E7EB;">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                    <input type="checkbox" id="settingEnableLoyalty" checked />
                    <span style="font-size:14px;color:#374151;">启用会员积分系统</span>
                </label>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:8px;">
                    <input type="checkbox" id="settingEnableAutoPrint" checked />
                    <span style="font-size:14px;color:#374151;">启用自动打印小票</span>
                </label>
            </div>
        </div>
    </div>

    <!-- 通知设置 -->
    <div id="tab-notifications" class="settings-panel" style="display:none;">
        <div style="background:white;border-radius:12px;padding:24px;border:1px solid #E5E7EB;">
            <h3 style="margin:0 0 16px 0;font-size:16px;font-weight:600;">🔔 通知设置</h3>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #F3F4F6;">
                    <div>
                        <div style="font-weight:500;font-size:14px;">低库存预警</div>
                        <div style="font-size:12px;color:#6B7280;">当库存低于阈值时发送通知</div>
                    </div>
                    <label style="position:relative;display:inline-block;width:44px;height:24px;">
                        <input type="checkbox" class="toggle-switch" checked style="opacity:0;width:0;height:0;" />
                        <span style="position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#E5E7EB;transition:.3s;border-radius:24px;"></span>
                    </label>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #F3F4F6;">
                    <div>
                        <div style="font-weight:500;font-size:14px;">订单提醒</div>
                        <div style="font-size:12px;color:#6B7280;">新订单时发送提醒</div>
                    </div>
                    <label style="position:relative;display:inline-block;width:44px;height:24px;">
                        <input type="checkbox" class="toggle-switch" checked style="opacity:0;width:0;height:0;" />
                        <span style="position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#10B981;transition:.3s;border-radius:24px;"></span>
                    </label>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #F3F4F6;">
                    <div>
                        <div style="font-weight:500;font-size:14px;">考勤提醒</div>
                        <div style="font-size:12px;color:#6B7280;">员工未打卡时发送提醒</div>
                    </div>
                    <label style="position:relative;display:inline-block;width:44px;height:24px;">
                        <input type="checkbox" class="toggle-switch" style="opacity:0;width:0;height:0;" />
                        <span style="position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#E5E7EB;transition:.3s;border-radius:24px;"></span>
                    </label>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #F3F4F6;">
                    <div>
                        <div style="font-weight:500;font-size:14px;">系统更新</div>
                        <div style="font-size:12px;color:#6B7280;">系统更新时发送通知</div>
                    </div>
                    <label style="position:relative;display:inline-block;width:44px;height:24px;">
                        <input type="checkbox" class="toggle-switch" checked style="opacity:0;width:0;height:0;" />
                        <span style="position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#10B981;transition:.3s;border-radius:24px;"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- 安全设置 -->
    <div id="tab-security" class="settings-panel" style="display:none;">
        <div style="background:white;border-radius:12px;padding:24px;border:1px solid #E5E7EB;">
            <h3 style="margin:0 0 16px 0;font-size:16px;font-weight:600;">🔒 安全设置</h3>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                <div>
                    <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px;">密码有效期（天）</label>
                    <input id="settingPasswordExpiry" type="number" value="90" style="width:100%;padding:8px 12px;border:1px solid #D1D5DB;border-radius:6px;font-size:14px;" />
                </div>
                <div>
                    <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:4px;">会话超时（分钟）</label>
                    <input id="settingSessionTimeout" type="number" value="60" style="width:100%;padding:8px 12px;border:1px solid #D1D5DB;border-radius:6px;font-size:14px;" />
                </div>
            </div>
            <div style="margin-top:16px;padding-top:16px;border-top:1px solid #E5E7EB;">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                    <input type="checkbox" id="settingTwoFactor" />
                    <span style="font-size:14px;color:#374151;">启用双因素认证</span>
                </label>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:8px;">
                    <input type="checkbox" id="settingLoginAlert" checked />
                    <span style="font-size:14px;color:#374151;">异常登录提醒</span>
                </label>
            </div>
            <div style="margin-top:16px;padding:16px;background:#FEF2F2;border-radius:8px;border:1px solid #FEE2E2;">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <div>
                        <div style="font-weight:500;color:#991B1B;">⚠️ 危险操作区</div>
                        <div style="font-size:13px;color:#6B7280;">清空所有数据，此操作不可逆</div>
                    </div>
                    <button onclick="window.SettingsModule.clearAllData()" style="padding:8px 20px;background:#EF4444;color:white;border:none;border-radius:6px;cursor:pointer;">
                        清空数据
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .settings-tab.active {
        color: #4F46E5;
        border-bottom-color: #4F46E5;
    }
    .settings-tab:hover:not(.active) {
        color: #374151;
        border-bottom-color: #D1D5DB;
    }
    .color-option.active {
        border-color: #fff;
        box-shadow: 0 0 0 3px #4F46E5;
    }
    .color-option:hover {
        transform: scale(1.1);
    }
    .toggle-switch:checked + span {
        background: #10B981;
    }
    .toggle-switch:checked + span:before {
        transform: translateX(20px);
    }
    .toggle-switch + span:before {
        content: '';
        position: absolute;
        width: 18px;
        height: 18px;
        left: 3px;
        bottom: 3px;
        background: white;
        transition: .3s;
        border-radius: 50%;
    }
    [data-theme="dark"] .settings-container .settings-panel > div {
        background: #2C2C2E;
        border-color: #48484A;
    }
    [data-theme="dark"] .settings-container input,
    [data-theme="dark"] .settings-container select {
        background: #3A3A3C;
        border-color: #48484A;
        color: #F5F5F7;
    }
    [data-theme="dark"] .settings-container .settings-tab {
        color: #9CA3AF;
    }
    [data-theme="dark"] .settings-container .settings-tab.active {
        color: #818CF8;
        border-bottom-color: #818CF8;
    }
</style>
