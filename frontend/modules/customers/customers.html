<div id="customersContainer" class="space-y-6">

    <!-- ===== 客户概览 ===== -->
    <div class="glass-card p-6">
        <h2 class="text-xl font-bold text-blue-600 mb-4">👥 客户管理</h2>

        <!-- 统计卡片 -->
        <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-4">
            <div class="bg-blue-50 p-3 rounded-xl text-center">
                <div class="text-2xl font-bold text-blue-600" id="crmTotalCustomers">0</div>
                <div class="text-xs text-gray-500">总客户</div>
            </div>
            <div class="bg-green-50 p-3 rounded-xl text-center">
                <div class="text-2xl font-bold text-green-600" id="crmActiveCustomers">0</div>
                <div class="text-xs text-gray-500">活跃客户</div>
            </div>
            <div class="bg-purple-50 p-3 rounded-xl text-center">
                <div class="text-2xl font-bold text-purple-600" id="crmTotalPoints">0</div>
                <div class="text-xs text-gray-500">总积分</div>
            </div>
            <div class="bg-amber-50 p-3 rounded-xl text-center">
                <div class="text-2xl font-bold text-amber-600" id="crmBirthdayThisMonth">0</div>
                <div class="text-xs text-gray-500">本月生日</div>
            </div>
            <div class="bg-red-50 p-3 rounded-xl text-center">
                <div class="text-2xl font-bold text-red-600" id="crmInactiveCustomers">0</div>
                <div class="text-xs text-gray-500">沉睡客户</div>
            </div>
        </div>

        <!-- 搜索和筛选 -->
        <div class="flex gap-3 mb-4 flex-wrap">
            <input id="customerSearch" placeholder="🔍 搜索客户姓名/电话/车牌..." class="flex-1 p-3 border rounded-xl bg-gray-50 min-w-[150px] focus:outline-none focus:border-blue-400">
            <select id="customerLevelFilter" class="p-3 border rounded-xl bg-gray-50">
                <option value="all">全部等级</option>
            </select>
            <select id="customerStatusFilter" class="p-3 border rounded-xl bg-gray-50">
                <option value="all">全部状态</option>
                <option value="active">✅ 活跃</option>
                <option value="inactive">💤 沉睡</option>
                <option value="birthday">🎂 本月生日</option>
            </select>
            <button onclick="CustomersModule.filterCustomers()" class="btn-primary px-4 py-3 rounded-xl">筛选</button>
        </div>

        <!-- 快捷操作 -->
        <div class="flex gap-2 mb-4 flex-wrap">
            <button onclick="CustomersModule.showAddCustomer()" class="btn-success btn-sm">
                <i class="fas fa-user-plus"></i> 添加客户
            </button>
            <button onclick="CustomersModule.showAddVehicle()" class="btn-primary btn-sm">
                <i class="fas fa-car"></i> 添加车辆
            </button>
            <button onclick="CustomersModule.showSendReminder()" class="btn-warning btn-sm">
                <i class="fas fa-bell"></i> 发送提醒
            </button>
            <button onclick="CustomersModule.exportCustomers()" class="bg-green-600 text-white btn-sm">
                <i class="fas fa-file-excel"></i> 导出
            </button>
        </div>

        <!-- 客户列表 -->
        <div id="membersList" class="space-y-2 max-h-96 overflow-auto"></div>
    </div>

    <!-- ===== 车辆管理 ===== -->
    <div class="glass-card p-6">
        <h2 class="text-xl font-bold text-blue-600 mb-4">🚗 车辆管理</h2>
        <div id="vehicleList" class="space-y-2 max-h-48 overflow-auto"></div>
    </div>

    <!-- ===== 套餐管理 ===== -->
    <div class="glass-card p-6">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold text-blue-600">📦 套餐管理</h2>
            <button onclick="CustomersModule.showAddPackage()" class="btn-primary btn-sm">
                <i class="fas fa-plus"></i> 添加套餐
            </button>
        </div>
        <div id="packageList" class="space-y-2 max-h-48 overflow-auto"></div>
    </div>
</div>

<!-- ===== 添加客户模态框 ===== -->
<div id="addCustomerModal" class="modal-glass hidden">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-6 mx-4 max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold text-blue-600">👤 添加客户</h3>
            <button onclick="CustomersModule.closeModal('addCustomerModal')" class="text-gray-400 hover:text-gray-600">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div class="space-y-3">
            <div>
                <label class="text-sm font-medium text-gray-600">姓名 *</label>
                <input id="custName" class="w-full p-3 border rounded-xl mt-1 bg-gray-50">
            </div>
            <div>
                <label class="text-sm font-medium text-gray-600">电话 *</label>
                <input id="custPhone" class="w-full p-3 border rounded-xl mt-1 bg-gray-50">
            </div>
            <div>
                <label class="text-sm font-medium text-gray-600">WhatsApp 电话</label>
                <input id="custWhatsApp" class="w-full p-3 border rounded-xl mt-1 bg-gray-50">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-sm font-medium text-gray-600">邮箱</label>
                    <input id="custEmail" class="w-full p-3 border rounded-xl mt-1 bg-gray-50">
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-600">生日</label>
                    <input type="date" id="custBirthday" class="w-full p-3 border rounded-xl mt-1 bg-gray-50">
                </div>
            </div>
            <div>
                <label class="text-sm font-medium text-gray-600">车牌号</label>
                <input id="custPlate" class="w-full p-3 border rounded-xl mt-1 bg-gray-50">
            </div>
            <div>
                <label class="text-sm font-medium text-gray-600">地址</label>
                <input id="custAddress" class="w-full p-3 border rounded-xl mt-1 bg-gray-50">
            </div>
            <div>
                <label class="text-sm font-medium text-gray-600">备注</label>
                <input id="custNotes" class="w-full p-3 border rounded-xl mt-1 bg-gray-50">
            </div>
            <button onclick="CustomersModule.saveCustomer()" class="btn-primary py-3 rounded-xl font-bold w-full">
                <i class="fas fa-save"></i> 保存客户
            </button>
        </div>
    </div>
</div>

<!-- ===== 添加车辆模态框 ===== -->
<div id="addVehicleModal" class="modal-glass hidden">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-6 mx-4">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold text-blue-600">🚗 添加车辆</h3>
            <button onclick="CustomersModule.closeModal('addVehicleModal')" class="text-gray-400 hover:text-gray-600">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div class="space-y-3">
            <div>
                <label class="text-sm font-medium text-gray-600">客户</label>
                <select id="vehicleCustomer" class="w-full p-3 border rounded-xl mt-1 bg-gray-50"></select>
            </div>
            <div>
                <label class="text-sm font-medium text-gray-600">车牌号 *</label>
                <input id="vehiclePlate" class="w-full p-3 border rounded-xl mt-1 bg-gray-50">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-sm font-medium text-gray-600">品牌</label>
                    <input id="vehicleBrand" class="w-full p-3 border rounded-xl mt-1 bg-gray-50">
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-600">型号</label>
                    <input id="vehicleModel" class="w-full p-3 border rounded-xl mt-1 bg-gray-50">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-sm font-medium text-gray-600">年份</label>
                    <input type="number" id="vehicleYear" class="w-full p-3 border rounded-xl mt-1 bg-gray-50">
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-600">颜色</label>
                    <input id="vehicleColor" class="w-full p-3 border rounded-xl mt-1 bg-gray-50">
                </div>
            </div>
            <button onclick="CustomersModule.saveVehicle()" class="btn-primary py-3 rounded-xl font-bold w-full">
                <i class="fas fa-save"></i> 保存车辆
            </button>
        </div>
    </div>
</div>

<!-- ===== 添加套餐模态框 ===== -->
<div id="addPackageModal" class="modal-glass hidden">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-6 mx-4">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold text-blue-600">📦 添加套餐</h3>
            <button onclick="CustomersModule.closeModal('addPackageModal')" class="text-gray-400 hover:text-gray-600">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div class="space-y-3">
            <div>
                <label class="text-sm font-medium text-gray-600">套餐名称 *</label>
                <input id="packageName" class="w-full p-3 border rounded-xl mt-1 bg-gray-50">
            </div>
            <div>
                <label class="text-sm font-medium text-gray-600">描述</label>
                <input id="packageDesc" class="w-full p-3 border rounded-xl mt-1 bg-gray-50">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-sm font-medium text-gray-600">价格 (SAR)</label>
                    <input type="number" id="packagePrice" step="0.01" class="w-full p-3 border rounded-xl mt-1 bg-gray-50">
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-600">次数</label>
                    <input type="number" id="packageSessions" class="w-full p-3 border rounded-xl mt-1 bg-gray-50">
                </div>
            </div>
            <div>
                <label class="text-sm font-medium text-gray-600">服务项目（用逗号分隔）</label>
                <input id="packageServices" class="w-full p-3 border rounded-xl mt-1 bg-gray-50" placeholder="基础清洗,深度清洗">
            </div>
            <div>
                <label class="text-sm font-medium text-gray-600">有效期（天）</label>
                <input type="number" id="packageValidity" class="w-full p-3 border rounded-xl mt-1 bg-gray-50">
            </div>
            <button onclick="CustomersModule.savePackage()" class="btn-primary py-3 rounded-xl font-bold w-full">
                <i class="fas fa-save"></i> 保存套餐
            </button>
        </div>
    </div>
</div>

<!-- ===== 发送提醒模态框 ===== -->
<div id="sendReminderModal" class="modal-glass hidden">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-6 mx-4">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold text-amber-600">🔔 发送提醒</h3>
            <button onclick="CustomersModule.closeModal('sendReminderModal')" class="text-gray-400 hover:text-gray-600">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div class="space-y-3">
            <div>
                <label class="text-sm font-medium text-gray-600">客户</label>
                <select id="reminderCustomer" class="w-full p-3 border rounded-xl mt-1 bg-gray-50"></select>
            </div>
            <div>
                <label class="text-sm font-medium text-gray-600">提醒类型</label>
                <select id="reminderType" class="w-full p-3 border rounded-xl mt-1 bg-gray-50">
                    <option value="birthday">🎂 生日祝福</option>
                    <option value="loyalty">💎 会员专属</option>
                    <option value="coupon">🎫 优惠券</option>
                    <option value="revisit">🔄 回访提醒</option>
                    <option value="custom">✏️ 自定义</option>
                </select>
            </div>
            <div>
                <label class="text-sm font-medium text-gray-600">消息内容</label>
                <textarea id="reminderMessage" rows="4" class="w-full p-3 border rounded-xl mt-1 bg-gray-50" placeholder="输入提醒消息..."></textarea>
            </div>
            <button onclick="CustomersModule.sendReminder()" class="btn-warning py-3 rounded-xl font-bold w-full">
                <i class="fas fa-paper-plane"></i> 发送提醒
            </button>
        </div>
    </div>
</div>

<!-- ===== 车辆历史模态框 ===== -->
<div id="vehicleHistoryModal" class="modal-glass hidden">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl p-6 mx-4 max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold text-blue-600" id="vehicleHistoryTitle">🚗 车辆历史</h3>
            <button onclick="CustomersModule.closeModal('vehicleHistoryModal')" class="text-gray-400 hover:text-gray-600">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div id="vehicleHistoryContent" class="space-y-3"></div>
    </div>
</div>
