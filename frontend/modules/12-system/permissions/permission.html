<div id="permissionContainer" class="space-y-6">
    
    <!-- ===== 权限中心标题 ===== -->
    <div class="glass-card p-6">
        <div class="flex justify-between items-center">
            <div>
                <h2 class="text-2xl font-bold text-blue-600">🔐 权限中心</h2>
                <p class="text-sm text-gray-400">管理角色、菜单、权限分配 - 企业级RBAC</p>
            </div>
            <div class="flex gap-2">
                <button onclick="PermissionModule.refresh()" class="btn-primary btn-sm">
                    <i class="fas fa-sync"></i> 刷新
                </button>
                <button onclick="PermissionModule.exportData()" class="bg-green-600 text-white btn-sm">
                    <i class="fas fa-file-excel"></i> 导出
                </button>
            </div>
        </div>
    </div>

    <!-- ===== 标签页导航 ===== -->
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="roles" onclick="PermissionModule.switchTab('roles')">
            <i class="fas fa-users-cog"></i> 角色管理
        </button>
        <button class="tab-btn" data-tab="menus" onclick="PermissionModule.switchTab('menus')">
            <i class="fas fa-sitemap"></i> 菜单管理
        </button>
        <button class="tab-btn" data-tab="permissions" onclick="PermissionModule.switchTab('permissions')">
            <i class="fas fa-key"></i> 权限分配
        </button>
        <button class="tab-btn" data-tab="user-permissions" onclick="PermissionModule.switchTab('user-permissions')">
            <i class="fas fa-user-shield"></i> 用户授权
        </button>
        <button class="tab-btn" data-tab="audit" onclick="PermissionModule.switchTab('audit')">
            <i class="fas fa-clipboard-list"></i> 审计日志
        </button>
    </div>

    <!-- ============================================================ -->
    <!-- 角色管理面板 -->
    <!-- ============================================================ -->
    <div id="panel-roles" class="panel-content">
        <div class="glass-card p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-gray-800">👥 角色列表</h3>
                <button onclick="PermissionModule.showAddRole()" class="btn-success btn-sm">
                    <i class="fas fa-plus"></i> 添加角色
                </button>
            </div>
            
            <!-- 筛选 -->
            <div class="flex gap-3 mb-4 flex-wrap">
                <input id="roleSearch" placeholder="🔍 搜索角色..." class="flex-1 p-2 border rounded-lg text-sm bg-gray-50 min-w-[150px]">
                <select id="roleStatusFilter" class="p-2 border rounded-lg text-sm bg-gray-50">
                    <option value="all">全部状态</option>
                    <option value="active">✅ 启用</option>
                    <option value="inactive">❌ 禁用</option>
                </select>
                <button onclick="PermissionModule.filterRoles()" class="btn-primary btn-sm px-4">筛选</button>
            </div>

            <!-- 角色表格 -->
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="p-3 text-right">角色名称</th>
                            <th class="p-3 text-right">角色代码</th>
                            <th class="p-3 text-right">类型</th>
                            <th class="p-3 text-right">状态</th>
                            <th class="p-3 text-right">创建时间</th>
                            <th class="p-3 text-right">操作</th>
                        </tr>
                    </thead>
                    <tbody id="rolesList">
                        <tr><td colspan="6" class="text-center text-gray-400 py-8">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- 菜单管理面板 -->
    <!-- ============================================================ -->
    <div id="panel-menus" class="panel-content hidden">
        <div class="glass-card p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-gray-800">📋 菜单管理</h3>
                <button onclick="PermissionModule.showAddMenu()" class="btn-success btn-sm">
                    <i class="fas fa-plus"></i> 添加菜单
                </button>
            </div>
            
            <!-- 操作栏 -->
            <div class="flex gap-2 mb-4 flex-wrap">
                <button onclick="PermissionModule.expandAll()" class="btn-outline btn-sm">展开全部</button>
                <button onclick="PermissionModule.collapseAll()" class="btn-outline btn-sm">收起全部</button>
                <button onclick="PermissionModule.batchEnable()" class="btn-success btn-sm">批量启用</button>
                <button onclick="PermissionModule.batchDisable()" class="btn-warning btn-sm">批量禁用</button>
            </div>

            <!-- 菜单树 -->
            <div id="menuTree" class="space-y-1 max-h-[500px] overflow-y-auto"></div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- 权限分配面板 -->
    <!-- ============================================================ -->
    <div id="panel-permissions" class="panel-content hidden">
        <div class="glass-card p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-gray-800">🔑 权限分配</h3>
                <button onclick="PermissionModule.savePermissions()" class="btn-primary btn-sm">
                    <i class="fas fa-save"></i> 保存权限
                </button>
            </div>
            
            <!-- 选择角色 -->
            <div class="flex gap-3 mb-4">
                <select id="permRoleSelect" class="p-2 border rounded-lg text-sm bg-gray-50 flex-1" onchange="PermissionModule.loadRolePermissions()">
                    <option value="">-- 请选择角色 --</option>
                </select>
            </div>

            <!-- 权限列表 -->
            <div id="permissionTree" class="max-h-[500px] overflow-y-auto space-y-2"></div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- 用户授权面板 -->
    <!-- ============================================================ -->
    <div id="panel-user-permissions" class="panel-content hidden">
        <div class="glass-card p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-gray-800">👤 用户单独授权</h3>
            </div>
            
            <!-- 选择用户 -->
            <div class="flex gap-3 mb-4">
                <select id="userPermUserSelect" class="p-2 border rounded-lg text-sm bg-gray-50 flex-1" onchange="PermissionModule.loadUserPermissions()">
                    <option value="">-- 请选择用户 --</option>
                </select>
                <button onclick="PermissionModule.addUserPermission()" class="btn-success btn-sm">
                    <i class="fas fa-plus"></i> 添加权限
                </button>
            </div>

            <!-- 用户权限列表 -->
            <div id="userPermissionList" class="max-h-[400px] overflow-y-auto space-y-2"></div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- 审计日志面板 -->
    <!-- ============================================================ -->
    <div id="panel-audit" class="panel-content hidden">
        <div class="glass-card p-6">
            <h3 class="text-lg font-bold text-gray-800 mb-4">📋 审计日志</h3>
            
            <!-- 筛选 -->
            <div class="flex gap-3 mb-4 flex-wrap">
                <input type="date" id="auditStartDate" class="p-2 border rounded-lg text-sm bg-gray-50">
                <input type="date" id="auditEndDate" class="p-2 border rounded-lg text-sm bg-gray-50">
                <input id="auditSearch" placeholder="🔍 搜索用户/操作..." class="flex-1 p-2 border rounded-lg text-sm bg-gray-50 min-w-[150px]">
                <button onclick="PermissionModule.loadAuditLogs()" class="btn-primary btn-sm px-4">查询</button>
                <button onclick="PermissionModule.exportAuditLogs()" class="bg-green-600 text-white btn-sm">
                    <i class="fas fa-file-excel"></i> 导出
                </button>
            </div>

            <!-- 审计列表 -->
            <div class="overflow-x-auto max-h-[500px] overflow-y-auto">
                <table class="w-full text-sm">
                    <thead class="sticky top-0 bg-white border-b">
                        <tr>
                            <th class="p-2 text-right">时间</th>
                            <th class="p-2 text-right">用户</th>
                            <th class="p-2 text-right">操作</th>
                            <th class="p-2 text-right">资源类型</th>
                            <th class="p-2 text-right">资源名称</th>
                            <th class="p-2 text-right">变更内容</th>
                        </tr>
                    </thead>
                    <tbody id="auditList">
                        <tr><td colspan="6" class="text-center text-gray-400 py-8">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- ===== 添加角色模态框 ===== -->
<div id="addRoleModal" class="modal-glass hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 mx-4">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold text-blue-600">👥 添加角色</h3>
            <button onclick="PermissionModule.closeModal('addRoleModal')" class="text-gray-400 hover:text-gray-600">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div class="space-y-3">
            <div>
                <label class="text-sm font-medium text-gray-600">角色名称 *</label>
                <input id="roleNameInput" class="w-full p-3 border rounded-xl mt-1 bg-gray-50" placeholder="请输入角色名称">
            </div>
            <div>
                <label class="text-sm font-medium text-gray-600">角色代码 *</label>
                <input id="roleCodeInput" class="w-full p-3 border rounded-xl mt-1 bg-gray-50" placeholder="例如: manager">
            </div>
            <div>
                <label class="text-sm font-medium text-gray-600">状态</label>
                <select id="roleStatusInput" class="w-full p-3 border rounded-xl mt-1 bg-gray-50">
                    <option value="active">✅ 启用</option>
                    <option value="inactive">❌ 禁用</option>
                </select>
            </div>
            <div>
                <label class="text-sm font-medium text-gray-600">备注</label>
                <input id="roleRemarkInput" class="w-full p-3 border rounded-xl mt-1 bg-gray-50" placeholder="可选备注">
            </div>
            <button onclick="PermissionModule.saveRole()" class="btn-primary py-3 rounded-xl font-bold w-full">
                <i class="fas fa-save"></i> 保存角色
            </button>
        </div>
    </div>
</div>

<!-- ===== 添加菜单模态框 ===== -->
<div id="addMenuModal" class="modal-glass hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 mx-4 max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold text-blue-600">📋 添加菜单</h3>
            <button onclick="PermissionModule.closeModal('addMenuModal')" class="text-gray-400 hover:text-gray-600">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div class="space-y-3">
            <div>
                <label class="text-sm font-medium text-gray-600">菜单名称 *</label>
                <input id="menuNameInput" class="w-full p-3 border rounded-xl mt-1 bg-gray-50" placeholder="请输入菜单名称">
            </div>
            <div>
                <label class="text-sm font-medium text-gray-600">菜单代码 *</label>
                <input id="menuCodeInput" class="w-full p-3 border rounded-xl mt-1 bg-gray-50" placeholder="例如: orders">
            </div>
            <div>
                <label class="text-sm font-medium text-gray-600">父级菜单</label>
                <select id="menuParentInput" class="w-full p-3 border rounded-xl mt-1 bg-gray-50">
                    <option value="">顶级菜单</option>
                </select>
            </div>
            <div>
                <label class="text-sm font-medium text-gray-600">路由路径</label>
                <input id="menuRouteInput" class="w-full p-3 border rounded-xl mt-1 bg-gray-50" placeholder="/orders">
            </div>
            <div>
                <label class="text-sm font-medium text-gray-600">图标</label>
                <input id="menuIconInput" class="w-full p-3 border rounded-xl mt-1 bg-gray-50" placeholder="fa-clipboard-list">
            </div>
            <div>
                <label class="text-sm font-medium text-gray-600">权限标识</label>
                <input id="menuPermissionInput" class="w-full p-3 border rounded-xl mt-1 bg-gray-50" placeholder="orders:view">
            </div>
            <div>
                <label class="text-sm font-medium text-gray-600">排序</label>
                <input type="number" id="menuSortInput" class="w-full p-3 border rounded-xl mt-1 bg-gray-50" value="0">
            </div>
            <div>
                <label class="text-sm font-medium text-gray-600">状态</label>
                <select id="menuStatusInput" class="w-full p-3 border rounded-xl mt-1 bg-gray-50">
                    <option value="true">✅ 显示</option>
                    <option value="false">❌ 隐藏</option>
                </select>
            </div>
            <button onclick="PermissionModule.saveMenu()" class="btn-primary py-3 rounded-xl font-bold w-full">
                <i class="fas fa-save"></i> 保存菜单
            </button>
        </div>
    </div>
</div>

<!-- ===== 添加用户权限模态框 ===== -->
<div id="addUserPermModal" class="modal-glass hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 mx-4">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold text-blue-600">🔑 添加用户权限</h3>
            <button onclick="PermissionModule.closeModal('addUserPermModal')" class="text-gray-400 hover:text-gray-600">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div class="space-y-3">
            <div>
                <label class="text-sm font-medium text-gray-600">用户</label>
                <select id="userPermUserSelect2" class="w-full p-3 border rounded-xl mt-1 bg-gray-50"></select>
            </div>
            <div>
                <label class="text-sm font-medium text-gray-600">权限</label>
                <select id="userPermPermissionSelect" class="w-full p-3 border rounded-xl mt-1 bg-gray-50"></select>
            </div>
            <div>
                <label class="text-sm font-medium text-gray-600">有效期</label>
                <div class="grid grid-cols-2 gap-2">
                    <input type="date" id="userPermValidFrom" class="p-3 border rounded-xl mt-1 bg-gray-50">
                    <input type="date" id="userPermValidTo" class="p-3 border rounded-xl mt-1 bg-gray-50">
                </div>
            </div>
            <button onclick="PermissionModule.saveUserPermission()" class="btn-primary py-3 rounded-xl font-bold w-full">
                <i class="fas fa-save"></i> 保存授权
            </button>
        </div>
    </div>
</div>
