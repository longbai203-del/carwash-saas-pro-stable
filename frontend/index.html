<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carwash Pro - 洗车店管理系统</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <!-- 项目 CSS -->
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/design-system.css" />

    <!-- ============================================================ -->
    <!-- Supabase 配置 - 新增 (不修改原有框架)                         -->
    <!-- ============================================================ -->
    <script>
        // Supabase 配置 - 请替换为你的实际值
        window.SUPABASE_CONFIG = {
            // 从环境变量或直接配置
            url: 'https://your-project-id.supabase.co',
            anonKey: 'your-anon-key'
        };
        console.log('✅ Supabase 配置已加载');
        console.log('📌 Supabase URL:', window.SUPABASE_CONFIG.url);
        console.log('📌 环境: ' + (window.SUPABASE_CONFIG.url.includes('your-project-id') ? '⚠️ 请配置 Supabase' : '✅ 已配置'));
    </script>

    <!-- ============================================================ -->
    <!-- 加载 Supabase 客户端 (CDN) - 新增                            -->
    <!-- ============================================================ -->
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"
            }
        }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; font-family: 'Inter', sans-serif; background: #f1f5f9; color: #1e293b; }
        #app { display: flex; height: 100vh; overflow: hidden; }
        #sidebar {
            width: 260px; min-width: 260px; background: #ffffff;
            border-right: 1px solid #e9edf4;
            display: flex; flex-direction: column; height: 100vh;
            overflow-y: auto; position: sticky; top: 0; z-index: 100;
        }
        #sidebar::-webkit-scrollbar { width: 4px; }
        #sidebar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
        .main-wrap { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100vh; overflow: hidden; }
        #navbar {
            flex-shrink: 0; background: #ffffff; border-bottom: 1px solid #e9edf4;
            padding: 12px 28px; display: flex; align-items: center;
            justify-content: space-between; min-height: 64px;
            position: sticky; top: 0; z-index: 50;
        }
        #navbar .breadcrumb { font-size: 14px; font-weight: 500; color: #1e293b; display: flex; align-items: center; gap: 8px; }
        #navbar .breadcrumb span { color: #64748b; font-weight: 400; }
        #navbar .user-area { display: flex; align-items: center; gap: 16px; font-size: 14px; color: #1e293b; }
        #navbar .user-area .avatar {
            width: 34px; height: 34px; border-radius: 999px;
            background: #4f46e5; color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 14px;
        }
        #content { flex: 1; padding: 24px 28px 28px 28px; overflow-y: auto; background: #f1f5f9; }
        #content::-webkit-scrollbar { width: 6px; }
        #content::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 6px; }
        .menu-toggle { display: none; background: transparent; border: none; font-size: 20px; cursor: pointer; color: #1e293b; padding: 4px 8px; border-radius: 6px; }
        .menu-toggle:hover { background: #f1f5f9; }
        @media (max-width: 768px) {
            #sidebar { width: 0; min-width: 0; overflow: hidden; border-right: none; }
            #sidebar.open { width: 280px; min-width: 280px; border-right: 1px solid #e9edf4; box-shadow: 4px 0 20px rgba(0,0,0,0.06); }
            #navbar { padding: 10px 16px; flex-wrap: wrap; gap: 8px; }
            #content { padding: 16px; }
            .menu-toggle { display: flex !important; }
        }
        .text-muted { color: #64748b; }
    </style>
</head>

<body>

    <!-- ============================================================ -->
    <!-- 应用脚本（包含所有功能）- 原有，不修改                       -->
    <!-- 注意：app.js 会在加载时检测 Supabase 配置                    -->
    <!-- ============================================================ -->
    <script src="/js/app.js"></script>

    <!-- ============================================================ -->
    <!-- HTML 结构 - 原有，不修改                                     -->
    <!-- ============================================================ -->
    <div id="app">
        <aside id="sidebar"></aside>
        <div class="main-wrap">
            <header id="navbar">
                <div style="display:flex;align-items:center;gap:12px;">
                    <button class="menu-toggle" id="menuToggle" aria-label="切换侧边栏">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="breadcrumb">
                        <i class="fas fa-home" style="color:#64748b;font-size:15px;"></i>
                        <span id="currentPageTitle">仪表板</span>
                    </div>
                </div>
                <div class="user-area">
                    <span>管理员</span>
                    <div class="avatar"><i class="fas fa-user" style="font-size:15px;"></i></div>
                </div>
            </header>
            <main id="content"></main>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- 移动端侧边栏切换 - 原有，不修改                               -->
    <!-- ============================================================ -->
    <script>
        (function() {
            var sidebar = document.getElementById('sidebar');
            var toggleBtn = document.getElementById('menuToggle');
            if (toggleBtn && sidebar) {
                toggleBtn.addEventListener('click', function() {
                    sidebar.classList.toggle('open');
                });
                document.getElementById('content')?.addEventListener('click', function() {
                    if (window.innerWidth <= 768) sidebar.classList.remove('open');
                });
                window.addEventListener('resize', function() {
                    if (window.innerWidth > 768) sidebar.classList.remove('open');
                });
            }
        })();
    </script>

</body>
</html>
