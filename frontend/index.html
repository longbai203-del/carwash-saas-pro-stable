﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carwash Pro - 洗车店管理系统</title>
    
    <!-- 预加载关键资源 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- 应用样式 -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/design-system.css">
    
    <!-- 配置 -->
    <script>
        /**
         * @global
         * @type {Object}
         * @description 应用配置
         */
        window.APP_CONFIG = {
            appName: 'Carwash Pro',
            version: '1.0.0',
            apiBaseUrl: window.location.hostname === 'localhost' 
                ? 'http://localhost:3000/api' 
                : '/api'
        };
        
        /**
         * @global
         * @type {Object}
         * @description Supabase配置
         */
        window.SUPABASE_CONFIG = {
            url: 'https://ukqhdzveqklinkzfcp.supabase.co',
            key: '{{SUPABASE_KEY}}' // 将由后端注入或从环境变量读取
        };
    </script>
</head>
<body>
    <!-- ============================================================ -->
    <!-- 加载状态 -->
    <!-- ============================================================ -->
    <div id="app-loading" class="app-loading">
        <div class="loading-container">
            <div class="loading-logo">
                <img src="/assets/images/logo.svg" alt="Carwash Pro" onerror="this.style.display='none'">
                <h1>Carwash Pro</h1>
            </div>
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>正在加载系统...</p>
            </div>
            <div class="loading-progress">
                <div class="progress-bar" id="progress-bar">
                    <div class="progress-fill" style="width: 0%"></div>
                </div>
            </div>
            <div class="loading-tips">
                <p id="loading-tip">智能洗车管理系统</p>
            </div>
            <div class="loading-version">
                <span>v1.0.0</span>
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- 主应用容器 -->
    <!-- ============================================================ -->
    <div id="app">
        <!-- 侧边栏 -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-car-wash"></i>
                    <span>Carwash Pro</span>
                </div>
                <button class="sidebar-toggle" id="sidebar-toggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            
            <nav class="sidebar-nav">
                <!-- 导航菜单由JavaScript动态生成 -->
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="user-details">
                        <span class="user-name" id="user-name">用户</span>
                        <span class="user-role" id="user-role">角色</span>
                    </div>
                </div>
                <button class="logout-btn" id="logout-btn" title="退出登录">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </aside>

        <!-- 主内容区域 -->
        <main id="main-content">
            <!-- 顶部导航 -->
            <header id="topbar" class="topbar">
                <div class="topbar-left">
                    <button class="menu-toggle" id="menu-toggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="breadcrumb" id="breadcrumb">
                        <span class="breadcrumb-item">首页</span>
                    </div>
                </div>
                
                <div class="topbar-right">
                    <!-- 搜索 -->
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="搜索..." id="global-search">
                    </div>
                    
                    <!-- 通知 -->
                    <div class="notification-wrapper">
                        <button class="notification-btn" id="notification-btn">
                            <i class="fas fa-bell"></i>
                            <span class="badge" id="notification-badge">0</span>
                        </button>
                        <div class="notification-dropdown" id="notification-dropdown">
                            <div class="notification-header">
                                <span>通知</span>
                                <button class="mark-all-read">全部已读</button>
                            </div>
                            <div class="notification-list">
                                <div class="notification-empty">暂无通知</div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 主题切换 -->
                    <button class="theme-toggle" id="theme-toggle" title="切换主题">
                        <i class="fas fa-moon"></i>
                    </button>
                    
                    <!-- 更多 -->
                    <button class="more-toggle" id="more-toggle">
                        <i class="fas fa-ellipsis-v"></i>
                    </button>
                </div>
            </header>

            <!-- 页面内容 -->
            <div id="app-content" class="app-content" style="display: none;">
                <!-- 页面由路由动态渲染 -->
            </div>
        </main>
    </div>

    <!-- 通知容器 -->
    <div id="notification-container" class="notification-container"></div>

    <!-- 模态框容器 -->
    <div id="modal-container" class="modal-container"></div>

    <!-- ============================================================ -->
    <!-- 核心脚本 -->
    <!-- ============================================================ -->
    <script type="importmap">
        {
            "imports": {
                "@core/*": "/js/core/*",
                "@modules/*": "/js/modules/*",
                "@utils/*": "/js/utils/*"
            }
        }
    </script>

    <!-- 应用脚本 -->
    <script type="module">
        import { app } from '/js/app.js';
        
        // 暴露应用实例到全局
        window.app = app;
        
        // 处理加载进度
        const progressFill = document.getElementById('progress-bar')?.querySelector('.progress-fill');
        if (progressFill) {
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 5;
                if (progress > 90) {
                    clearInterval(interval);
                    progress = 90;
                }
                progressFill.style.width = Math.min(progress, 90) + '%';
            }, 200);
            
            // 当应用准备好时，完成进度条
            document.addEventListener('app:ready', () => {
                clearInterval(interval);
                progressFill.style.width = '100%';
                setTimeout(() => {
                    const loading = document.getElementById('app-loading');
                    if (loading) {
                        loading.style.opacity = '0';
                        setTimeout(() => {
                            loading.style.display = 'none';
                        }, 300);
                    }
                }, 500);
            });
        }
        
        // 加载提示轮换
        const tips = [
            '🚀 智能洗车管理系统',
            '📊 实时数据分析',
            '💼 高效运营管理',
            '👥 客户关系维护',
            '📈 业务增长引擎',
            '🔒 安全可靠的数据保护'
        ];
        let tipIndex = 0;
        const tipElement = document.getElementById('loading-tip');
        if (tipElement) {
            setInterval(() => {
                tipIndex = (tipIndex + 1) % tips.length;
                tipElement.textContent = tips[tipIndex];
            }, 3000);
        }
    </script>

    <!-- 错误捕获 -->
    <script>
        window.addEventListener('error', function(event) {
            console.error('全局错误:', event.error || event.message);
        });
        
        window.addEventListener('unhandledrejection', function(event) {
            console.error('未处理的Promise错误:', event.reason);
        });
    </script>
</body>
</html>
