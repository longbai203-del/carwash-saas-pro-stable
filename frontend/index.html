<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carwash SaaS Pro – Enterprise V2</title>
    
    <!-- 企业级设计系统（核心样式） -->
    <link rel="stylesheet" href="/css/design-system.css">
    
    <!-- 旧样式兼容（若需要保留原有模块的样式，可启用） -->
    <link rel="stylesheet" href="/css/style-legacy.css" disabled>
    
    <!-- 字体与图标（可选） -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- 预加载关键资源 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
    <div id="app">
        <!-- 侧边栏将由 JavaScript 动态生成 -->
        <nav id="sidebar" class="sidebar"></nav>
        
        <!-- 主内容区域 -->
        <main id="content" class="main-content">
            <!-- 路由将根据当前 URL 加载对应模块的 HTML -->
        </main>
    </div>

    <!-- 核心 JavaScript -->
    <!-- 1. 原有模块基础类（保留） -->
    <script type="module" src="/js/module-base.js"></script>
    <!-- 2. V2 模块基类（扩展） -->
    <script type="module" src="/js/module-base-v2.js"></script>
    <!-- 3. 增强型路由器（自动扫描模块） -->
    <script type="module" src="/js/router-v2.js"></script>
    <!-- 4. 新应用入口（初始化认证、侧边栏、路由） -->
    <script type="module" src="/js/app-v2.js"></script>
    
    <!-- 若需兼容旧版非模块脚本，可在此处引入（不推荐） -->
    <!-- <script src="/js/legacy.js" defer></script> -->
</body>
</html>
